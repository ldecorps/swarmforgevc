<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwarmForge — backlog dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0d10">
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 1rem; background: Canvas; color: CanvasText; }
  h1 { font-size: 1.1rem; margin: 0 0 0.25rem; }
  #asOf { font-size: 0.8rem; opacity: 0.7; margin: 0 0 1rem; }
  section { border: 1px solid color-mix(in srgb, CanvasText 20%, transparent); border-radius: 6px; padding: 0.75rem; margin-bottom: 0.75rem; }
  h2 { font-size: 0.95rem; margin: 0 0 0.5rem; }
  h3, h4, h5 { font-size: 0.85rem; margin: 0.5rem 0 0.25rem; }
  ul { margin: 0.25rem 0; padding-left: 1.25rem; font-size: 0.85rem; }
  li { margin-bottom: 0.15rem; }
  svg rect { transition: height 0.2s; }
  .crumbs { font-size: 0.8rem; margin-bottom: 0.5rem; }
  .crumbs button { background: none; border: none; color: LinkText; text-decoration: underline; cursor: pointer; font-size: 0.8rem; padding: 0; }
  .docs-list-item { display: block; width: 100%; text-align: left; background: none; border: none; border-bottom: 1px solid color-mix(in srgb, CanvasText 10%, transparent); padding: 0.4rem 0.1rem; cursor: pointer; color: inherit; font-size: 0.85rem; }
  .docs-list-item:hover { background: color-mix(in srgb, CanvasText 6%, transparent); }
  /* BL-253: visual-only - applies to both the milestone list's nav buttons
     and the ticket-detail status line; nothing about interactivity
     changes, only color. */
  .not-yet-implemented { color: color-mix(in srgb, CanvasText 55%, transparent); }
  /* BL-261: the SAME amber "needs attention" hue used elsewhere in this
     project for this class of signal (BL-078/BL-252's suite-duration warn
     treatment) - a machine-translation fallback shown as if it were real
     French must never look like ordinary text. */
  .untranslated-notice { font-style: italic; font-weight: 600; color: #d4a017; }
  /* BL-238 keyboard-nav-tiles-01/tree-02: an explicit, visible focus ring -
     several controls above zero out their border, which in some browsers
     (notably Safari) can also suppress the default focus ring on buttons
     with custom styling. Applied broadly to every native interactive
     element on the page, not just these two classes. */
  button:focus-visible, a:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid Highlight;
    outline-offset: 2px;
  }
  .gherkin { white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 0.8rem; background: color-mix(in srgb, CanvasText 6%, transparent); padding: 0.5rem; border-radius: 4px; }
  .doc-content { white-space: pre-wrap; font-size: 0.85rem; max-height: 20rem; overflow-y: auto; }
  .recert-actions button { margin: 0.25rem 0.4rem 0 0; }
  .recert-update-text { width: 100%; box-sizing: border-box; font-family: ui-monospace, monospace; font-size: 0.8rem; min-height: 6rem; }
  .recert-delete-warning { color: #c0392b; }
  .locale-toggle { position: absolute; top: 1rem; right: 1rem; display: flex; gap: 0.4rem; }
  .locale-toggle button { font-size: 0.8rem; padding: 0.3rem 0.6rem; cursor: pointer; }
  body { position: relative; }
</style>
</head>
<body>
<div class="locale-toggle">
  <button type="button" id="fontDecrease" aria-label="Decrease text size" data-i18n-aria="fontDecreaseLabel">A-</button>
  <button type="button" id="fontIncrease" aria-label="Increase text size" data-i18n-aria="fontIncreaseLabel">A+</button>
  <button type="button" id="localeToggle" aria-label="Switch language" data-i18n-aria="localeToggleAriaLabel"></button>
</div>
<h1 id="pageHeading" data-i18n="pageHeading">SwarmForge — backlog dashboard</h1>
<p id="asOf" data-i18n="loading">Loading…</p>

<section>
  <h2 data-i18n="needsApprovalHeading">Needs your approval</h2>
  <div id="needsApproval"></div>
</section>

<section>
  <h2 data-i18n="boardHeading">Backlog board</h2>
  <div id="board"></div>
</section>

<section>
  <h2 data-i18n="velocityHeading">Velocity</h2>
  <div id="velocity"></div>
</section>

<section>
  <h2 data-i18n="burndownHeading">Burndown</h2>
  <div id="burndown"></div>
</section>

<section>
  <h2 data-i18n="cycleTimeHeading">Cycle time</h2>
  <div id="cycleTime"></div>
</section>

<section id="costHealthSection" style="display: none;">
  <h2 data-i18n="costHealthHeading">Cost &amp; Health</h2>
  <div id="costHealth"></div>
</section>

<section>
  <h2 data-i18n="documentationHeading">Documentation</h2>
  <p id="docsAsOf" style="font-size: 0.8rem; opacity: 0.7;"></p>
  <input type="search" id="docsSearchInput" data-i18n-placeholder="docsSearchPlaceholder" placeholder="Search spec text…">
  <div class="crumbs" id="docsCrumbs"></div>
  <div id="docsExplorer"></div>
</section>

<section id="recertSection">
  <h2 data-i18n="recertHeading">Recertify a scenario</h2>
  <p id="recertAsOf" style="font-size: 0.8rem; opacity: 0.7;"></p>
  <div id="recertContent"></div>
</section>

<script src="locales.js"></script>
<script src="app.js"></script>
</body>
</html>
