name: Swarm intake from issues

# An issue labeled `swarm-intake` becomes a raw backlog-root item. The swarm's
# specifier drains it on next restart per the Backlog Intake Order rules.
# The issue is the human-facing handle: the workflow comments with the created
# path, and closing the loop (comment + close when spec'd) is BL-056 follow-up
# for the specifier role.

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  intake:
    if: github.event.label.name == 'swarm-intake'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Write backlog root item
        # BL-560: the write itself is factored into a shared script so the
        # scheduled auto-intake scan (swarm-intake-scan.yml) writes the
        # IDENTICAL GH-<n>-<slug>.yaml shape, never a second one.
        env:
          TITLE: ${{ github.event.issue.title }}
          BODY: ${{ github.event.issue.body }}
          NUM: ${{ github.event.issue.number }}
          URL: ${{ github.event.issue.html_url }}
        run: |
          file="$(bash swarmforge/scripts/github_intake_write.sh "$NUM" "$TITLE" "$BODY" "$URL")"
          echo "file=$file" >> "$GITHUB_ENV"

      - name: Commit
        env:
          NUM: ${{ github.event.issue.number }}
          URL: ${{ github.event.issue.html_url }}
        run: |
          git config user.name "swarm-intake[bot]"
          git config user.email "swarm-intake@users.noreply.github.com"
          git add "$file"
          # Concurrent swarm-intake runs (or a local swarm commit) can land on
          # main between checkout and push; rebase with autostash so parallel
          # GH-* files compose cleanly instead of failing push.
          git pull --rebase --autostash origin main
          if git diff --cached --quiet; then
            echo "Intake file already on main; skipping commit"
          else
            git commit -m "Intake GH-${NUM} to backlog root

          From issue: ${URL}"
            git push origin main
          fi

      - name: Acknowledge on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Queued for the swarm: \`${process.env.file}\` on \`main\`. The specifier drains backlog-root items first at next restart.`
            });
