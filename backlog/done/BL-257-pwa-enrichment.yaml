id: BL-257
title: "PWA enrichment: backlog board filter/search, per-ticket timeline, changed-since-last-visit, live metric trends (sliced)"
direction: tooling
priority: 35
mutation_cost: medium
source: "operator direction 2026-07-10 (via coordinator, backlog/INTAKE-beef-up-briefing-and-pwa.md): beef up the phone app; operator selected all four PWA candidates."

description: |
  Additive views on the shipped phone app (backlog dashboard BL-097, docs
  drill-down BL-117, recert BL-150, implemented-greyed BL-253, spec search BL-254,
  approval list BL-251, suite trend BL-252, localization BL-229/230, a11y BL-238).
  SLICED epic; each view is a slice the operator can keep or drop.

  Views (slices):
    1. Backlog board filter/search — filter/search the backlog dashboard by status,
       priority, or text. Why: find tickets fast on the board. (BL-254 covered
       docs/Gherkin search; this covers the backlog board.) Reads backlog.json.
    2. Per-ticket timeline — a ticket's lifecycle (specced -> coded -> ... -> merged)
       as an ordered timeline from the existing git-derived lifecycle events
       (TicketLifecycleEvent). Why: see a ticket's journey.
    3. Changed-since-last-visit — highlight tickets that changed state since the
       operator last opened the app. Why: quick catch-up. Needs a last-visit marker
       persisted by the EXTENSION HOST (no browser storage, per the rules).
       SURFACE: the LIVE holistic UI (holisticUiHtml.ts), NOT the static pwa/app.js —
       see SURFACE RE-SCOPE below.
    4. Live briefing metrics as trends — surface throughput / QA-bounce /
       suite-duration as live trend views, from the LIVE metric feed (holistic),
       NOT backlog.json (BL-252 boundary). Why: the phone becomes the live dashboard.
       SURFACE: the LIVE holistic UI (holisticUiHtml.ts), NOT the static pwa/app.js —
       see SURFACE RE-SCOPE below.

  Wanted behavior (observable):
    - Filtering/searching the backlog board leaves only matching tickets.
    - A ticket's timeline shows its stages in order with timestamps.
    - After tickets change state, the changed ones are highlighted since the last
      visit.
    - The trends view shows each metric's latest value + trend direction.
    - A view with no data shows a localized empty state, not an error or blank.

  Constraints:
    - PRESENTATION-ONLY WEBVIEW: reads backlog.json / docs-tree.json / the live
      metric feed; NO new authoritative store. The filter/timeline/diff logic is a
      pure, testable function separate from the DOM render.
    - NO BROWSER STORAGE: the last-visit marker persists via the extension host
      (workspace state / a file), never localStorage/sessionStorage.
    - PROJECTION BOUNDARY (BL-252): live machine-local metrics come from the live
      holistic feed, not backlog.json; do not push machine-local data into the git
      projection.
    - LOCALIZATION (BL-229/230): new strings (labels, empty states) via
      pwa/locales.js. Preserve accessibility (BL-238).

  SURFACE RE-SCOPE (coder investigation + specifier decision 2026-07-10): the original
  Scope said "extend pwa/app.js with the four views ... the live-trend view consumes
  the holistic feed" — an internal CONTRADICTION. pwa/app.js is the STATIC,
  GitHub-Pages-deployed dashboard (empirically zero bridge/token/localhost reference);
  it has NO live connectivity to the extension host or the bridge server. So the two
  LIVE/host-state views cannot live there. Per the BL-252 precedent (approved: live
  metrics render on the holistic UI + briefing, leaving the PWA/git-projection
  untouched) and [[pwa-vs-holistic-surface-boundary]], slices 3 & 4 RE-SCOPE to the
  live holistic surface (extension/src/bridge/holisticUiHtml.ts + its bridge routes),
  NOT pwa/app.js. Slices 1 & 2 stay on pwa/app.js (they read backlog.json + git-derived
  TicketLifecycleEvent — both reproducible). This is a forced technical correction, not
  a change to what the operator asked for (all four views ship; two just render on the
  phone's live bridge surface instead of the static one).

  Scope (SLICES 1 & 2 — pwa/app.js, THIS pass): extend pwa/app.js with the backlog
  board filter/search view + the per-ticket timeline view, + pwa/locales.js strings.
  Pure filter/timeline logic separate from the DOM render. Reuse existing backlog.json +
  lifecycle-event data; add no new store.

  Scope (SLICES 3 & 4 — holisticUiHtml.ts, re-scoped, PARKED for a later build): render
  on the live holistic UI, not the static PWA. Slice 3 (changed-since-last-visit) needs
  a NEW host-side last-visit persistence module (mirror extension/src/swarm/bounceAck.ts's
  atomicWrite-backed .swarmforge/<name>.json pattern) + a bridge write route to set it —
  new plumbing, not wiring-only. Slice 4 (live trends) reuses DeliveryMetrics (throughput,
  suite-duration already bridge-exposed via /metrics) but "QA-bounce" has NO existing
  distinct counter in this codebase (same gap BL-256 documented); the closest reusable
  signal is BL-098's chase/nudge/dead-letter/respawn telemetry (computeChaseTrend),
  composed into a new buildJsonRoutes entry (bridgeServer.ts's route-add pattern) — also
  new plumbing. Verify the live bridge/holistic data paths before naming files when built.

  DELIVERY: SLICED — each view is an independently buildable/droppable slice. THIS pass
  builds slices 1 & 2 on pwa/app.js; the live acceptance feature file is scoped to those
  (BL-233), and slices 3 & 4 are parked in the coder-authored
  BL-257-pwa-enrichment.slice-3-4-live.feature.draft (re-scoped to the holistic surface),
  promoted into a live feature only when built. Buildable now. Priority normal.

acceptance: specs/features/BL-257-pwa-enrichment.feature

qa_e2e_procedure: |
  Per built slice (PWA render faked; assert on the pure view logic / feed data):
  1. Filter/search the backlog board; assert only matching tickets remain.
  2. Open a ticket's timeline; assert stages appear in order with timestamps.
  3. Change some tickets' state, reopen; assert the changed ones are highlighted vs
     the host-persisted last-visit marker.
  4. Open the trends view; assert each metric shows latest value + trend direction
     from the live feed (backlog.json unchanged).
  5. With a view's data unavailable, assert a localized empty state (no error/blank).

# HUMAN APPROVAL: feature file specs/features/BL-257-pwa-enrichment.feature is a NEW
