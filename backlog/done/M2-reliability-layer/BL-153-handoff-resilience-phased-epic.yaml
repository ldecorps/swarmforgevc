description: |
  The swarm must run headless; the extension reattaches to live tmux panes on
  start instead of restarting agents or opening Terminal surfaces. Handoff
  reliability is rebuilt in two explicit phases so we can tell whether failures
  are in tmux injection or in the daemon/mailbox layer.

acceptance: |
  Feature: phased handoff resilience (umbrella — promote children, not this epic)

  Scenario: phase 1 complete
    Given BL-154 is merged and closed
    Then a resilience-min swarm delivers handoffs with daemon disabled
    And extension tiles reattach to live tmux without spawning Terminal windows

  Scenario: phase 2 complete
    Given BL-155 is merged and closed
    Then handoffd delivers outbox to inbox/new with verified tmux wake
    And extension reads daemon status for transport health
