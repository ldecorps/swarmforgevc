id: BL-093
title: BUG — pane input injection is unreliable: instructions sit typed-but-unsubmitted, no seam verifies delivery, and a wedged TUI is unrecoverable by send-keys
milestone: M2
status: done
priority: 01
assigned_to: coder

description: |
  DEFECT (operator + live diagnosis, 2026-07-04 ~01:00-01:30, run
  run-20260704-0030): every mechanism that drives an agent by typing into
  its tmux pane fire-and-forgets. Nothing verifies the text was submitted,
  so the pipeline silently stalls on lost keystrokes.

  Observed live tonight:
  - The coder sat idle with "commit and hand off to cleaner" typed in its
    input box, unsubmitted. The daemon's notify! (handoffd.bb: literal text,
    150ms, C-m, 50ms, C-j) had typed it, but the submit never registered —
    the pipeline's critical path was parked on one lost keystroke.
  - The specifier accumulated THREE stacked copies of
    "bash .swarmforge/launch/specifier.sh" in its input from repeated
    chaser respawns (false-positive side is BL-087; the stacking is this
    ticket: each injection assumed the previous one had been consumed).
  - Escalation: the coder's claude TUI then proved fully wedged — process
    alive (S+, ~0.1% CPU) but the rendered screen frozen for 15+ minutes and
    ALL input ignored, including a human-paced direct
    `tmux send-keys ... Enter` and 60 BSpace. For a wedged-TUI agent,
    send-keys-based respawn (a16e4d8) types into a dead input box and can
    never recover it.

  Three fixes, one seam:
  1. Verified submit. Wrap every pane injection (extension sendKeys call
     sites incl. respawnAgent and the '/clear' path; handoffd.bb notify!)
     in send -> capture-pane -> confirm the typed text left the input line
     -> retry Enter with backoff -> after N failures, report delivery
     failure (TmuxRunResult-style / daemon log), never silently drop.
  2. Never stack. Before injecting, capture the pane input line; if it
     already holds undelivered text, do not append another copy — clear it
     first (bounded BSpace) or report and skip.
  3. Wedged-TUI escalation. When input verification fails repeatedly on an
     agent whose process is alive, the pane is wedged: respawnAgent needs a
     `tmux respawn-pane -k -t <pane> 'bash .swarmforge/launch/<role>.sh'`
     fallback (kill the dead TUI, relaunch in place). This is the only
     remedy send-keys cannot provide, and it is exactly the state the coder
     was in tonight. Gate it on BL-087's liveness/cooldown so it never
     fires at a healthy agent.

  Relationship to BL-087 (active): BL-087 stops the chaser respawning LIVE
  agents; this ticket makes the injection itself trustworthy and adds the
  only recovery path that works on a WEDGED agent. Complementary, same
  seams — coordinator should sequence this after BL-087 merges.

  Scope: extension/src/swarm/tmuxClient.ts (sendKeys/verify helper,
  respawnAgent fallback), its callers (extension.ts wake/clear paths,
  swarmPanel restartAgent), swarmforge/scripts/handoffd.bb notify!,
  fake-tmux + pane-state tests through existing seams.

acceptance: |
  Feature: instructions typed into agent panes are verifiably delivered

  # BL-093 verified-submit-01
  Scenario: a lost Enter is retried until the instruction submits
    Given an agent pane whose input box swallows the first Enter
    When the daemon or extension injects an instruction
    Then the injector detects the text still sitting in the input line
    And retries the submit until the input line is empty
    And the instruction is executed exactly once

  # BL-093 verified-submit-02
  Scenario: delivery failure is reported, never silent
    Given an agent pane that accepts no input at all
    When an injection exhausts its retries
    Then the failure is logged/reported with role and pane target
    And no further copies of the instruction are typed into the pane

  # BL-093 no-stacking-03
  Scenario: undelivered input is never stacked
    Given an agent pane already holding an undelivered instruction
    When a second injection targets that pane
    Then the injector does not append a second copy
    And the pane input holds at most one pending instruction afterwards

  # BL-093 wedged-respawn-04
  Scenario: a wedged TUI is recovered by pane respawn
    Given an agent process that is alive but ignores all pane input
    When respawn escalation triggers for that role
    Then the pane process is killed and relaunched via its launch script
    And the fresh agent appears in the same tmux pane the tiles watch

  # BL-093 wedged-respawn-05
  Scenario: pane respawn never fires at a healthy agent
    Given an agent that is processing input normally
    When the chaser or an operator triggers a respawn for it
    Then the send-keys path (with verification) is used
    And respawn-pane -k is not invoked

  # Non-behavioral gates:
  #  - All verification through existing seams (fake-tmux call log +
  #    capture-pane rules); no sleeps in tests beyond fake-clock/backoff
  #    injection points.
  #  - handoffd.bb notify! change covered by swarmforge/scripts/test/.
  #  - BL-087 cooldown/liveness suites stay green.
