source: |
  Human, 2026-07-24 ~13:10Z (via operator rc): "can we define cooldown periods
  for the swarm, so it does not burn all the tokens before they replenish. it
  appears that we would need to stop it at night (during 7pm and 7am). should
  define a start time and a stop time, via a cronjob sort of thing? (graceful
  stop, so resident agent has time to finish its bit). can you expedite that
  so that the swarm stops tonight? so I guess an urgent ticket to traverse the
  swarm in the next 5 hours max."

  Companion to INTAKE-20260724-burn-rate-briefing-warning.md (same morning,
  same root concern: current burn projects token exhaustion before the weekly
  Thursday-7am reset). That intake is the WARNING; this ticket is the BRAKE.

  HARD DEADLINE: live on this box before 2026-07-24T18:00Z (19:00 local
  tonight). Operator has a manual-pause fallback armed if this misses the
  deadline, but the feature is the real fix — tonight is its first run either
  way.

description: |
  ## Problem

  The swarm runs 24/7 and burns plan tokens while the human sleeps; at the
  current rhythm the weekly allowance is projected to exhaust BEFORE the
  Thursday 07:00 reset. The human wants a standing nightly cooldown:
  stop at 19:00 local, resume at 07:00 local — graceful, so the resident
  agent finishes its current bit.

  ## Build on what EXISTS — this is a scheduler, not new pause plumbing

  1. `extension/src/tools/telegramControlCore.ts` already owns a timed-pause
     state machine: `PauseState { active: true; untilMs } | { active: false }`,
     `apply-pause` with a duration, drain semantics, explicit resume.
  2. `handoffd.bb` already runs `pause-auto-resume-sweep!` (BL-423) shelling
     to `resume-expired-pauses.js` (`decidePauseAutoResume`), including the
     Control-topic announcement when a pause expires. The MORNING RESUME
     ALREADY EXISTS.

  So the work is: a configured window (start/stop times, defaults 19:00 and
  07:00 LOCAL) and a clock that applies the existing timed pause when the
  window opens, with untilMs = the next window close. handoffd already ticks
  continuously; a wall-clock check inside its existing sweep cadence needs NO
  new daemon, no crontab, and survives reboots with the daemon itself. Config
  lives with the other knobs in swarmforge.conf.

  ## Graceful semantics (the human's explicit constraint)

  - Pause = stop DISPATCHING/waking: no new parcels delivered, no chase
    nudges, no rotate notes, no concierge-tick outbound churn beyond what the
    pause state machine already suppresses. NEVER kill a pane; an agent
    mid-turn finishes its current bit naturally and then simply is not woken.
  - In-flight-at-19:00 work: the current turn completes; the parcel chain
    freezes where it stands and thaws at 07:00. No abandonment, no reclaim
    sweep during the window.
  - RESUME at 07:00 via the existing pause-auto-resume sweep, with its
    existing Control-topic announcement (the human sees "swarm resumed" on
    Telegram with their morning coffee).

  ## External supervisors must be able to SEE the pause

  Pause state is ALREADY persisted at `.swarmforge/operator/control-pause.json`
  (writeControlPauseState in telegram-front-desk-bot.ts; read by
  backlog_depth_lib.bb's read-pause-state). No new persistence needed — the
  runbook (acceptance scenario 15) documents the path so the operator layer's
  babysitter can distinguish a planned pause from starvation by a file read.

  ## Manual override

  The existing Telegram control pause/resume must keep working. The rule
  (stated explicitly in the Gherkin, per this ticket's instruction): the
  cooldown applies AT MOST ONE automatic pause per window; a human resume-now
  while inside the window CONSUMES the current window's application, so the
  swarm stays resumed until the next window open. A human pause is never
  overridden; if it expires inside a window whose application is not yet
  consumed, the cooldown then applies.

acceptance: specs/features/BL-617-nightly-cooldown-window.feature

notes: |
  ## Specifier decisions (2026-07-24, specced under the 18:00Z deadline)

  MECHANISM (specifier's call per the ticket): mirror the BL-423 posture
  exactly — a compiled CLI (suggested: extension/out/tools/
  apply-cooldown-pause.js) owning the pure decision, shelled from a new
  handoffd sweep on the existing cadence (same shape as
  pause-auto-resume-sweep! → resume-expired-pauses.js). The pause WRITE
  reuses writeControlPauseState — never a second writer implementation.
  The pure decision function takes (now, parsed config, PauseState,
  window-consumed marker) and returns none | apply-pause{until next window
  close}; unit fixtures per the acceptance contract: window spanning
  midnight, already-paused-by-human at window open, human resume-now during
  window, disabled config, malformed config (=> none + loud log).

  ONCE-PER-WINDOW MARKER: persist which window start was already handled
  (suggested: .swarmforge/operator/cooldown-window.json,
  {lastHandledWindowStartMs}). Stamped when (a) the cooldown applies its
  pause, or (b) a human resume-now lands while inside the window (the
  front-desk bot's resumeNow path is the single human resume writer). Both
  writers converge on "this window is consumed".

  SWEEP SUPPRESSION (load-bearing scope — verified gap): today an active
  pause only zeroes effective promotion depth (BL-423 via
  backlog_depth_lib.bb). Parcel DELIVERY, chase nudges, and rotate/open-slot
  wakes still fire, which would wake agents all night and defeat the brake.
  While ANY pause is active (human or cooldown — one gate, reusing
  backlog-depth-lib/read-pause-state), handoffd's outbound-wake sweeps are
  suppressed: no inbox delivery, no chase nudges, no wake pokes. Enqueue
  always succeeds (the freeze point is between enqueue and delivery). The
  pause-auto-resume sweep and the cooldown sweep KEEP running — they are the
  thaw. Scenarios 11-12 pin this.

  CONF (this parcel commits these lines to swarmforge.conf so tonight is
  live; absent keys degrade to disabled / 19:00 / 07:00, read fresh each
  sweep, degrade-never-crash like briefing_morning_time_utc):
    config cooldown_window_enabled true
    config cooldown_start_local 19:00
    config cooldown_end_local 07:00

  VERIFIED FACTS (do not re-investigate):
  - rotate_to_role's respawn-as! delivery-wait is bounded — proceeds after
    timeout with a loud warning (handoff_lib.bb:604). A rotate during the
    window respawns to a role that idles on NO_TASK/ROTATE_HOME; the frozen
    parcel delivers after 07:00 and the chase machinery re-rotates the
    resident then. No unbounded overnight hang.
  - Pause file path + schema already externally readable; babysitter
    adaptation is out of scope (operator side) once the runbook names it.
  - Morning resume + Control-topic announcement fully exist (BL-423).

  TESTABILITY SEAM: the CLI takes an injected-now flag (e.g.
  --now <epoch-ms> and/or --dry-run printing the decision without writing)
  so QA can e2e-verify on the live box without waiting for 19:00. Argument
  seam, not a *_FORCE_RESULT env bypass.

  ## E2E QA procedure (run on this box, BEFORE 2026-07-24T18:00Z)

  1. npm install && npm run compile; unit + acceptance suites green
     (all 15 BL-617 scenarios wired — the runner hard-fails on unhandled
     scenarios).
  2. Dry-run the decision CLI with injected clocks: an in-window time
     (expect apply-pause until next 07:00 local), an out-of-window time
     (expect none), a consumed-window time (expect none).
  3. Confirm the three swarmforge.conf cooldown lines are committed and
     live.
  4. Restart handoffd on the new build via start_handoff_daemon.sh (the
     running daemon predates the new sweep); confirm the cooldown sweep's
     log line appears in the daemon log.
  5. Confirm .swarmforge/operator/control-pause.json currently reads
     {active:false} (no accidental pre-pause).
  6. Tonight 19:00 local is the first live run: the operator watches the
     Control topic for the pause announcement (scenario 13) and tomorrow
     07:00 for the existing resume announcement.

