notes: |
  RELATED: BL-274 (front-desk bot epic), BL-292 (headless front-desk launcher),
  BL-302 (Telegram bot poll crash resilience).
  
  OBSERVED FAILURE: The subscribeReplies path fault-storms with undici "terminated"
  (same failure class as BL-302). A NORMAL transient network event kills the relay,
  and the current code counts partial writes as success. The bug is that the live
  failure never reaches the code a mock exercises — acceptance must test against
  real dropped sockets.
  
  REUSE: Use the same retry-forever, capped-backoff policy the front-desk track
  settled on (BL-274): retry forever, capped backoff, escalate — never silently
  give up.

