id: BL-027
title: bounce-all command — restart both swarm and extension
milestone: M3
status: done
priority: 27
assigned_to: coder

description: |
  Add a VS Code command `swarmforge.bounceAll` that stops the swarm, reloads
  the extension, then restarts the swarm — a full hard reset from a single
  command.

  Sequence:
  1. Stop swarm (same as `swarmforge.stopSwarm`).
  2. Reload extension host/webview (same mechanism as `swarmforge.bounceExtension`).
  3. After the extension reactivates, auto-launch the swarm against the stored
     target path and most-recent run name (no prompt).

  Step 3 can be driven by a flag written to workspace state before the reload
  (e.g. `swarmforge.pendingAutoLaunch = true`) so the `activate` function detects
  it and calls launchSwarm automatically.

  The primary use case is a full clean-slate restart triggered from the remote
  control (e.g. when the human notices the swarm is stuck and wants everything
  fresh).

acceptance: |
  - Running `swarmforge.bounceAll` from the command palette results in:
    1. Swarm stopped (tmux sessions killed).
    2. Extension reloaded.
    3. Swarm relaunched automatically — no manual prompt or extra command needed.
  - The panel tiles are live again within ~10 seconds of invoking the command.
  - No run-name prompt appears.

constraints: |
  - Compose BL-025 and BL-026 primitives; do not duplicate their logic.
  - The auto-relaunch after reload must be driven by persisted workspace state,
    not an in-memory flag that the reload would clear.
  - Expose the command in package.json under the "SwarmForge" category.
