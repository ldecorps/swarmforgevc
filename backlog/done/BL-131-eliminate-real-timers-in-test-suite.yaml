id: BL-131
title: cut unit test suite runtime drastically by eliminating real wall-clock timers — replace with fake/injected clocks
milestone: M2
status: todo
priority: 05
direction: aligned
assigned_to: specifier

# held (coordinator, 2026-07-06): not promoted yet despite drain. BL-131's
# scope includes extension/src/watchdog/chaserMonitor.ts and
# extension/test/chaserMonitor.test.js - BL-122 (currently at the hardener
