notes: |
  BL-408 makes "approve" actually flip a pending-review ticket's
  `human_approval` from a Telegram reply. This ticket is the same chain's
  remaining two verbs from the original ask ("approve/amend/reject an
  action ... on tickets sitting in the backlog"):

  - `reject <reason>`: sets `human_approval: rejected  # <reason>` on the
    ticket's backlog file (mirroring the existing approve-text-replace
    shape in extension/src/concierge/pendingApprovalReply.ts — a targeted
    line replace, not a full rewrite) and closes the approval-request loop
    for that ticket (do not keep re-posting ApprovalRequested for a
    rejected ticket — a rejected ticket goes back to the specifier for
    rework, same as a `rule_proposal` reject path, not around the
    concierge topic loop).
  - `amend <note>`: does NOT flip `human_approval` — it stays pending. Post
    the note as operator context on the ticket via the existing
    `postOperatorContext` (extension/src/tools/telegram-front-desk-bot.ts:187),
    the same channel BL-217/BL-383-style operator context already uses, so
    the specifier sees the amendment note the next time it reviews the
    ticket. The ticket keeps its outstanding ApprovalRequested state
    (an amend is not a resolution).

  MATCHING. Extend `isApprovalReplyText` (or add a sibling matcher) in
  `pendingApprovalReply.ts` to recognize the three verb forms
  (`approve`, `reject <reason>`, `amend <note>`) from a topic reply, each
  routed to its own effect — do not overload the existing approve-only
  boolean return into a three-way dispatch without also updating every
  caller that currently treats a truthy result as "approved".

  DEPENDS ON BL-408: this ticket builds on the fixed pending-review
  matching and active+paused scan — do not re-fix those defects here.

  OUT OF SCOPE: Slice 3 (inline-keyboard buttons) — a separate ticket
  (BL-410).

  E2E QA PROCEDURE: with a pending-review ticket (post-BL-408, so its
  ApprovalRequested actually posts), reply `reject bad scope` in its topic
  and confirm the backlog file's `human_approval:` line becomes `rejected`
  with the reason recorded, and that no further ApprovalRequested reposts
  for it. Separately, reply `amend tighten the acceptance criteria` on
  another pending ticket and confirm `human_approval` is unchanged
  (still pending-review) while the note appears as operator context on
  the ticket.

