  survey found exactly one novel element (a dedicated adversarial-reviewer role on the `adversaries`
  branch); everything else upstream is already independently present in our fork, and our fork has no
  common ancestor so nothing is mergeable. This is filed as an EVALUATION spike, not a build ticket — the
  human decides whether a new pipeline role is worth adopting after the recommendation. FIRM: this ticket
