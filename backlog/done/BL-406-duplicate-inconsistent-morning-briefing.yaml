source: "backlog/INTAKE-operator-question-1784092305092.md — Operator-relayed Telegram question (in French), 2026-07-15T05:11Z: human received 3-4 daily briefings the morning of 2026-07-15, some in French, some in English, some with architecture diagrams attached, some without. Drained with the human 2026-07-15: spec as one combined investigation ticket, since the three symptoms plausibly share a root cause (e.g. multiple independent send paths/triggers)."

notes: |
  Investigate the briefing send path as a whole rather than each symptom in
  isolation, on the theory that several sends firing that morning (duplicate
  guard failure) is also why they look inconsistent with each other — each
  invocation may independently resolve language/diagram-attachment state,
  so N sends produce N different renderings rather than N copies of the same
  one.

  Areas to check:
  - Duplicate-send guard: whatever normally prevents the daily briefing
    running more than once per day (a `.sent.json`-style marker, per
    docs/briefings/.sent.json in this session's git status) — why did it not
    prevent 3-4 sends this morning.
  - Language selection: why the same daily briefing resolved to French for
    some sends and English for others on the same morning.
  - Diagram-attachment logic: why some sends included the architecture
    diagram(s) and others did not.

  Do not assume a single fix covers all three — if the investigation finds
  independent causes, this ticket's acceptance should still confirm each
  symptom is fixed (one investigation, potentially several small fixes
  landed together), per the human's instruction to combine the ticket
  rather than the fix.

acceptance:
  feature: specs/features/BL-406-duplicate-inconsistent-morning-briefing.feature
  steps:
    - "The daily briefing sends at most once per day"
    - "A given day's briefing is sent in one consistent language"
    - "A given day's briefing consistently includes or omits its diagrams"

