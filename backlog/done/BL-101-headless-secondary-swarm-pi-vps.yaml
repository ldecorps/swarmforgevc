description: |
  Turn any always-on headless Linux box into a fire-and-forget secondary
  swarm ("throughput brick"). Two concrete reference targets, one recipe:
    - Raspberry Pi 5 (ARM64; 8GB minimum, NVMe/USB-SSD storage REQUIRED —
      SD cards are excluded for durability and speed).
    - The operator's existing VPS (x86_64; 4GB+ RAM for a full 7-role
      pack, fewer roles on smaller instances).

  Behaviors:
    - Bring-up doc + a small provisioning script: install pinned substrate
      (tmux, babashka aarch64/x86_64, Node + claude CLI, git, gh, the
      GitHub Actions self-hosted runner for that arch), clone the repo,
      write the secondary-mode conf (BL-090: swarm_mode secondary
      <primary>, swarm_name unique per box), register the runner with a
      per-host label so BL-092 workflows target the right box.
    - systemd units: one for the swarm (launch at boot, clean stop on
      shutdown via the existing stop path), one for the Actions runner.
      A crashed/rebooted box resumes as a working secondary with no human
      attention; durable queue state (git + inboxes) makes reboot loss-free.
    - Headless auth: the claude CLI authenticates via environment/config
      on the box (no interactive browser login required after initial
      provisioning); git push auth via a credential scoped to THIS repo
      only (fine-grained PAT or deploy key) — never a broad account token.
    - Security posture (VPS especially, it is internet-facing): the swarm
      needs OUTBOUND connections only (Claude API, git/GitHub, runner
      long-poll). The provisioning script must not open any inbound port;
      document that SSH is the only inbound service and key-only. Secrets
      (API key, PAT) live in the unit environment/root-owned files, never
      in the repo clone.
    - Throughput-aware assignment guidance (coordinator prompt note, this
      parcel): small hosts run CPU-bound gates (full suite, mutation) 2-4x
      slower, while API-bound stages run at full speed — so the
      coordinator SHOULD prefer assigning mutation-heavy/hardener-long
      tickets to the fastest swarm and ordinary tickets to the bricks.
      Guidance, not a hard rule; assignment stays the coordinator's call.
    - Verified on both reference targets before close: one parcel worked
      end-to-end (assignment -> pipeline -> QA -> push) on the Pi and one
      on the VPS.

  Scope: docs (bring-up guide extending BL-091's), provisioning script +
  systemd unit files under swarmforge/deploy/ (new, script-tested where
  logic exists), coordinator prompt guidance line, no extension changes.

