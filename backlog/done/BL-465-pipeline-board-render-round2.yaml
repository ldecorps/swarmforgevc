human_approval: >
  Human-requested via the Operator front desk 2026-07-16 with a follow-up clarification round; links
  ride a below-grid list per his Q1 choice (Telegram cannot render links inside the <pre> grid). Firm
  contract: each ticket entry LEADS with a short 2-3 word kebab slug; in the aligned stage GRID the
  slug fills the dedicated slug column and the grid carries the slug ONLY (human's instruction
  2026-07-16: "add the slug back to the grid — room enough for 2 or 3 words"; the grid has no title
  column to widen), while the BELOW-GRID lists lead with that slug then fill the remaining landscape
  width with more of the truncated title (human's decision 2026-07-16: "both: slug + wider title").
  No redundant PK label; distinct parked /
  awaiting-approval / paused / root-intake / recently-closed sections (awaiting-approval is its OWN
  section, no per-line "AA" label — human's decision 2026-07-16); a tappable GitHub link list below the
  grid; aligned grid preserved. Build-time details NOT gating: exact width, headers, link-line format, and the precise
  "recently-closed" window. Serialize on the board files after in-flight BL-462 and ideally after
  BL-464 (authoritative data source). REFINED 2026-07-16 per the human's direct instruction ("add the
  slug back to the pipeline board grid — room enough for 2 or 3 words"): grid = slug-only column,
  below-grid lists = slug + wider title; feature file board-round2-01/01b re-split accordingly.
  CONFIRMED as-specced by the human (ldecorps) directly 2026-07-16 (grid = slug-only, wider title in
  the below-grid lists); no changes requested. Ready for promotion, serialized after BL-462/BL-464.

