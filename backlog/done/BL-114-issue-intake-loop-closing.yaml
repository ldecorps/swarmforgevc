source: "root intake BL-056-issue-intake-loop-closing (renumbered: id BL-056 already used by done/M4 anchor-handoff-state-dir ticket)"

description: |
  Depends on .github/workflows/swarm-intake.yml (already present: issue ->
  backlog root item, id GH-<n>, source: field carries the issue URL).

  When the specifier drains a GH-<n> root item into a spec in
  backlog/paused/, it should also close the loop on GitHub via `gh`
  (available in the worktree, auth from the host environment per the
  Secrets rule):
  - comment on the source issue with the spec summary and the paused item
    path
  - apply label `swarm-specced`
  When the item completes (moved to done/), whichever role sends the
  completion notification comments the merge commit on the issue and
  closes it.
  If `gh` auth is unavailable, skip silently and note it in the run log;
  issue loop-closing must never block the pipeline.

  Deliverable shape: runnable helper script(s) under swarmforge/scripts/
  (e.g. issue_specced.sh <GH-n> <paused-path>, issue_done.sh <GH-n>
  <merge-commit>) plus the role-prompt lines telling the specifier and the
  closing role when to invoke them. Keep the scripts testable without a
  live GitHub (inject the gh call).

acceptance: specs/features/BL-114-issue-intake-loop-closing.feature
mutation_cost: high
