notes: |
  REFRAMED 2026-07-11 (supersedes both the original email-first "Support role" and the
  interim "Telegram threads refocus"). UMBRELLA/tracking item, not directly promotable.

  VISION: Telegram is the human's async FRONT DESK to the swarm — the single place they
  meet it: talk to it, see what it's doing, decide what proceeds, and get notified. Each
  concern is its own Telegram forum TOPIC (native thread). The OPERATOR staffs the desk
  (external, disposable-per-event, memory-capable, survives swarm death). This reframes
  BL-274 from "a support feature" into "the interface", and UNIFIES today's scattered
  Telegram bits (narration BL-239, gate-answers BL-240/265) under one coherent desk.

  THE DESK DOES FOUR THINGS (human chose the FULL desk, talk first):
    1. TALK (centerpiece) — per-subject discussion threads. Each subject = one topic =
       one tracked SUP-###, memory-backed; when actionable, spawns/links BL-### build
       work via the Coordinator. Per-topic isolation = no cross-subject bleed, async.
    2. STATUS — ask the desk about swarm/backlog/ticket state; reuse existing
       projections (backlog.json, holistic UI data, operator status.json); reply in the
       asking topic.
    3. DECIDE — approve gates / give go-aheads from a topic; reuse the BL-240 gate-answer
       write path + BL-265 gate view; route the decision to the Coordinator.
    4. NOTIFY — the desk proactively pings the RIGHT topic when something needs the human
       or a status changes; generalize BL-239 run-narration into topic-routed notices.

  DECISIONS LOCKED WITH THE HUMAN (2026-07-11):
    - Reframe BL-274 to this; reuse the SUP-### store; defer the email-first +
      separate-Support-role framing (email/RC become optional later channels).
    - The OPERATOR staffs the desk (single agent); BL-275's support_runtime.bb FOLDS
      INTO the operator runtime (not a new daemon).
    - Memory = per-thread durable transcript RELOADED on every reply (full context, no
      cross-subject bleed) + distill durable facts into the Operator's long-term memory.
    - Subject model = each topic is a tracked SUP-### that spawns/links BL-###.
    - Single principal (the human); human-only inbound (reuse BL-239/240 posture).
    - The Operator never self-closes a thread (human confirms close).
    - Scope = the FULL desk (talk + status + decide + notify), TALK first.

  ARCHITECTURE — a REST bridge sits in between (human decision 2026-07-11). Telegram is
  NOT coupled directly to the Operator runtime; it is a thin FRONT DESK BOT that is a
  CLIENT of the existing bridge (BL-065). The path:
    Telegram <-> Front Desk Bot (thin adapter, bridge client) <-> [authed POST inbound +
    SSE outbound] <-> bridgeServer <-> [per-SUP-### event enqueue] <-> Operator runtime
    <-> disposable Operator LLM.
  This is ASYNC ingestion + SSE egress, NOT synchronous RPC: the bot POSTs an inbound
  message and returns; the reply arrives later over SSE and the bot posts it into the
  topic. The bridge and runtime speak SUP-### only; all Telegram specifics stay in the
  bot.
    - Telegram forum topics = threads: supergroup with Topics enabled, bot admin
      (manage-topics). SUP-### <-> topic (message_thread_id); open a subject =
      create/adopt a topic. The Front Desk Bot OWNS this mapping + the human-only inbound
      filter; it maps an inbound message to its SUP-### before POSTing to the bridge.
    - Bridge (extends bridgeServer.ts, BL-065): a new authed POST inbound-message route
      (mirrors the BL-240 POST /gate-answer pattern + bridgeAuth) ingests {SUP-###,
      message}, appends to that transcript, and enqueues a per-SUP-### event; an SSE
      channel (reuse the existing text/event-stream egress) carries outbound Operator
      replies + notifications tagged by SUP-###.
    - Operator runtime (extends operator_runtime.bb): CONSUMES the bridge-ingested
      per-SUP-### events, persists per-thread transcript, and ROUTES outbound replies /
      notifications to the bridge SSE egress. It never calls Telegram and never long-polls
      getUpdates — that is the bot's job.
    - Disposable Operator LLM per event: loads ONLY that SUP-###'s transcript (+ relevant
      long-term memory); talks / answers status / relays a decision / posts a
      notification for that ONE topic; distills durable facts to memory; files a
      Coordinator intake when actionable and tracks BL-### status back into the topic.
      Never fabricates a design/promote/approve; never self-closes. Its reply flows out
      over the bridge SSE stream -> bot -> the same topic.

  SEQUENCE (children specced JUST-IN-TIME as the coordinator promotes each; BL-281 and
  BL-276 are already specced, the rest pending):
    - BL-275 — DONE (foundation): SUP-### thread store + memory-backed runtime substrate
      (support_lib.bb/support_thread.bb/support_runtime.bb). Reused; its standalone
      runtime + email-echo/RC paths fold-in/defer. depends_on [].
    - BL-281 — SPECCED (slice 1, TALK MVP, promote first): over the BRIDGE — a thin
      Front Desk Bot (bridge client) owns Telegram (topic <-> SUP-### mapping +
      human-only inbound) and POSTs inbound to a new authed bridge inbound-message route;
      the bridge enqueues a per-SUP-### event; the runtime consumes it and routes the
      disposable Operator's reply out over SSE -> bot -> the same topic (transcript
      reload). Prove two topics stay independent; async, not RPC; no direct
      runtime<->Telegram coupling. depends_on [BL-275].
    - BL-282 (PENDING) — slice 2, MEMORY: distill durable facts to long-term memory +
      reload relevant memory per wake. depends_on [BL-281].
    - BL-284 (PENDING) — slice 3, NOTIFY: proactive topic-routed pings when something
      needs the human / status changes; generalize BL-239 narration. depends_on [BL-281].
    - BL-285 (PENDING) — slice 4, DECIDE + STATUS: approve gates / go-aheads from a topic
      (reuse BL-240 write path + BL-265 gate view, route to Coordinator) and answer
      status queries from a topic (reuse backlog.json / holistic / operator status.json
      projections). depends_on [BL-281].
    - BL-283 (PENDING) — slice 5a, COORDINATOR HANDOFF: an actionable thread spawns/links
      BL-###; BL-### status flows back into the topic. depends_on [BL-281].
    - BL-276 — SPECCED (slice 5b, LIFECYCLE): subject status (open/resolved/closed), no
      self-close, human-confirm close, optional idle nudge into the topic. depends_on
      [BL-281].

  NET-NEW: a thin FRONT DESK BOT (bridge client) that owns Telegram — forum-topic
  support (message_thread_id, createForumTopic) generalized from telegramClient.ts
  (today: sendTelegramMessage + getTelegramUpdates only, BL-239), the topic <-> SUP-###
  mapping, and the human-only inbound filter; a new AUTHED bridge inbound-message route
  on bridgeServer.ts (mirror the BL-240 POST /gate-answer pattern + bridgeAuth) that
  ingests + enqueues a per-SUP-### event, plus an SSE reply/notify egress; per-SUP-###
  event consumption + transcript + outbound SSE routing in the operator runtime (NOT a
  Telegram poll); the Operator's talk/status/decide/notify loop + memory distillation.
  One-time HUMAN setup: a supergroup with Topics enabled + the bot as admin
  (manage-topics); bot token + bridge token stay in the extension-host env, never
  committed.

  EXISTING INFRA TO REUSE (verified 2026-07-11): bridgeServer.ts (BL-065) — authed POST
  route pattern (POST /gate-answer, BL-240), SSE text/event-stream egress, buildJsonRoutes
  table — with bridgeAuth.ts / bridgeToken.ts for auth; telegramClient.ts
  (sendTelegramMessage/getTelegramUpdates, BL-239) generalized to forum topics inside the
  bot; BL-240 gate-answer write path + BL-265 gate view (DECIDE); BL-239 run narration
  (NOTIFY); backlog.json / holistic UI data / operator status.json (STATUS); BL-275
  SUP-### store + memory-backed runtime; operator_runtime.bb + the Operator's long-term
  memory store.

  Operator prompt: the desk (talk/status/decide/notify) behaviour lands in the Operator
  prompt WITH the slices that add each function (specifier-owned prompt changes,
  sequenced with their slices — superseding the standalone support.prompt, which stays
  live for BL-275's merged machinery until it is folded into the Operator).

  Note: intakes live under .swarmforge/operator/ (operator domain, not the backlog
  root); left in place as source-of-record — not deleted by the specifier.

