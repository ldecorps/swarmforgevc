id: BL-129
title: adopt a real YAML parser (js-yaml) in backlogReader WITHOUT regressing free-form titles/fields that the current lenient parser tolerates
milestone: M2
status: todo
priority: 03
assigned_to: specifier

description: |
  OPERATOR DIRECTIVE (2026-07-06): replace the hand-rolled backlog YAML parser
  with a real library. js-yaml has ALREADY been installed as an extension
  dependency (`extension/package.json`, ^5.2.1) — this ticket is the safe
  wire-in, which is NOT a drop-in swap.

  Current state: `extension/src/panel/backlogReader.ts` parses tickets with a
  lenient, line-based regex extractor (`parseYamlScalar` / `parseYamlList`,
  CRAP-reduced in BL-082). It reads only known fields and TOLERATES free-form
  values that are not strictly valid YAML — notably titles containing a colon
  followed by a space, block-mapping quirks, and odd indentation.

  Why a naive swap regresses (measured 2026-07-06): running strict `js-yaml`
  `load()` over all ~130 real backlog tickets DROPPED 5 of them (parse error →
  the ticket silently disappears from the panel and any consumer of
  readBacklog):
    - BL-128-coordinator-specifier-separate-mailboxes.yaml (ACTIVE)
    - BL-097-backlog-dashboard-pwa-pages.yaml (ACTIVE)
    - BL-093-pane-input-injection-unreliable-no-submit-verification.yaml (ACTIVE)
    - BL-019-traceability-tags.yaml
    - BL-018-item-completion-loop.yaml
  Errors were "bad indentation of a mapping entry" and "a multiline key may not
  be an implicit key". A synthetic `title: BUG: it broke` also throws, while
  `title: "quoted: fine"` parses — i.e. the failures are exactly the free-form
  values agents/humans write today. A parser that hides active tickets is worse
  than the lenient one it replaces.

  Design options for the coder to weigh (specifier to pick / scope):
  1. Strict-then-lenient fallback: try `js-yaml` load; on throw OR non-object
     result, fall back to the existing regex extraction. Real parser for the
     common case, zero regression for the gnarly 5. Cost: keeps both paths
     (watch CRAP — BL-082 just reduced this file's complexity).
  2. Author-time robustness: quote free-form fields (title/message) on write and
     add a one-time migration to quote existing ones, then adopt strict js-yaml
     alone. Cost: a migration + an authoring rule the specifier/coordinator must
     enforce on every new ticket.
  3. Reject strict adoption; keep the lenient parser. Only if 1 and 2 are judged
     not worth it.

  Whatever is chosen, the mapping must preserve the exact BacklogItem contract
  that backlogReader.test.js pins: only known fields present (no stray keys from
  extra YAML like `evidence:`/`notes:`), optional fields omitted (not
  undefined) when absent, `priority` a number, invalid/missing id|title|status
  → null, malformed file → skipped not thrown.

acceptance: |
  Feature: robust backlog parsing with a real YAML library

  # BL-129 no-regression-01
  Scenario: every ticket the lenient parser reads today still parses
    Given the full current backlog (~130 tickets), including BL-018, BL-019,
      BL-093, BL-097, BL-128 whose titles/fields are not strict YAML
    When backlogReader parses them after adopting js-yaml
    Then no ticket that the lenient parser surfaced is dropped
    And a ticket with a colon-space in its title is still read

  # BL-129 contract-02
  Scenario: the BacklogItem contract is unchanged
    Given the existing backlogReader.test.js cases
    Then all pass unchanged: only known fields, optional fields omitted when
      absent, numeric priority, null on missing/invalid required fields,
      malformed files skipped rather than throwing

  # Non-behavioral gates:
  #  - js-yaml is already a dependency; do not add another YAML lib.
  #  - Keep this file's CRAP at or below the BL-082 level; if the fallback
  #    approach pushes it over, extract helpers.
