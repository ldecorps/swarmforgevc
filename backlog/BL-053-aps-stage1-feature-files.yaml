id: BL-053
title: "APS realignment stage 1: living feature files + gherkin-parser lint gate"
description: |
  Adopt the constitution realignment (new engineering.prompt +
  local-engineering.prompt already drafted by the human) and make Gherkin durable.

  - Create specs/features/ ; migrate the Gherkin acceptance blocks of ACTIVE and
    PAUSED backlog items into .feature files (one per behavior, APS naming:
    scenario name = feature name + stable index in a comment before each feature).
    Backlog YAML acceptance: field becomes a reference to the feature file(s).
    done/ items are NOT migrated.
  - Install the Babashka APS tools (gherkin-parser, IR-DRY checker) from
    unclebob/Acceptance-Pipeline-Specification PINNED at accaa33d503340c565
    13ef387258f8da929ba902; record the pin in swarmforge.lock.json.
  - Specifier gains the APS phases: write -> prune parameters/example columns ->
    IR-DRY normalize -> extract Background where meaning-preserving -> write e2e
    QA procedure -> human approval. Update specifier.prompt accordingly and drop
    its "this repo has no APS tooling / do not invoke those tools" clause.
  - gherkin-parser runs as a lint gate: specifier must have a clean parse before
    handoff to coder.
