id: BL-050
title: "URGENT bug: tile grid crams all agents into 2 narrow columns for >4 agents"
milestone: M4
status: todo
priority: 00
assigned_to: specifier

description: |
  URGENT raw human intake — specifier to drain first.

  With 8 agents the panel renders every tile in just two narrow vertical strips
  (coordinator + specifier at the top, the rest stacked below in the same 2
  columns), each too thin to read, with large empty space to the right and below.
  The arrangement is broken.

  Root cause (regression from BL-040 "first row = coordinator + specifier"):
  extension/media/panel.js `updateGridLayout(agentCount, roles)` adds the
  `layout-first-row` class whenever coordinator and specifier are present and the
  count is not exactly 4. That class' CSS (webviewHtml.ts `#grid.layout-first-row`)
  hardcodes `grid-template-columns: 1fr 1fr` for the ENTIRE grid, so all N tiles
  are forced into 2 columns — unreadably narrow at 8 agents while horizontal space
  is wasted.

  Desired: the tiles should fill the available panel width in a sensible,
  responsive grid for any agent count (5–8+). If the dedicated coordinator +
  specifier first row is kept, it must NOT constrain the remaining agents to 2
  columns — they should flow in a multi-column grid that uses the width. Preserve
  the 4-agent 2x2 layout and the selected-tile growth behavior.

acceptance: |
  (Specifier to express as Gherkin. Sketch of the observable behavior:)
  - With 8 agents, tiles are laid out to fill the panel width (no 2-narrow-column
    strips, no large wasted empty region); every tile is readable.
  - Works across agent counts 5–8 and across panel widths (narrow side panel and
    wide editor column).
  - The 4-agent 2x2 layout and selected-tile growth still work.
  - If a coordinator/specifier first row is retained, the rest of the grid is not
    limited to 2 columns.
  - Covered by webview layout tests (column behavior for >4 agents; first row does
    not force 2 columns on the remainder).
