id: BL-144
title: "Daemon-death alarm: when handoffd dies, halt the swarm and capture why (no silent auto-restart)"
milestone: TBD
status: todo
priority: 01
source: "operator request 2026-07-06 (chat with coordinator): 'some serious alarm has to ring when the daemon falls. a good one would be to stop everything, produce a log of why the daemon stopped, and then stop everything so we can fix the daemon.'"

description: |
  Raw operator ask, not yet specced. Observed context: handoffd_supervisor.bb
  already detects handoffd death and silently restarts it (see
  .swarmforge/daemon/handoffd.status.json restart_history / last_incident
  today). The operator wants the OPPOSITE failure posture for this
  condition: instead of a silent auto-restart, a loud, unmissable signal
  (an "alarm") should fire, a log capturing why the daemon stopped should
  be produced, and the whole swarm should be stopped so a human can fix
  the daemon before anything resumes.

  Operator follow-up (2026-07-06, same chat) answers two of the open
  questions below:
  - "The daemon should help with handoff and other things. I suppose there
    should only be one." — operator direction is to consolidate to a
    SINGLE daemon process owning handoff delivery AND the chase/watchdog
    duties that today are split between handoffd.bb (babashka, confirmed
    running) and the extension-host chase/ChaseMonitor + swarm/inboxChaser
    (TypeScript, NOT currently running as a live process — see this
    session's earlier finding). That consolidation is itself in scope here,
    not a separate ticket: the alarm this ticket wants needs a daemon that
    is actually watching liveness end-to-end, and today no single process
    does that.
  - "We have to introduce the concept of notifications (email seems a good
    one to start with)." — operator wants a general, reusable notification
    mechanism, starting with an email channel, rather than a one-off alert
    bolted onto this ticket alone. Prior art already exists and should be
    reused/generalized, not duplicated: BL-073 (done, M6) already built an
    email path (Resend API, swarmforge.notify.email.to setting) for
    "agent needs human" alerts, and BL-099 (paused, daily briefing) already
    plans to reuse that same path. This ticket's alarm should be a new
    notification TYPE routed through that same generalized mechanism, not
    a third independent email integration.

  Still needs specifier follow-up before writing the real spec + Gherkin
  acceptance:
  - What is "the alarm" concretely beyond email — also a blocking tmux
    banner / desktop notification, or is email-only sufficient for v1?
  - "Stop everything" — kill all tmux panes/sessions immediately, or
    quiesce (let in-flight work finish/checkpoint) before stopping?
  - Where does the failure log live, and what must it contain (last N
    daemon.log lines, restart_history, last known outbox/inbox state,
    timestamp) so a human can diagnose without reconstructing state by hand?
  - Should this replace the current silent-restart behavior entirely, or
    only escalate to alarm+halt after N silent restarts fail to keep it up?
  - Scope check for the single-daemon consolidation: does merging
    handoffd's babashka process with the extension-host chaser's
    TypeScript logic belong in this ticket, or should it be split into its
    own prerequisite ticket that this one depends on?
