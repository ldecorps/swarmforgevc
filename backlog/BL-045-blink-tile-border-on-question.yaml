id: BL-045
title: blink the tile border when an agent is asking the human a question
milestone: M4
status: todo
priority: 06
assigned_to: specifier

description: |
  Raw human intake — specifier to drain and spec.

  When an agent is waiting on the human — asking a clarifying question, or showing
  a prompt that needs a human decision (a permission/approval prompt, a yes/no,
  or a multiple-choice "❯" selection) — the agent's tile border should blink /
  pulse to draw the human's attention across an 8-tile panel.

  This is a new "needs human attention" state, distinct from the existing tile
  states: stalled (steady yellow border) and dead (steady red border). The blink
  should be visually unmistakable but not obnoxious (a gentle pulse), and it must
  stop as soon as the human responds and the agent resumes working.

  Open questions for the specifier to resolve with the human and the coder:
  - How to detect "asking a question" from the tmux pane capture — e.g. recognize
    the Claude TUI permission dialog / question prompt / "❯" selection state,
    versus normal idle-at-input-box. This detection heuristic is the crux.
  - Blink color/animation and how it composes with the stalled/dead borders and
    the selected/highlighted tile styles (precedence when multiple apply).
  - Whether to also surface it elsewhere (e.g. a badge or the header), but the
    core request is the blinking border.

acceptance: |
  (Specifier to express as Gherkin. Sketch of the observable behavior:)
  - When an agent's pane is awaiting a human answer, its tile border blinks in a
    distinct style, different from stalled (yellow) and dead (red).
  - When the human responds and the agent resumes output, the blinking stops.
  - Blinking composes sensibly with selected/stalled/dead states (defined
    precedence, no flicker war between styles).
  - Covered by new webview tests for the question-state border class and the
    detection signal that drives it.
