id: BL-118
title: RELIABILITY (top priority) — make the handoff mechanism rock-solid — DELIVERY-level breakage detection + automatic agent-driven RECOVERY (no silent dead-letters, no human babysitting)
milestone: M2
status: todo
priority: 00
assigned_to: specifier

description: |
  OPERATOR DIRECTIVE (2026-07-05): "Absolute current priority is to fix the
  handoff mechanism. It keeps breaking all the time and that's not right. We
  have to have a way to detect when it breaks, and agents have to fix it. This
  auto-fixing behaviour has to be there." Treat this as the top of the queue.

  This is not a single bug — the handoff has been patched repeatedly and keeps
  regressing: BL-016 (fix handoff flow, prio 00, DONE), BL-056 (anchor state
  dir), BL-061 (supervise the daemon), BL-081 (dup-daemon restart race), BL-083
  (idempotent outbox archive). Each fixed one failure mode; the mechanism as a
  whole is still not trustworthy. This ticket is the systemic ask: make it
  self-detecting and self-healing so it stops needing a human.

  LIVE FORENSICS (captured 2026-07-05 ~10:49Z, read-only — no changes made):
    - `.swarmforge/daemon/handoffd.status.json` reports {"state":"healthy"}
      with a current heartbeat, AND a recent incident: daemon "dead" at
      08:30:33Z, supervisor restart at 08:30:43Z. Supervisor keeps the PROCESS
      alive — good — but that is the ONLY thing "healthy" means today.
    - `.swarmforge/handoffs/failed/` holds 3 dead-lettered parcels, from
      2026-07-02/03, still there days later, never retried or surfaced:
        * specifier -> coordinator  (note: "BL-084 specced… BL-034+BL-081 merged")
        * coordinator -> specifier
        * specifier -> coder
      Real coordination messages that silently vanished. This is the same class
      of loss BL-107 described ("coder's completed work sitting invisible in the
      cleaner's inbox").
  The gap in one line: health = "daemon process is alive", NOT "parcels are
  actually being delivered." A parcel can dead-letter into failed/ and rot
  forever while every dashboard shows green.

  Three capabilities the operator asked for (specifier to scope; may split into
  a DETECTION spec and a RECOVERY spec):

  1. ROCK-SOLID DELIVERY. Enumerate and close the recurring breakage modes:
     dead-letters to failed/, parcels stuck in inbox/new or inbox/in_process,
     daemon dead / heartbeating into a swarmless void (BL-107), duplicate
     daemons (BL-081), routing to a role that is not the live holder. Prefer
     at-least-once delivery with idempotent, acked handoffs over best-effort.

  2. DELIVERY-LEVEL DETECTION (authoritative, continuous). Beyond process
     liveness: watch queue depth and parcel AGE (a parcel older than N in
     new/in_process is a stall — cf. BL-067's 4h overnight miss), treat ANY
     file in failed/ as an alarm, and run a periodic synthetic CANARY handoff
     that must round-trip end to end; its failure is the definitive "handoff
     broken" signal. Surface all of this as a real transport-health state, not
     just healthy/restarting/persistent-failure (extend daemonHealth.ts).

  3. AUTOMATIC AGENT-DRIVEN RECOVERY (the core ask — "this has to be there").
     When breakage is detected, the swarm must self-heal WITHOUT a human:
     re-deliver dead-lettered/stuck parcels to the correct live holder, restart
     or de-dup the daemon, re-route on holder change, and re-attach consumers.
     Every remediation is logged and the recovery is verified (the canary goes
     green again). If, and only if, auto-recovery exhausts its retries does it
     escalate to a human (needs-human) — silent loss is never acceptable.
     Decide the OWNER of this loop explicitly: the supervisor, the extension
     watchdog (chaserMonitor/inboxChaser), a dedicated healer role, or the
     coordinator — and make sure that owner cannot itself be the single point
     of failure (see BL-107: coordinator exit tears the swarm down).

  Code seams (READ-ONLY findings): daemon swarmforge/scripts/handoffd.bb +
  handoffd_supervisor.bb + handoff-lib.sh; protocol swarmforge/handoff-protocol.md;
  extension health src/swarm/daemonHealth.ts; watchdogs src/watchdog/chaserMonitor.ts,
  src/swarm/inboxChaser.ts, src/swarm/respawnPickup.ts; queue dirs
  .swarmforge/handoffs/{new,in_process,completed,failed,outbox,sent}.
  Adjacent: BL-061/081/083 (daemon supervision — do not duplicate), BL-107
  (daemon teardown on coordinator exit), BL-109 (dead-letter mail from the
  pending-input heuristic), BL-067 (stall detection), BL-088 (dead-timer).

acceptance: |
  Feature: handoff delivers reliably and self-heals when it does not

  # BL-118 delivery-detection-01
  Scenario: a failed delivery is detected, not masked by a live heartbeat
    Given the handoff daemon process is alive and heartbeating
    When a parcel fails to deliver and lands in failed/
    Then transport health reports a delivery-level failure (not "healthy")
    And the stuck/dead-lettered parcel is reported with its age and route

  # BL-118 canary-02
  Scenario: a periodic synthetic handoff is the authoritative liveness signal
    Given the swarm is running
    When the canary handoff is injected on a schedule
    Then a successful round-trip marks the transport healthy
    And a canary that does not arrive within its budget marks it broken

  # BL-118 auto-recovery-03
  Scenario: the swarm re-delivers stuck/dead-lettered work without a human
    Given a parcel is dead-lettered or has stalled past its age threshold
    When the recovery owner runs
    Then the parcel is re-delivered to the correct live holder (idempotently)
    And the remediation is logged
    And the canary/health returns to green after recovery
    And only after retries are exhausted is it escalated as needs-human

  # BL-118 no-silent-loss-04
  Scenario: no coordination message is ever silently lost
    Given the three currently-dead-lettered parcels (or equivalents)
    Then the new machinery either re-delivers them or surfaces them to a human
    And none can sit unresolved in failed/ indefinitely

  # BL-118 recovery-owner-05
  Scenario: the recovery owner is not a single point of failure
    Given the daemon or an agent that owns recovery has itself died/exited
    Then recovery still occurs (supervised/redundant owner)
    And the swarm is not torn down as a side effect (cf. BL-107)

  # Non-behavioral gates:
  #  - Build on the existing supervisor/health/chaser seams; do NOT re-litigate
  #    BL-061/081/083 scope — this is detection + recovery layered on top.
  #  - Tested through the messageBus/handoff and daemonHealth fakes (injected
  #    queue state, injected canary results); NO live babashka daemon or tmux
  #    in tests.
  #  - Specifier: split into a DETECTION spec and a RECOVERY spec if that keeps
  #    each parcel within the complexity threshold.
