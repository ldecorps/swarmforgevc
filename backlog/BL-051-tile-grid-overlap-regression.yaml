id: BL-051
title: "URGENT bug: BL-050 attempt regressed tile grid — tiles now OVERLAP"
milestone: M4
status: todo
priority: 00
assigned_to: specifier

description: |
  URGENT raw human intake — specifier to drain first. Supersedes the current
  approach in BL-050, which made the panel worse, not better.

  With 8 agents the tiles now OVERLAP: the header shows garbled, stacked text
  ("Specifier"/"Coordinator" drawn on top of each other) and the grid is
  unusable. Previously it was 2 narrow columns; the BL-050 change turned that
  into overlapping tiles.

  Root cause of the regression (both already on main):
  - webviewHtml.ts `#grid.layout-first-row` is `grid-template-columns: repeat(3,
    minmax(0,1fr))` with `grid-template-rows: auto 1fr`, and every non-first-row
    tile is pinned to `grid-row: 2` (`#grid.layout-first-row .tile:not(.first-row)
    { grid-row: 2 }`). With 6 non-first-row agents forced into ONE row of 3
    columns, tiles land on top of each other → overlap.
  - The first-row targeting uses `.first-row:nth-of-type(1|2)`, but `nth-of-type`
    counts among ALL tiles, so it does not reliably select coordinator/specifier.
  - panel.js `updateGridLayout` still adds `layout-first-row` for any count != 4
    when coordinator+specifier exist, so 5–8 agents all hit this broken path.

  Fix direction — STOP patching the fragile fixed-row / nth-of-type / hardcoded-
  column scheme. Replace it with a plain responsive grid that flows and wraps:
  - Use `grid-template-columns: repeat(auto-fill, minmax(<sensible min>, 1fr))`
    and `grid-auto-rows` so all N tiles wrap to fill the panel width with no
    overlap, at any agent count and any panel width.
  - Drop the special "first row = coordinator + specifier" constraint entirely
    (it is the direct source of both the 2-column cram and this overlap). If that
    grouping is still wanted later, it must be a separate, carefully-specced item
    — do not reintroduce it as part of this fix.
  - Keep the 4-agent 2x2 layout and the selected-tile growth, but verify they do
    not depend on the removed layout-first-row rules.

acceptance: |
  (Specifier to express as Gherkin. Sketch of the observable behavior:)
  - With 8 agents, no tiles overlap; every tile is a distinct rectangle with its
    own readable header, and the tiles fill the panel width (wrapping to as many
    rows as needed).
  - Holds for agent counts 5–8 and across narrow-side-panel and wide-editor
    widths.
  - The `layout-first-row` class and its nth-of-type/grid-row:2 rules are removed
    (or provably no longer force overlap); the 4-agent 2x2 and selected-tile
    growth still work.
  - Webview layout tests cover: >4 agents produce a multi-column wrapping grid
    with one grid cell per tile (no two tiles sharing a cell), and no reliance on
    nth-of-type for role placement.
