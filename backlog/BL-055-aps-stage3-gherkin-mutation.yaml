id: BL-055
title: "APS realignment stage 3: Gherkin acceptance mutation for the hardender"
description: |
  Depends on BL-054.

  - Install gherkin-mutator from the pinned APS ref; wire it into the pipeline
    (feature -> parser -> base IR -> mutator -> mutated IRs -> runs).
  - hardender.prompt gains soft Gherkin mutation: mutate Examples values in the
    IR and verify mutants are caught (example data actually connected to the
    system under test). Distinct from language mutation (Stryker), which the
    hardender keeps.
  - Mutation runs must emit periodic progress/status so the extension's stall
    detection can tell long work from a hang (aligns with the tile heartbeat
    last_tool display).
  - Mutation manifests are tool-owned: never hand-edited (shared Guardrails).
  - This satisfies the hardender's standing "no tooling configured -> do not
    improvise" guard for the acceptance side; revisit the cleaner's language-
    mutation duties once Stryker is configured, per the model-tier decision.
