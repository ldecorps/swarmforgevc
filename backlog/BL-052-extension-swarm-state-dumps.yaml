id: BL-052
title: "extension/swarm stability — dump last known state on shutdown/failure"
milestone: M4
status: todo
priority: 01
assigned_to: specifier

description: |
  Raw human intake for specifier.

  The SF extension is highly unstable. When the extension goes down (including
  close/crash/reload), we need a dump of its last known state so recovery and
  debugging are possible.

  Required behavior:
  - Extension side: on shutdown/failure, emit a dump that includes:
    - its last known internal state
    - any known information about the swarm
    - any known cause/reason for the shutdown/failure when available
  - Swarm side: same requirement for swarm shutdown/failure — emit a dump with
    last known swarm state, relevant context, and known cause if available.

  The dump output should be durable enough to inspect after restart.

acceptance: |
  (Specifier to express as Gherkin. Behavior intent sketch:)
  - Given the extension is running
    when it is closed or goes down
    then a dump is produced containing its last known state, swarm info, and
    known cause (if known).
  - Given the swarm is running
    when it is closed or goes down
    then a dump is produced containing its last known state and known cause
    (if known).
  - Dump artifacts remain available after restart for diagnosis.
