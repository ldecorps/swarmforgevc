id: BL-057
title: "bounce watcher resilience: never silently dead"
description: |
  extension/src/swarm/bounceWatcher.ts + extension.ts wiring. Today the watcher
  is silently absent in two cases:
  - startBounceWatcher returns null when .swarmforge/ does not exist at
    activation, and nothing ever retries -> remote_bounce.sh writes a sentinel
    nobody watches (fresh target before first launch).
  - fs.watch holds the directory inode; if .swarmforge/ is removed/recreated
    (target re-init) the watcher is orphaned without error.
  Fix: create .swarmforge/ (mkdir -p) before watching instead of returning
  null; restart the watcher after every successful launch/bounce (hook where
  startOrRestartChaserMonitor is already called); on watcher 'error'/'close',
  log and re-establish. Acceptance: remote_bounce.sh triggers a bounce when
  written (a) before any launch, (b) after target re-init, (c) after a bounce.
