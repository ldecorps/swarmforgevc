notes: |
  UX polish on top of BL-408 (approve works) and BL-409 (reject/amend
  verbs): add a Telegram inline keyboard (Approve / Amend / Reject buttons)
  to the ApprovalRequested message itself, so the human can tap instead of
  typing a reply. Typed replies (BL-408/BL-409) must keep working
  unchanged — this is an additional input path, not a replacement.

  IMPLEMENTATION SHAPE. Telegram inline keyboards are delivered via
  `reply_markup.inline_keyboard` on the sendMessage call that posts
  ApprovalRequested, and tapped buttons arrive as a `callback_query` update
  (distinct from an ordinary message update) in the same long-poll
  `getUpdates` stream `telegramFrontDeskBotCore.ts`'s `pollAndForward`
  already processes. Extend the poll cycle to recognize a `callback_query`
  update alongside its existing message-update handling, and route
  Approve/Amend/Reject taps to the SAME effects BL-408/BL-409 already
  implement (`recordApprovalReply` / the reject and amend handlers) rather
  than duplicating that logic behind a second code path — the button is
  another way to trigger the existing verb, not a new verb.

  An Amend tap needs a follow-up text prompt (there is no note to attach
  from a bare button tap) — on Amend, prompt the human to reply with the
  amendment text in the same topic, then process that reply exactly as
  BL-409's typed "amend <note>" path does. Do not silently drop the amend
  intent if no follow-up text arrives; leave the ticket pending as-is
  (a no-op is safe here, unlike the amend case in BL-409 which always has
  its note in hand).

  ANSWER THE CALLBACK. Telegram requires an `answerCallbackQuery` response
  to clear the tap's loading spinner on the button; do this for every
  callback_query the bot receives that matches one of these buttons, even
  the no-op cases (unknown/stale callback data), so the human's UI never
  hangs on a spinner.

  DEPENDS ON BL-408 AND BL-409: the buttons are a second entry point into
  verbs those tickets implement — do not reimplement the approve/reject/
  amend effects here.

  E2E QA PROCEDURE: post an ApprovalRequested message for a pending-review
  ticket and confirm it carries the three buttons; tap Approve and confirm
  the ticket flips to approved (same effect as typed "approve"); tap
  Reject and confirm it prompts/records a reason the same way BL-409's
  typed reject does; tap Amend, reply with a note, and confirm it is
  recorded as operator context with the ticket still pending. Confirm each
  tap clears its Telegram loading spinner.

