id: BL-026
title: bounce-extension command — reload extension without touching the swarm
milestone: M3
status: active
priority: 26
assigned_to: coder

description: |
  Add a VS Code command `swarmforge.bounceExtension` that reloads the extension
  host (and webview panel) without stopping the running swarm.

  Reload mechanism: call `vscode.commands.executeCommand('workbench.action.reloadWindow')`
  OR, if a lighter-weight option is available (e.g. deactivate + reactivate via
  the extension development host API), prefer that. The swarm's tmux session and
  handoff daemon must keep running through the reload.

  After reload the extension should reconnect to the already-running swarm by
  reading the existing `.swarmforge/` state (tmux socket, roles, run name) exactly
  as it does on a cold start when a swarm is already live.

  The primary use case is recovering a stale or crashed webview panel without
  interrupting the agents.

acceptance: |
  - Running `swarmforge.bounceExtension` reloads the extension/webview.
  - The tmux sessions for the swarm are still alive after the reload.
  - After reload the panel tiles reconnect and resume tailing their panes.
  - The run name and target path are restored from `.swarmforge/` state (no
    prompt required).

constraints: |
  - Do not kill or restart any swarm process.
  - If a full window reload is the only safe path, use it and document why a
    partial reload was not feasible.
  - Expose the command in package.json under the "SwarmForge" category.
