  Directive relayed by the human/Operator 2026-07-16; the data-source design fork (the intake's named
  "one real design decision") was surfaced by the specifier after verifying /pipeline carries no
  per-ticket stage, and settled by the human via AskUserQuestion 2026-07-16: ENRICH the pipeline state
  with each role's current in_process held ticket id (cheap current-state read, not the hop-log history,
  not the expensive /holistic git-walk); backlog folders feed the parked / awaiting-approval columns. The
  grid layout, exact column glyphs, and edge-trigger marker shape are build-time details, not a promotion
  gate. PRIORITY: promote ahead of the paused queue, but serialize against any ACTIVE conciergeTick.ts /
  front-desk-bot ticket (BL-414 / BL-425 / BL-434 / BL-450) — jumps the queue, does not run concurrent on
  the shared files.

