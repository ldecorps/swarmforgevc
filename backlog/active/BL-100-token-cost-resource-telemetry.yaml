id: BL-100
title: cost & resource telemetry — tokens per agent and per ticket, CPU/RAM per role, folded into trends, briefing, UI, and phone
milestone: M5
status: todo
priority: 02
source: operator request 2026-07-04 ("token consumption per agent, per ticket; cpu/ram; anything useful — rather too much than not enough")
depends_on: BL-096 (trend framework), BL-098 (telemetry log family + holding periods)

description: |
  Extend the metrics story with cost and resource telemetry. Operator
  stance: include generously — they will prune later. Everything lands in
  the BL-096 trend framework (series + windowed delta), the bridge/BL-094
  UI, the BL-099 briefing, and (at daily granularity) the BL-097 phone
  dashboard.

  Data sources (verified 2026-07-04, no new infrastructure):
    - TOKENS: the claude CLI already writes per-message usage
      (input/output/cache-creation/cache-read tokens) into JSONL
      transcripts under ~/.claude/projects/<cwd-slug>/, one directory per
      working directory — and each role's worktree gets its own slug, so
      per-agent attribution is a direct parse. Read-only; never modify
      these files.
    - PER-TICKET attribution: join transcript message timestamps against
      each role's ticket-holding windows (handoff dequeued_at ->
      completed_at from headers plus the BL-098 telemetry log). This is
      honest-approximate: label it "attributed", document the method;
      unattributable activity (idle chatter, startup) reports under an
      explicit "unattributed" bucket per role, never silently dropped or
      smeared across tickets.
    - COST: estimated dollars from a versioned model-pricing table
      committed in the repo (per-model input/output/cache rates). The
      table is data, not code; updating prices is a one-line PR. Cache
      reads priced separately so the cache-hit savings are visible.
    - CPU/RAM: the extension host samples each role pane's process tree
      (rss, %cpu) on a slow timer and appends to the BL-098 telemetry
      JSONL family (type: resource_sample). Also the extension host's own
      process. Local-only data, same posture as chase/nudge events.

  Deliverable metrics (the generous set; operator prunes later):
    - Tokens (in/out/cache-read/cache-created) and estimated cost: per
      agent per day; per ticket (attributed, with unattributed bucket);
      per model. Cost-per-closed-ticket alongside cycle time.
    - CPU/RAM: current and trend per role; host process included; flag
      the hungriest role in the briefing only when it changed
      meaningfully (trend framework decides "meaningfully").
    - Flow balance: backlog intake rate vs closure rate (specced/day vs
      closed/day) — the "are we sinking or draining" number.
    - Reliability roll-up (from BL-098 + handoffd state): chases, nudges,
      respawns, failed deliveries, daemon restarts, context-clears
      (BL-089 events) — per day, trended.
    - Swarm uptime: continuous-run duration, incident count (tmux/daemon
      down events where detectable).

  Surfaces:
    - Metrics module/CLI + bridge endpoint: full detail, live.
    - BL-099 briefing: a "cost & health" paragraph — tokens/cost
      yesterday per agent (one line), top-3 most expensive tickets to
      date, CPU/RAM anomalies only, flow balance, reliability counts —
      all as trends per the briefing's trend rule.
    - Phone (BL-097): daily granularity WITHOUT publishing runtime data
      to git directly — the committed daily briefing file is the carrier:
      the Action parses the latest docs/briefings/<date>.md metrics block
      (or a small committed sidecar docs/briefings/<date>.json emitted by
      the same briefing flow) into backlog.json. Live-granularity
      cost/resource data stays local to the bridge/UI.

  Scope: metrics module (transcript parser, attribution join, pricing
  table, resource-sample reader), host resource sampler (thin adapter),
  bridge/CLI additions, briefing content contract addition (BL-099 role
  text), Action/backlog.json additive fields (schema_version minor bump).
  Transcript parsing must tolerate unknown JSONL fields and missing dirs
  (role never ran here -> zeros).

acceptance: |
  Feature: token, cost, and resource telemetry with trends

  # BL-100 cost-01
  Scenario: per-agent daily tokens match the transcripts
    Given role worktree transcript JSONLs with known usage records
    When per-agent token metrics are computed for a day
    Then each role's input/output/cache totals equal the sum of its
      transcript usage entries for that day

  # BL-100 cost-02
  Scenario: per-ticket attribution is windowed and honest
    Given a role held ticket A for a known window and ticket B after it
    When per-ticket tokens are computed
    Then usage timestamped inside each window is attributed to that ticket
    And usage outside any holding window lands in the role's
      "unattributed" bucket

  # BL-100 cost-03
  Scenario: cost derives from the committed pricing table
    Given a pricing table version and known token totals
    When estimated cost is computed
    Then the dollar figures follow the table's per-model rates
    And cache-read tokens are priced at their own rate

  # BL-100 cost-04
  Scenario: resource samples become trends
    Given resource_sample telemetry lines across several hours
    When CPU/RAM metrics are queried
    Then per-role current values and windowed trends are reported

  # BL-100 cost-05
  Scenario: briefing carries the cost & health paragraph
    When the coordinator composes a briefing with telemetry available
    Then it includes per-agent cost one-liners, top expensive tickets,
      flow balance, and reliability counts, each with trend direction

  # BL-100 cost-06
  Scenario: phone sees daily figures via the committed briefing
    Given a committed briefing (or its json sidecar) with metrics
    When the Action regenerates backlog.json
    Then the daily cost/health figures appear in backlog.json
    And no runtime telemetry file was committed to git

  # BL-100 cost-07
  Scenario: absent data degrades to zeros
    Given a role with no transcript directory or no telemetry
    When any surface is queried
    Then zeros / "no data" render without errors

  # Non-behavioral gates:
  #  - Transcript parser is a pure function over provided JSONL lines
  #    (fake transcripts in tests); filesystem discovery is a thin tested
  #    adapter. ~/.claude transcripts are read-only inputs.
  #  - Pricing table is versioned data in-repo; no rates hardcoded.
  #  - backlog.json changes are additive (schema_version respected).
  #  - BL-096 trend function reused unmodified for every new series.
