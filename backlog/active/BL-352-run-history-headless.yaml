id: BL-352
title: "A swarm launched from the shell never appears in the run history — only VS Code commands append to it"
milestone: M8
type: defect
status: todo
severity: low
priority: 8
direction: expedite
depends_on: []
source: "backlog/evidence/BL-336-headless-dark-emitter-audit-20260713.md, finding H5 — BL-336's audit. The coder ranked it FOURTH of the five and explicitly called it lower severity than H1/H4: history/cosmetic, not a missed alert."

notes: |
  THE DEFECT. `extension/src/runs/runLog.ts:appendRun`/`updateLastRunForTarget` is only ever called
  by the `swarmforge.launchSwarm`/`stopSwarm`/`openPR`/`setRunMode` VS Code commands
  (extension.ts:238,1339,1625,1713). But the real swarm — including the one running on this box
  right now — is launched via `./swarm`/`swarmforge.sh`. So `runs.jsonl` never records the runs that
  actually happen, and the bridge's `/runlog` (part of the phone-card run history) shows a stale or
  empty list.

  SEVERITY IS GENUINELY LOW AND THE TICKET SHOULD STAY SMALL. This is a stale history, not a missed
  alert — nobody is unreachable because of it. It is included because it is the same
  silent-by-construction shape as the rest of the BL-336 audit, and because a run history that is
  quietly wrong is worse than one that is obviously absent. Do not gold-plate it.

  SCOPE:
    1. `swarmforge.sh`'s own launch path appends a run entry in the SAME shape `runLog.ts` already
       defines — reuse that shape, do not define a second run-record format.
    2. The stop path completes the run it started.
    3. The recorded run names the target it ran against.
    4. Launching from an editor must still record exactly one run, not two.
    5. OUT OF SCOPE: redesigning the run log or the `/runlog` surface; the other four BL-336
       findings.

  E2E QA PROCEDURE: launch a real swarm from the shell (not from VS Code — that path already works
  and is not the defect) and assert the run appears in `runs.jsonl` and on the bridge's `/runlog`.
  Stop it and assert the same run is completed, not duplicated. Then launch once from an editor and
  assert exactly one entry is written, not two.

acceptance:
  feature: specs/features/BL-352-run-history-headless.feature
  steps:
    - "Launching the swarm records a run"
    - "Stopping the swarm completes the run it started"
    - "The recorded run names what it ran against"
    - "A run launched from an editor is still recorded once"

