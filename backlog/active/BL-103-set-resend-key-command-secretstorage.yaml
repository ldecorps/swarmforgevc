id: BL-103
title: commands to store/clear the Resend API key in VS Code SecretStorage
milestone: M6
status: todo
priority: 03
source: operator request 2026-07-04 (wants the key in the editor's encrypted storage; resolveResendApiKey already reads that slot but nothing can write it)

description: |
  extension/src/notify/secrets.ts resolveResendApiKey() already checks
  VS Code SecretStorage under the key `swarmforge.resendApiKey` (after the
  RESEND_API_KEY env var) — but no command exists to populate it, so the
  env var is currently the only practical path. Close that gap:

    - `SwarmForge: Set Resend API Key` — masked input box (password
      style), stores the value in SecretStorage under the existing
      RESEND_SECRET_KEY constant. Empty input cancels without change.
      Confirmation message never echoes any part of the key.
    - `SwarmForge: Clear Resend API Key` — deletes the stored secret and
      confirms.
    - Resolution order stays exactly as today (env var wins over
      SecretStorage) and is stated in both commands' feedback so an
      operator with a stale env var is not confused about which key is
      in use.
    - The key value must never appear in logs, error messages, or
      telemetry (same redaction discipline resendClient already applies).

  Scope: two contributed commands in extension/package.json + a thin
  handler using the existing secrets.ts constants. The input-box UI layer
  is the untestable boundary; any non-trivial logic (resolution-order
  message, empty-input handling) sits in a pure tested helper.

acceptance: |
  Feature: the Resend key can live in the editor's encrypted storage

  # BL-103 secret-cmd-01
  Scenario: setting the key stores it retrievably
    When the operator runs the set command and enters a key
    Then resolveResendApiKey returns that key when no env var is set
    And the confirmation shows no part of the key

  # BL-103 secret-cmd-02
  Scenario: env var still wins
    Given a key in SecretStorage and a different RESEND_API_KEY env var
    When the key is resolved
    Then the env var value is used
    And the set command's feedback stated this precedence

  # BL-103 secret-cmd-03
  Scenario: clearing removes it
    Given a stored secret
    When the operator runs the clear command
    Then resolveResendApiKey (no env var) returns undefined

  # BL-103 secret-cmd-04
  Scenario: empty input is a safe no-op
    When the operator runs the set command and submits nothing
    Then any previously stored secret is unchanged

  # Non-behavioral gates:
  #  - No key material in logs/messages; existing secrets.ts constants
  #    reused, not duplicated.
