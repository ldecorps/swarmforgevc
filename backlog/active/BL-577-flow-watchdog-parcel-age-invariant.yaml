notes: |
  MATERIALIZE THE DRAFT (BL-441 guard): the acceptance scenarios live in
  specs/features/BL-577-flow-watchdog-parcel-age-invariant.feature.draft
  because a live .feature with unhandled scenarios hard-fails the
  acceptance runner (BL-233). The coder MUST, in the implementation
  parcel: rename the .feature.draft to .feature, wire its step handlers,
  and update this acceptance: path — all in the same commit. Do not leave
  the draft shadowing an implemented feature.

  QA e2e procedure (live-swarm verification after the pipeline gates):
  1. In the effective conf, set flow_watchdog_warn_ms 60000 and
     flow_watchdog_escalate_ms 240000; restart handoffd via
     start_handoff_daemon.sh so the sweep reads them.
  2. Send a real note via swarm_handoff.sh to a dormant role (e.g.
     documenter) and let it sit. Within one sweep after 60s, verify
     EXACTLY ONE alarm line in
     .swarmforge/operator/telegram-reply-outbox.jsonl (and the OPERATOR
     Telegram topic) naming the parcel id, from->to, type note, age,
     holder mailbox, and verb rotate. Verify chase/liveness surfaces
     still read green throughout.
  3. Wait past 240s: verify exactly one escalate re-alarm, and no other
     repeats between tiers.
  4. Have the role process the parcel (rotate + ready_for_next.sh);
     verify no further alarms and the parcel's entry clears from
     .swarmforge/daemon/flow-watchdog-state.json.
  5. Corrupt the two conf lines (e.g. flow_watchdog_warn_ms banana),
     restart handoffd, re-send a note: verify the watchdog still alarms
     on the 900000 ms default — degraded, never disabled.
  6. Restore the conf and restart handoffd.

out_of_scope: |
  - Fixing any specific stall cause (BL-576, BL-537 et al own fixes).
  - Auto-remediation (auto-rotate/auto-expedite on alarm) — a later
    BL-429-family slice once detection has soaked; this ticket detects
    and prescribes, a human/operator acts.
  - Replacing chase escalation state or the daily briefing.
  - Email as an alarm channel.
  - The snooze WRITER (human-ack flow from Telegram) — this ticket only
    honors snooze state already present in the state file.
