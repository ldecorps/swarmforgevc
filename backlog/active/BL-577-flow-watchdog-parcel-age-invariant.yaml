source: |
  Human, 2026-07-23, after reviewing why NO existing self-heal layer caught
  either of the day's flow gaps: "isn't there a self heal functionality to
  pick up on these swarm process gaps?" — answer mapped in-session: every
  healer (chase/nudge/respawn, swarm ensure, BL-530 config self-heal,
  BL-537 session heal, babysitter, supervisors) measures LIVENESS, not
  FLOW. All signals read green while (a) the architect's git_handoff
  starved 60+ min behind the chase wake-budget bug (fixed 85a8f2c76),
  (b) specifier notes sat dead-lettered 10h (BL-576 filed), and (c) BL-549
  stalled unforwarded at cleaner for hours — noticed only by the DAILY
  briefing. Sharpest finding: the one alarm that would have fired —
  stuck-escalation email — is deliberately suppressed for dormant roles
  (should-send-stuck-escalation-email?, anti-flood), and its fallback
  record (chase-escalations.json) is read by nothing proactively. The
  flood-protection silenced the detector instead of fixing its
  destination.

description: |
  ## The invariant (one rule, catches the class)

  Every parcel in any .swarmforge/handoffs mailbox (inbox/new AND
  inbox/in_process, every role incl. master-resident coordinator/specifier
  paths and worktree mailboxes — the handoff-search-must-cover-worktrees
  lesson) must progress within a threshold, measured from the parcel's own
  enqueued_at/created_at header (never mtime). A parcel over threshold is
  a FLOW-STALL finding regardless of type (git_handoff, note, broadcast),
  role dormancy, or what any liveness signal says. Root-cause-agnostic by
  design: BL-576 fixes one known cause; this catches the class including
  causes not yet met.

  ## Alarm path — unsuppressable by design

  The email-flood lesson is: fix destination + dedup, never existence.
  - Destination: Telegram (operator/standing topic per BL-434 conventions),
    not email — dormant roles cannot be "attached" but CAN be rotated or
    expedited (BL-567), so the alarm is actionable.
  - Dedup/pacing: one alarm per parcel per escalation tier (warn at
    flow_watchdog_warn_ms, escalate at flow_watchdog_escalate_ms),
    re-alarm only on tier change — never a 12s spam loop, never silence.
    No role-based, type-based, or dormancy-based suppression clause may
    exist in the alarm predicate; per-parcel snooze (human ack) is the
    only mute, and it is visible state.
  - Payload: parcel id, from->to, type, age, holding mailbox, plus the
    prescribed unblock verb (rotate / expedite / investigate) so the
    human or operator can act without archaeology.

  ## Design (specifier, 2026-07-24) — where it runs and how

  HOST: a handoffd sweep sibling on the existing chase cadence — the
  ticket's option (a), the "acceptable composite". Rationale: handoffd
  already owns the three hard parts — role enumeration via the ONE shared
  mailbox resolver (roles.tsv -> handoff-lib/load-role-info ->
  handoff-lib/mailbox-dir, BL-128), which transparently covers
  master-resident AND worktree mailboxes; parcel-header parsing
  (handoff-header-field already reads enqueued_at/created_at in
  role-mail-row); and the durable Telegram OPERATOR-topic outbox
  (.swarmforge/operator/telegram-reply-outbox.jsonl — the exact
  endless-loop-halt / disk-space alarm path, bridge polls and posts).
  All three 2026-07-23 incidents happened with handoffd ALIVE, so a
  handoffd-hosted watchdog catches the incident class; whole-daemon death
  is covered by the existing handoffd_supervisor death-alarm chain.

  SHAPE: pure decision core in a new swarmforge/scripts/flow_watchdog_lib.bb
  (unit-tested like chase_sweep_lib), driven from handoffd's sweep loop.
  - Sweep domain: for every roles.tsv role, the :new and :in_process dirs
    from mailbox-dir. Scan with the existing scan-inbox-new /
    scan-in-process helpers.
  - Age: enqueued_at header, falling back to created_at — never mtime
    (same precedence as mono_router_lib's note-aged?, BL-576).
  - Decision core: pure fn over {age-ms, warn-ms, escalate-ms,
    highest-tier-alarmed, snoozed?} -> :none | :warn | :escalate.
    STRUCTURAL no-suppression guarantee: the input map carries no role,
    type, or dormancy key — a unit test asserts the allowed-key set
    (acceptance 3's structural leg).
  - Durable state: .swarmforge/daemon/flow-watchdog-state.json keyed by
    parcel id -> {tier, alarmed-at, snoozed?}. Entry cleared when the
    parcel leaves new/in_process (claimed to completion, abandoned, or
    reaped) — a progressed parcel never re-alarms. Snooze is READ-side
    only in this ticket; the human-ack writer flow is a later slice.
  - Alarm emit: append {"threadId": "OPERATOR", "text": ...} to
    telegram-reply-outbox.jsonl; text carries parcel id, from->to, type,
    humanized age, holding mailbox (role + new|in_process), verb.
  - Verb table (pure, outside the suppression-free tier decision):
    holder role has no live session -> rotate; in_process with live
    session -> investigate; inbox/new with live session -> expedite
    (BL-567).
  - Conf: `config flow_watchdog_warn_ms 900000` and
    `config flow_watchdog_escalate_ms 3600000` in the effective conf via
    backlog-depth-lib/conf-file-path (BL-216/BL-313 pattern); absent or
    malformed values fall back to those defaults, never disable.

  REMAINING BLIND MODES (stated per ticket):
  1. handoffd dead AND handoffd_supervisor's alarm chain broken
     simultaneously — nothing in this ticket watches the watcher's watcher.
  2. Telegram bridge/front-desk dead or parked: alarms are durably queued
     in the outbox but undelivered until it drains. Mitigation: every
     alarm is also written to handoffd's log and the state file; the
     daily briefing stays the backstop narrative layer.
  3. Work never enqueued as a parcel at all (dispatch gap) is out of this
     watchdog's domain — BL-222's dispatch-gap sweep owns that.

  ## Relations

  - Child of the BL-429 observe->diagnose->act epic (the observe leg for
    flow). Complements BL-537 (session heal) and BL-576 (aged-note
    actionability): those FIX causes; this DETECTS the class.
  - chase-escalations.json stays as-is; the watchdog supersedes it as the
    proactive surface (a slice may fold its state in).
  - The daily briefing keeps its stall narrative; the watchdog is the
    real-time layer beneath it.

