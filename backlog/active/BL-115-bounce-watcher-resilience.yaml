source: "root intake BL-057-bounce-watcher-resilience (renumbered: id BL-057 already used by done/M4 per-recipient-inbox ticket)"

description: |
  extension/src/swarm/bounceWatcher.ts + extension.ts wiring. Today the
  watcher is silently absent in two cases:
  - startBounceWatcher returns null when .swarmforge/ does not exist at
    activation, and nothing ever re-establishes it once the swarm later
    exists (BL-204: the watcher must NOT create .swarmforge/ — the launcher
    owns that — and remote_bounce.sh already refuses to write a sentinel
    when .swarmforge/ is absent, so there is no orphan-sentinel bug; the
    residual gap is only that a watcher absent at activation stays dead
    after the first launch).
  - fs.watch holds the directory inode; if .swarmforge/ is
    removed/recreated (target re-init) the watcher is orphaned without
    error.
  Fix: do NOT create .swarmforge/ (BL-204 forbids it; the launcher owns
  creation). Restart the watcher after every successful launch/bounce (hook
  where startOrRestartChaserMonitor is already called) so a watcher absent
  at activation is established once the swarm exists; on watcher
  'error'/'close', log and re-establish.

  SEQUENCING: BL-107 (bounce-all end-to-end, in paused/) adds bounce-ack
  machinery around this same watcher and names this ticket as adjacent
  scope that must not be duplicated. Coordinator must sequence the two —
  never concurrent; whichever runs second builds on the first.

acceptance: |
  Feature: a bounce sentinel is always watched, whatever came before

  # BL-115 bounce-watch-01
  Scenario: a watcher absent before launch is established once the swarm launches
    Given a fresh target where .swarmforge/ did not exist at activation, so no watcher started
    When a launch creates .swarmforge/ and a sentinel is later written
    Then the watcher has been established and the bounce is triggered

  # BL-115 bounce-watch-02
  Scenario: sentinel written after target re-init triggers a bounce
    Given the watcher was established and .swarmforge/ was then removed
      and recreated
    When the sentinel is written
    Then the bounce is triggered

  # BL-115 bounce-watch-03
  Scenario: sentinel written after a completed bounce triggers again
    Given a bounce has already been processed this session
    When the sentinel is written again
    Then the bounce is triggered again

  # BL-115 bounce-watch-04
  Scenario: a watcher error re-establishes the watch
    Given an established watcher
    When the watcher emits error or close
    Then the event is logged and the watch is re-established

  # Non-behavioral gates:
  #  - Tested through the existing bounceWatcher seams with fake fs/watch;
  #    no live tmux in tests.
  #  - Host-side only; two-layer rule unchanged.
mutation_cost: low
