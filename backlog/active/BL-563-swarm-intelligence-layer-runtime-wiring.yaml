source: |
  Human question 2026-07-23 ("are the model steward, prompt engine and related
  factory plugged in?"). Operator audited all three against the live tree. Answer:
  one of three is on the launch path, and even that one only partly. Evidence
  below is reproducible against HEAD as of 2026-07-23.

  Specifier firmed + sliced 2026-07-24 per the coordinator's promotion note;
  the original operator audit ("Finding" section) is preserved verbatim.

description: |
  ## Finding — the epic shipped a toolkit, not a capability

  BL-546 / BL-547 / BL-525 all landed and are tested, but only PromptEngine is
  reachable from a running swarm. The Steward→Factory→launch chain is an
  operator-driven CLI sitting beside the runtime rather than inside it. Four
  concrete gaps, each verified:

  ### 1. The Factory's decision is discarded at apply time

  `model_factory_lib.bb/cold-apply-plan` (line 161) returns a plan carrying
  BOTH `:overlay_path` (the materialised role→{agent,model,provider} map) and
  `:pack`. But the production seam reads only the pack:

      # model_factory_default_launch_seam.sh:16
      PACK="$(bb -e '... (:pack (json/parse-string ...))' -- "$PLAN_JSON")"
      # :40
      "$ROOT/swarm" "$ROOT" --pack "$PACK"

  `overlay_path` is never passed to `./swarm` and nothing else reads
  `assignment.json` — a repo-wide grep for `assignment.json` outside
  `model_factory_*` hits only test scripts. So a cold-apply relaunches onto an
  existing pack conf whose per-role models are whatever that pack already
  hardcodes. The per-role assignment the Factory just computed is written to
  disk and dropped. This is the single highest-value gap: it makes `assign`
  advisory even when an operator DOES run it.

  ### 2. Nothing invokes `assign` in the first place

  `swarmforge.sh` contains zero references to `model_factory` or
  `model_steward`. No daemon, operator sweep, cron, or coordinator path calls
  either CLI. The only documented entry point is a human typing
  `bb swarmforge/scripts/model_factory_cli.bb assign --mode quality`
  (docs/how-to/BL-525-model-factory-assign-and-apply.md).

  ### 3. Neither has ever run in this repo

  `.swarmforge/model-factory/` and `.swarmforge/model-steward/` do not exist.
  Both stores seed their state from a committed seed on FIRST read
  (`model_steward_store.bb/read-registry!` ← `swarmforge/model-steward/seed/models.seed.json`),
  so an absent state dir is positive proof of zero invocations — not merely
  "no recent activity".

  ### 4. PromptEngine is wired but model-blind

  Wiring is real and load-bearing: `swarmforge.sh:1028`
  (`write_agent_instruction_file`) calls `prompt_engine_cli.bb compose` and is
  the only way a launch path produces a system-prompt artifact. But the
  "model-aware" half of BL-546's own title is not live — `compose`'s `:model`
  key is metadata only by design in Slice 1 (`prompt_engine_lib.bb:216`), and
  the launch call site passes `agent`/`role`/`two_pack`/`overlay` with NO model
  argument at all. Today it is a centralised composer, not a model-aware one.

  ## Firmed slices (specifier, 2026-07-24)

  Slices 1 and 2 ship together in this ticket's single parcel. Slice 3 is NOT
  in this ticket — see "Trigger" below.

  ### Slice 1 — a Factory assignment changes what launches (gaps 1 + 3)

  Behavior contract (implementation shape is the coder's, constraints below):

  - When `.swarmforge/model-factory/assignment.json` is present, readable, and
    well-formed, its per-role model overrides the pack-derived model at the
    moment `write_claude_settings_file` produces
    `.swarmforge/launch/<role>.claude-settings.json`. Fields the overlay does
    not name (effort, provider, roles absent from the overlay) keep their
    pack-derived values.
  - A missing, unreadable, malformed, truncated, or empty overlay degrades to
    EXACTLY today's pack-derived behaviour and never aborts a launch — same
    degrade-never-crash posture as `backlog_depth_lib.bb`'s readers
    (`read-max-depth`, `read-recommended-cap`, `read-pause-state`). Reuse that
    reader pattern; do not invent a new one.
  - The seam gap closes: the overlay written by
    `model_factory_cli.bb cold-apply` must be the overlay the relaunched
    swarm's launcher consults — no dropped `overlay_path`. Whether that is an
    explicit path handoff into `./swarm` or the seam guaranteeing the overlay
    sits at the canonical `.swarmforge/model-factory/assignment.json` path
    before relaunch is the coder's choice; the contract is "the plan's freshly
    written overlay is the one consulted", provable against a stub launcher.
  - Model resolution (overlay-over-pack) must live in a pure, unit-testable
    decision function in a `.bb` lib (per Design And Testability), with
    `swarmforge.sh` as the thin IO edge calling it. Cover the decision table
    in the swarm-script unit suite (`swarmforge/scripts/test/`).

  ### Slice 2 — the call site passes the resolved model to compose (gap 4 wiring half)

  `write_agent_instruction_file` (swarmforge.sh:1028) passes the SAME resolved
  model slice 1 computed (overlay-or-pack) into `prompt_engine_cli.bb compose`.
  Observable now: the composed artifact's `:model` metadata records the true
  launch model instead of nothing. Adapter CONSUMPTION of that model is
  BL-574's scope (PromptEngine Slice 2) — this slice only makes the call site
  truthful, so BL-574 never has to touch `swarmforge.sh` (orthogonality with
  launcher-adjacent work). Same file as slice 1's settings writer, hence same
  parcel.

  ### Trigger — deliberately NOT here (gap 2)

  What causes `assign` to run stays exactly as today: a human CLI invocation.
  The autonomous-trigger fork (operator sweep on quota exhaustion vs
  coordinator-turn safe point vs status quo) has materially different blast
  radii — an automated cold-apply RESTARTS THE SWARM and can tear down live
  agents mid-ticket — and is a HUMAN ruling, filed separately as BL-616
  (`human_approval: pending` carries the options). Do not build any trigger in
  this parcel.

  ## Acceptance materialization (BL-233 / BL-441)

  Scenarios are parked in
  specs/features/BL-563-model-factory-runtime-wiring.feature.draft because the
  acceptance runner hard-fails on handler-less scenarios. The coder MUST, in
  the same parcel: rename the draft to `.feature` and wire step handlers for
  all six scenarios (slices 1 and 2 both land in this parcel, so no scenario
  outruns built code). Do not close this ticket with the draft unmaterialized.

  ## Sequencing hazard (coordinator)

  Slice 1 rewires the `swarmforge.sh` settings writer. Do not run this ticket
  concurrently with any other launcher-touching work (Concurrent Work
  Orthogonality).

acceptance: specs/features/BL-563-model-factory-runtime-wiring.feature.draft

qa_e2e_procedure: |
  Scenario 6 of the original sketch is deliberately e2e-only (live launch is
  environmentally unsuitable for the acceptance runner):
  1. Swarm-script unit suite green, including the new overlay-resolution
     decision tests.
  2. Acceptance suite green with the materialized
     BL-563-model-factory-runtime-wiring.feature.
  3. Against a real throwaway target: `bb swarmforge/scripts/model_factory_cli.bb
     assign --mode cheap`, then cold-apply; after relaunch, read every
     `.swarmforge/launch/<role>.claude-settings.json` and confirm the live
     per-role models match assignment.json; confirm one composed system-prompt
     artifact records the same model in its metadata.
  4. Delete `.swarmforge/model-factory/assignment.json`, relaunch, and confirm
     settings files are byte-identical to a pre-BL-563 launch of the same pack
     (regression proof that the wiring is additive).

out_of_scope: |
  - Any `assign` trigger beyond the human CLI — BL-616 (human ruling pending).
  - ModelFactory Slice 2 hot-swap (BL-525 Slice 2) — this ticket is cold path
    only: an assignment takes effect at the next launch/respawn, never
    in-place on a running pane.
  - Model Steward `evaluate` ingestion (BL-556) and role pane (BL-557).
  - Prompt calibration loop (BL-548) — still blocked by the human directive to
    promote only after GH-22/GH-23 forward pipeline work.
  - Adapter consumption of the passed model (BL-574 / PromptEngine Slice 2).
    This ticket only makes the compose call site pass the resolved model.
  - Changing any pack's committed `--model` values. The overlay layers over
    packs; it does not rewrite them.
