id: BL-109
title: BUG — pane-injection "pending input" heuristic misreads the idle Claude Code footer as unsubmitted text, so nudges to an IDLE recipient reliably fail and dead-letter mail
milestone: M2
status: todo
priority: 02
assigned_to: coder
evidence: backlog/evidence/BL-109-BL-121-BL-122-handoff-halt-20260706.md  # 2026-07-06 live halt: 13 dead-letters over 11h, all to idle roles (coordinator/specifier); nudge-to-idle dead-letter confirmed

description: |
  DEFECT (coordinator forensics, 2026-07-05): three routine `note` handoffs
  sent this session were silently lost. Evidence in the shared master
  worktree inbox (coordinator and specifier share one inbox --
  .swarmforge/handoffs/inbox/new/, see the Mailbox Recipient Isolation
  fix):
    - 00_20260705T084531Z_000292_..._from_specifier_to_coordinator (specifier's
      "BL-107/108 ready for promotion" note)
    - 00_20260705T084621Z_000293_..._from_coordinator_to_specifier (promotion
      routing note)
    - 00_20260705T084720Z_000294_..._from_coordinator_to_specifier (a chase
      note)
  All three now sit as `<name>.handoff.dead` with a `.dead.chase.json`
  sidecar reading `{"chaseCount":3}`. None were ever collected into
  in_process by either recipient's ready_for_next.sh -- the recipients
  never knew the mail existed.

  Root cause CONFIRMED WITH REPRODUCTION (2026-07-05, coordinator): both
  copies of the "pending input" heuristic --
  extension/src/swarm/verifiedInject.ts (pendingInputLine/hasPendingInput)
  and its duplicated Babashka mirror in
  swarmforge/scripts/handoffd.bb (pending-input-line/pending-input?,
  explicitly commented as mirroring the TS version) -- decide "does this
  pane already hold unsubmitted input?" by taking the LAST NON-BLANK LINE
  of a `tmux capture-pane -p` and checking it for a prompt marker
  (regex `[$#❯>]`). When a Claude Code pane is genuinely IDLE (not busy,
  not stuck), its last rendered line is the standing footer/status hint,
  e.g.:
    "  ⏵⏵ bypass permissions on (shift+tab to cycle)                    /rc"
  This line contains NONE of `$ # ❯ >` (verified: `grep -oE '[$#❯>]'`
  against the literal captured specifier footer returns no match, exit 1).
  Because HAS_MARKER fails to match, pendingInputLine falls through to
  "no marker at all -> treat the whole line as pending text" and returns
  the footer text trimmed (non-empty) -- so hasPendingInput/pending-input?
  answers TRUE, forever, for an idle pane. beginInjection then takes the
  "recover already-pending text" branch and NEVER TYPES THE ACTUAL WAKE-UP
  MESSAGE AT ALL; it only presses Enter a few times against the footer,
  which never disappears, and gives up after 3 attempts logging exactly
  "pane already held undelivered input and it still would not submit".
  This is the opposite of a busy/stuck confusion: it is a deterministic,
  100%-reproducible failure mode that fires specifically WHEN THE TARGET
  IS IDLE -- precisely the state a nudge exists to interrupt. Confirmed
  live 2026-07-05T08:57Z: handoffd's own notify! against the idle
  specifier pane hit this path and dead-lettered handoff 000295 within
  one delivery cycle; a direct raw `tmux send-keys -l <msg>` + `C-m`/`C-j`
  bypassing this heuristic entirely delivered the same message to the
  same idle pane immediately and the specifier began processing it.
  (A secondary, likely real but unconfirmed contributor: a pane captured
  mid-generation may show yet other transient footer/spinner chrome that
  could independently trip the same last-line-has-no-marker path -- worth
  checking, but the idle-footer case above is the confirmed, dominant
  cause and is sufficient on its own to explain all three lost notes.)

  Compounding defect: once dead-lettered (renamed to `<name>.handoff.dead`),
  the item is invisible to ready_for_next.sh/ready_for_next_task.sh (they
  only scan `inbox/new/*.handoff`). So even the recipient's own idle-time
  self-check ("if idle more than 2 minutes, run ready_for_next.sh") never
  recovers it -- a dead-lettered note is not a chased-then-eventually-seen
  note, it is a permanently silently dropped one, indistinguishable from
  success to the sender (swarm_handoff.sh reports HANDOFF QUEUED and never
  hears otherwise).

  Three defects, ordered by how directly they broke this:

  1. The marker regex misclassifies the idle-footer line as pending input.
     Fix the detection so it targets the actual input row (e.g. the
     rendered `❯` prompt line specifically, or the cursor position
     `tmux display-message -p '#{cursor_y}'` to locate the true input
     line) rather than "whichever line is last and non-blank" -- the
     latter is wrong whenever a TUI renders persistent chrome below the
     input box. Fix BOTH copies (verifiedInject.ts and handoffd.bb's
     mirror) or, better, stop duplicating the heuristic in two languages
     (DRY) and give handoffd.bb a way to reuse one definition.
  2. Once fixed, still distinguish "recipient is actively generating"
     (expected, self-resolving -- keep the mail in inbox/new/ and keep
     chasing on the existing interval, never dead-letter) from
     "recipient's pane truly cannot accept input" (unresponsive: use the
     existing liveness check -- dead/unknown/stuck -- as the actual
     dead-letter/respawn trigger, per isUnresponsiveLiveness, rather than
     retry-count alone).
  3. Dead-lettering with no recipient-visible recovery path is a silent
     mail loss. At minimum, a dead-lettered `note`/`git_handoff` should be
     surfaced somewhere a human or the coordinator can find it (a
     dead-letter listing/command, or the item, protocol allowing) rather
     than becoming invisible debris next to (functionally) a `.chase.json`
     sidecar that nothing reads back.

acceptance: |
  Feature: mail is not lost while the recipient is legitimately busy or idle

  # BL-109 idle-footer-not-pending-00
  Scenario: an idle pane's standing footer is never mistaken for pending input
    Given a pane capture whose last non-blank line is the idle status
      footer (no $/#/❯/> marker present)
    When the pending-input check runs against that capture
    Then it reports no pending input
    And the wake-up message is actually typed into the pane

  # BL-109 busy-not-stuck-01
  Scenario: a long agent turn does not dead-letter its own queued mail
    Given a recipient pane is actively generating a response for several
      minutes
    And a chase-eligible handoff is queued for that recipient
    When the chaser sweeps during that turn
    Then the handoff remains in inbox/new (never dead-lettered)
    And once the turn ends and the recipient goes idle, the recipient's
      next ready_for_next.sh sees the handoff

  # BL-109 unresponsive-dead-letter-02
  Scenario: a truly unresponsive pane still dead-letters or respawns
    Given a recipient pane whose liveness state is dead, unknown, or stuck
    And a chase-eligible handoff is queued for that recipient
    When the chaser sweeps past maxChases
    Then the handoff is dead-lettered or the role is respawned, as today

  # BL-109 dead-letter-visible-03
  Scenario: a dead-lettered item is discoverable, not silently gone
    Given a handoff was dead-lettered
    When a human or the coordinator inspects dead-letter state
    Then the item, its original recipient, and its content are easy to find

  # Non-behavioral gates:
  #  - Tested through existing seams (inboxChaser, verifiedInject fakes);
  #    no live tmux in tests.
  #  - BL-087/BL-088 (chaser false-positive respawn, tile-freeze isolation)
  #    are the adjacent tickets; this ticket must not duplicate their scope.
