id: BL-028
title: restore tile scrollback depth (~500 lines) — regression fix
milestone: M3
status: active
priority: 28
assigned_to: coder

description: |
  REGRESSION: agent tiles previously showed several hundred lines of history;
  now they show only the currently-visible pane contents because `paneTailer`
  calls `capturePane` without a `startLine`, so tmux captures only the visible
  area (no scrollback).

  Fix: pass a negative `startLine` (default -500) to `capturePane` from
  `paneTailer`. `capturePane` already accepts and threads through this argument
  to tmux's `-S` flag; the call site just never provides it.

  Make the depth configurable: add VS Code setting `swarmforge.tile.historyLines`
  (integer, default 500). Read it in `paneTailer` and pass `-historyLines` as
  `startLine`. If the setting is absent or <= 0, fall back to 500.

  TDD order (mandatory):
  1. Write a failing test asserting `capturePane` is invoked with `startLine`
     equal to `-historyLines` (spy/mock the underlying runner; check that `-S`
     `-500` appears in the tmux args).
  2. Wire the startLine through: read `swarmforge.tile.historyLines` in
     `paneTailer`, pass as `startLine` to `capturePane`.
  3. Contribute the setting in `package.json` under `swarmforge` configuration.
  4. All existing `paneTailer` and `tmuxClient` tests must still pass.

acceptance: |
  - `paneTailer` passes a negative startLine (default -500) to `capturePane` on
    every capture call.
  - tmux args include `-S -500` (or the value from `swarmforge.tile.historyLines`).
  - Setting `swarmforge.tile.historyLines` to another positive integer (e.g. 200)
    changes the captured depth accordingly.
  - Existing paneTailer / tmuxClient tests remain green.
  - No performance regression: depth capped at a reasonable ceiling (e.g. 2000)
    to prevent ballooning on long-running sessions.

constraints: |
  - Change lives in the extension only (paneTailer + package.json). Do not touch
    SwarmForge or the webview render path.
  - The `capturePane` signature in `tmuxClient.ts` already supports `startLine`;
    do not change it — only update the call site in `paneTailer.ts:141`.
  - Keep scrollback depth as a VS Code setting, not a hard constant, so users
    can tune it.
