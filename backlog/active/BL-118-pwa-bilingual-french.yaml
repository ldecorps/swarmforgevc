description: |
  Make the backlog dashboard PWA (BL-097, incl. the BL-117 documentation
  explorer) bilingual English/French.

  Operator-confirmed decisions (2026-07-05):
    - Depth: full — UI chrome bilingual AND documentation/ticket content
      machine-translated. Human-maintained parallel docs rejected (drift).
    - Default: ENGLISH by default, French on tap (operator revision
      2026-07-05). The app opens in English regardless of browser locale;
      the FR/EN toggle switches to French.
    - Gherkin: scenarios always display the canonical English text, even
      in FR mode, with a one-tap reveal of the French rendering; the
      English scenario remains the binding acceptance contract, the
      French is a courtesy rendering.

  Two tiers:

  1. Chrome (client): every UI string (nav, labels, buttons, status and
     stage names, offline/error notices) comes from a locale catalog with
     en + fr entries. First launch is English regardless of browser
     locale; a visible FR/EN toggle switches instantly without reload,
     and the choice persists across app restarts via the PWA's existing
     cache mechanism (no other browser storage).

  2. Content (Action-side): the BL-097/117 Action renderer publishes each
     translatable text (doc sections, ticket titles/descriptions, Gherkin
     scenario text) in BOTH languages inside the published artifact, so
     offline works fully in either language. French is produced by
     machine translation AT RENDER TIME with a content-hash cache: each
     source string's translation is stored keyed by the hash of its
     English source, only new/changed strings are sent for translation on
     a push, unchanged ones are reused — keeping publishes fast, cheap,
     and deterministic. The cache lives in the repo so builds are
     reproducible. Engine choice is the coder's (any MT API); its key is
     a GitHub Actions secret, never present in the client or the repo
     (Secrets rule). If translation of a string is unavailable (new
     string mid-publish, API failure), the artifact carries the English
     text for it flagged as untranslated — publishing NEVER fails or
     blocks on translation.

  Never translated: ticket ids (BL-xxx), file paths, commit hashes, code
  blocks, and Mermaid diagram sources — preserved verbatim in both modes.

  The client stays a pure renderer (BL-097 ruling): it picks the fr or en
  field from the artifact; it never calls a translation API and holds no
  translation logic or keys.

  Scope: locale catalog + toggle in the PWA client, translation pass +
  cache in the Action renderer, artifact schema gaining per-language
  fields, tests for the renderer's translation pass through its existing
  testable seams (fake MT engine — no live API in tests).

