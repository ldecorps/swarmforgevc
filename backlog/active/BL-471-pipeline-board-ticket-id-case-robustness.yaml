human_approval: >
  Swarm-proposed defensive hardening arising from a coordinator note whose specific LIVE claim did NOT
  reproduce (verified by the specifier 2026-07-16: no lower-case header exists in real state, BL-447 was
  merely unheld). No human sign-off required to promote — it is a low-severity robustness fix to BL-464's
  ticket-id join, not a new human-requested feature. The case-insensitive JOIN is the firm contract; the
  exact canonicalization seam and store key casing are build details. Serialize against any in-flight
  ticket touching pipeline_stage_lib.bb / the BL-464 feature file or its steps; otherwise freely
  schedulable as a light bug.

mutation_cost: low
