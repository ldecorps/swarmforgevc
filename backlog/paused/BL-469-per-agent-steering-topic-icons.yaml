  (specifier 📝, architect 🏗 'grue', coder ⌨️, cleaner 🧹, hardender 🛡 'first choice', QA 🔍,
  documenter 📚). Coordinator 🧭 (compass) chosen by the human 2026-07-16 via a specifier clarifying
  question, after the earlier proposal 🎼 was flagged as a notation glyph Telegram does not offer as a
  forum-topic icon. FIRM contract: the 8 role->icon pairs and that an unavailable icon is surfaced
  (skipped-unresolved-icon), never silently applied. Build-time details NOT gating: the exact table
  name/location, log wording, exact call structure. Icon-only (no BL-425 routing change, no board file
  change). Serialize on topicIcon.ts + conciergeTick.ts against BL-453 and the standing-topic cluster.
  NEW feature file specs/features/BL-469-per-agent-steering-topic-icons.feature — FLAGGED for human
  review before build.

