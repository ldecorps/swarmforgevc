source: "Decomposed from BL-142 provider-neutral contract epic (operator request 2026-07-06) by specifier 2026-07-09."

description: |
  Slice 2 of the provider-neutral contract epic. The fork's
  swarmforge/scripts/agent_runtime_lib.bb already normalizes agents and builds
  wake/bootstrap steps for claude/aider/grok/codex/copilot/mock, but it (a) still
  branches on brand NAME in places rather than on declared capabilities, and (b)
  covers only part of the lifecycle — there are no uniform step builders for the
  remaining verbs (health, stop, respawn) that orchestration needs.

  Wanted behavior:
  - Represent each agent's features as CAPABILITY flags (data), and have
    orchestration decide behavior by capability, not by hardcoded provider name.
  - Add uniform step builders for the missing lifecycle verbs (health, stop,
    respawn) alongside the existing wake/bootstrap, so orchestration drives every
    provider through one lifecycle surface.
  - Preserve behavior parity for every currently-supported agent.

  Constraints:
  - Extend agent_runtime_lib.bb; do not fork a parallel abstraction. Keep the
    existing Babashka test suite (agent_runtime_test_runner.bb) green and add
    capability/lifecycle coverage.
  - No real timers/sleeps in tests; drive time explicitly.

acceptance: |
  Feature: Fork orchestration branches on provider capabilities, uniform lifecycle

  # BL-206 capability-branching-01
  Scenario: capability flags replace provider-name branching
    Given a provider lacks a capability another provider has
    When orchestration decides behavior for that provider
    Then the decision reads the provider's capability flag, not its brand name

  # BL-206 new-provider-is-capabilities-02
  Scenario: adding a provider is declaring its capabilities
    Given a new provider is declared with its capability flags
    When orchestration runs its lifecycle
    Then no core orchestration function is edited to accommodate it

  # BL-206 lifecycle-verbs-03
  Scenario Outline: every lifecycle verb is available uniformly
    Given a supported provider
    When orchestration requests the <verb> step for it
    Then a step is produced for that provider without brand-specific branching

    Examples:
      | verb    |
      | health  |
      | stop    |
      | respawn |

mutation_cost: high
