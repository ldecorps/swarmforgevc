id: BL-516
title: "Operator Telegram console (slice 1): a phone-glanceable, single-allowlisted bot for /status /ensure /tunnel /help, supervised by the operator tick like the vscode tunnel"
milestone: M8
type: feature
epic: swarmforge-console
priority: 8
direction: human-requested
depends_on: []
source: "Human spec brief 2026-07-18 (upload 'Spec brief — Operator Telegram console (status slice)'). Specifier verified the tree and resolved the brief's 5 open questions + corrected 3 stale citations (BL-203/BL-233 and the file-placement constraint) with the human before speccing."

notes: |
  WHAT / WHY: a phone-glanceable console over the fleet — read swarm health + the tunnel URL and trigger
  ./swarm ensure from anywhere, with nothing exposed to the network (Telegram long-poll, no inbound port).
  A SEPARATE, tightly-allowlisted operator bot (its own token), supervised by the always-alive operator
  daemon exactly like the vscode tunnel. One-time token setup is the only human step; the daemon holds it
  up thereafter. Slice 1 of the Telegram operator surface; later slices (proactive alerts, repo
  onboarding, mini-app webview) are OUT OF SCOPE — build the seam, not the feature.

  RESOLVED DECISIONS (human, 2026-07-18):
    1. Poller form = supervised SUBPROCESS mirroring the tunnel (a long-poll blocks; the tick is ~1s, so
       the daemon only checks liveness per tick and the poller owns its own getUpdates loop).
    2. File form = operator_telegram.bb (babashka http-client), consistent with operator_runtime.bb /
       operator_ask.bb / operator_reply.bb.
    3. Secret = env var, its OWN bot token (a distinct operator bot, NOT the front-desk token) + an
       allowed-id env, passed to the subprocess via an explicit :extra-env allowlist exactly as
       front_desk_supervisor.bb (~L154/L305) does — never committed; 600-mode if ever written to disk.
       (The brief's "BL-233 secret store" is a phantom: BL-233 is the recruiter model-plans ticket.)
    4. Command set = /status /ensure /tunnel /help.
    5. /ensure = TWO-TAP confirm (reply asks to confirm; runs only on confirmation) AND single-flight
       (rejected/queued if an ensure is already running, incl. a tick-driven ensure).
    6. Placement = LOGIC in tracked swarmforge/scripts/ (new operator_telegram.bb + the ensure-telegram!
       hook edited into operator_runtime.bb, committed normally through the pipeline like BL-511 did);
       only runtime STATE/secrets live in gitignored .swarmforge/operator/. The brief's "all files under
       .swarmforge/ / do not touch swarmforge/scripts (BL-203)" was inaccurate — the operator logic layer
       IS swarmforge/scripts/, and BL-203 is an unrelated two-pack smoke-harness ticket. The real goal
       ("main stays clean for the coordinator") is met by keeping STATE/secrets out of git, not scripts.

  VERIFIED LIVE LAYER (grep before building; operator files are gitignored — confirm on the box):
    - swarmforge/scripts/operator_runtime.bb: ensure-tunnel! (~L1431) shells `bash <helper> ensure <root>`
      each tick (call site in tick! ~L1633), never throws into the tick, and no-ops under SWARMFORGE_SKIP_
      TUNNEL; read-tunnel-status reads tunnel.status.json and folds {state,url,...} into status.json.
      ADD ensure-telegram! beside it (same shape: liveness check + headless relaunch, SKIP_TELEGRAM no-op,
      never throws) and a read-telegram-console-status that folds the new block into status.json.
    - status.json already carries `tunnel` and `front_desk` blocks. ADD a distinct block
      `telegram_console: {state: ok|disabled|auth_lost, last_poll_at}` — named apart from the existing
      front_desk (support-bot) telegram surface so the two are never confused. Confirm the exact schema on
      the box before adding (the file is gitignored runtime state).
    - swarmforge/scripts/front_desk_supervisor.bb is prior art for a supervised Telegram long-poll bot +
      :extra-env credential passing — mirror its creds/kill-switch/sentinel discipline, but the console is
      a SEPARATE bot on the operator TICK, not an extension of the front desk (isolates the /ensure control
      surface from the public-facing support bot — human decision).
    - New operator_telegram.bb owns: the getUpdates long-poll loop, allowlist enforcement, command dispatch
      (/status /ensure /tunnel /help), the two-tap /ensure confirm state, single-flight ensure guarding,
      sendMessage replies, and the auth-loss backoff state machine. Keep the HEAVY decision logic as PURE
      functions (allowlist check, command dispatch, single-flight state, auth-loss transitions, status
      summary formatting) so a .bb test runner drives them directly; the live getUpdates/sendMessage HTTP
      is the untestable boundary and is injected as a fake in tests.

  HARD CONSTRAINTS (from the brief, verified/adjusted):
    - Kill switch: SWARMFORGE_SKIP_TELEGRAM=1 in the daemon env skips the poller entirely (mirrors
      SWARMFORGE_SKIP_TUNNEL); plus a `stop <root>` subcommand on operator_telegram.bb.
    - Sentinel-gated startup, same pattern as the tunnel.
    - Invalid/revoked token -> telegram_console.state: auth_lost, with BOUNDED backoff (per the shared
      bounded-retry rule — cap + backoff, never a crash loop); recovery = re-run the one-time token setup.
    - No token configured -> disabled cleanly; daemon otherwise unaffected.
    - Bot token + allowed id are secrets: never committed; env (or 600-mode file); no swarm data ever sent
      to a non-allowlisted id.
    - Per-tick ensure-telegram! must not slow or break the tick (operator_runtime tick tests stay green).

  SEAM (do NOT build here): the sendMessage-to-allowlisted-id primitive IS the seam slice 2 (proactive
  alerts) will add triggers to — keep it a reusable pure function, not inlined per command. No write path
  beyond /ensure; no mini-app webview (that frontend later becomes the Telegram webview — don't build a
  second one).

  ORTHOGONALITY (COORDINATOR): edits swarmforge/scripts/operator_runtime.bb (the ensure-telegram! hook +
  status.json fold). NOT orthogonal to any other in-flight ticket editing operator_runtime.bb / status.json
  (e.g. a follow-up to BL-511's front-desk cost capture, which also touches operator_runtime.bb) — sequence,
  do not run concurrently. The new operator_telegram.bb file itself is orthogonal.

acceptance:
  # Observable contract: a separate allowlisted operator bot, supervised by the operator tick, answers
  # /status (health + roles + tunnel URL + freshness), /tunnel (URL + state), /help (command list), and a
  # two-tap, single-flight /ensure (confirm -> ./swarm ensure once -> exit code + tail; a concurrent
  # /ensure is refused busy); a non-allowlisted sender gets nothing and is logged; SWARMFORGE_SKIP_TELEGRAM
  # or a missing token disables it cleanly (telegram_console.state: disabled); a dead poller is relaunched
  # headlessly each tick; a 401 sets telegram_console.state: auth_lost and backs off instead of crash-looping.
  feature: specs/features/BL-516-operator-telegram-console.feature

# QA end-to-end procedure (verify the scenarios hold in the live swarm):
#   1. On the box, export the operator bot token + allowed id envs and start the daemon; confirm the poller
#      launches headlessly and status.json shows telegram_console.state: ok with a fresh last_poll_at.
#   2. From the allowlisted phone: /status returns health + roles + tunnel URL + freshness within a few
#      seconds; /tunnel returns just URL+state; /help lists the commands.
#   3. /ensure returns a confirm prompt and does NOT run; confirm -> ./swarm ensure runs once, reply shows
#      exit code + a short tail; a second /ensure while one runs is refused busy.
#   4. Send a message from a NON-allowlisted id (a second Telegram account) -> no reply with swarm data;
#      confirm the ignore is logged.
#   5. Set SWARMFORGE_SKIP_TELEGRAM=1 and restart the daemon -> no poller; telegram_console.state: disabled;
#      tick otherwise healthy. Unset the token -> same disabled behaviour.
#   6. Kill the poller subprocess -> next tick relaunches it (no manual step). Point it at an invalid token
#      -> telegram_console.state: auth_lost, poller backs off (watch the log; no crash-loop), recovers after
#      re-running the token setup.
#   7. Run test/test_operator_telegram.sh (allowlist, kill-switch, auth-lost, single-flight /ensure,
#      disabled-when-no-token) — all pass — and confirm the operator_runtime tick tests stay green.

human_approval: approved
approval_context: >
  Draining your "Operator Telegram console (status slice)" brief into slice 1. I verified the tree and
  resolved your 5 open questions: poller = supervised subprocess mirroring the tunnel; file =
  operator_telegram.bb; secret = a distinct operator bot token via env (your "BL-233 secret store" was a
  phantom — BL-233 is the recruiter ticket; existing bots use TELEGRAM_BOT_TOKEN-style envs via an explicit
  :extra-env allowlist); and per your answers just now: command set /status /ensure /tunnel /help, /ensure
  is TWO-TAP + single-flight, and it's a SEPARATE operator bot (not the front-desk bot). One correction
  needs your awareness: your "all files under .swarmforge/ / don't touch swarmforge/scripts (BL-203)"
  constraint was inaccurate — the operator LOGIC layer (operator_runtime.bb, operator_tunnel.sh) already
  lives in tracked swarmforge/scripts/, and adding a tick-supervised ensure-telegram! must edit it there
  (normal pipeline commit); only runtime state + secrets stay in gitignored .swarmforge/ — which is what
  actually keeps main clean. Later slices (proactive alerts, onboarding, webview) stay out of scope; this
  slice builds the reusable sendMessage seam they'll need. Sign off if that all matches your intent.

mutation_cost: low
