source: "Decomposed from BL-142 provider-neutral contract epic (operator request 2026-07-06) by specifier 2026-07-09."

description: |
  Slice 4 (final) of the provider-neutral contract epic. Metrics and log fields
  differ across providers, so cross-provider comparison (which brand is slower,
  failing, idling) requires brand-specific handling in every reader.

  Wanted behavior:
  - Define a common set of observability fields (comparable metric/log keys) that
    every provider adapter/descriptor emits — e.g. provider name, lifecycle-state
    transitions, error category (from BL-207), and the timing signals already
    tracked — using the same key names and shapes regardless of brand.
  - Existing per-provider readers (metrics module, bridge JSON, operator views)
    read those common fields without brand-specific branches.

  Constraints:
  - Additive to existing telemetry (do not break current readers); reuse the
    JSONL/metrics surfaces already in place rather than inventing a parallel one.
  - Absent/empty telemetry for a provider reads as zeros/empty, never an error.

acceptance: specs/features/BL-208-provider-observability-parity.feature
