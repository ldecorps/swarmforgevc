id: BL-354
title: "An answer typed in another topic is silently lost, and the human is then nagged for the answer he already gave"
milestone: M8
type: defect
status: needs_design
severity: high
priority: 3
direction: expedite
depends_on: []
source: "backlog/INTAKE-cross-thread-answer-pairing.md — Operator, live incident 2026-07-13 (not a guess; it fired today)."

notes: |
  WHAT HAPPENED, VERIFIED IN CODE AND ON DISK. The Operator asked a clarifying question via
  `operator_ask.bb` in thread SUP-4 ("free-email-scanner is not reachable — tell me 1, 2, or 3") and
  `awaiting-answer.json` recorded `{question, thread_id: "SUP-4", asked_at_ms}`. 79 seconds later
  the human answered — "3" — but he typed it in SUP-2, the thread he had been living in all day.

  THE MECHANISM. `resolve-pending-answer` (`swarmforge/scripts/operator_lib.bb:332`) matches the
  pending question by THREAD ID. Its only live caller is the reply-context writer in
  `swarmforge/scripts/operator_runtime.bb:751` (`pending? (operator-lib/resolve-pending-answer
  awaiting thread-id)`). SUP-2 ≠ SUP-4, so `pending?` was false, and two things followed from that
  one boolean:
    - the answer was NEVER PAIRED: `telegram-reply-context.json` carried no `:pending-question` /
      `:answer`, so the woken Operator saw a bare, contextless "3";
    - `clear-awaiting-answer!` (operator_runtime.bb:753) never fired, so the await state stayed
      pending and `awaiting-answer-sweep!` (operator_runtime.bb:453) was primed to escalate
      "[still needed] <question>" back into SUP-4 — nagging the human for an answer he had already
      given.
  Worse, a concurrent front-desk reply told him verbatim: "'3' — I can't tell what that's picking.
  There's no numbered list open on my side right now." We asked him a numbered question and then
  told him his number was meaningless.

  WHY THIS IS NOT THE REPLY-ROUTING TICKET. BL-355 is about where our REPLIES go. This is about
  INBOUND ANSWER PAIRING. The human is under no obligation to answer in the topic we happened to ask
  in, and today he didn't. Humans answer where they are looking.

  ── OPEN DESIGN QUESTION — THIS TICKET IS `needs_design`; THE COORDINATOR/HUMAN DECIDES ────────────
  Do NOT build until this fork is resolved. Three options were identified; each changes the
  acceptance contract, so whoever resolves it must say which, and the specifier then amends
  `specs/features/BL-354-answer-pairing-across-threads.feature` BEFORE the coder starts (the feature
  file as written today encodes option B).

    OPTION A — LLM-JUDGED PAIRING. Let the woken Operator decide whether an inbound message is an
      answer to the pending question, using the question text and the message.
      For: handles the ambiguous case (an unrelated message arriving while a question is pending)
      honestly, and degrades gracefully.
      Against: non-deterministic, unmockable at the sweep layer, and can only run AFTER a wake — so
      `clear-awaiting-answer!` and the escalation sweep (both pure runtime, pre-wake) still need a
      mechanical answer of their own. Probably not sufficient alone.

    OPTION B — MECHANICAL PAIRING ON PENDING-NESS (the intake's own suggestion, and what the feature
      file currently encodes). There is a hard MVP invariant of ONE pending question at a time —
      `operator_ask.bb:64` refuses to overwrite a pending question. So an inbound human message in
      ANY SUP thread, arriving while a question is pending, is unambiguously that answer: match on
      pending-ness, keep thread-id as a tiebreak/preference, not a gate.
      For: deterministic, testable, fixes both halves (pairing AND the false nag) in the pure layer.
      Against: a message that genuinely ISN'T the answer ("btw is the swarm alive?") gets consumed
      as one. Bounded by the one-question invariant, but real.

    OPTION C — SAME-THREAD-CLEARS. Keep the thread gate, but never let a cross-thread answer be
      silently lost: when a question is pending and the human writes in a different thread, tell him
      where the question is waiting, and/or re-post it into the thread he IS in.
      For: no risk of consuming a non-answer; the human is never left in silence.
      Against: it is our state machine asking the human to accommodate it, which is the posture that
      caused the incident in the first place.

  PRIOR ART / SAME ROOT CAUSE. The memory `cross-thread-reminder-causes-misrouted-reply` already
  records the human answering in the wrong thread (SUP-3's "A" landing in SUP-4). That was written
  up as an Operator prompt-discipline rule. It is ALSO a code defect, and this ticket is that half.

  SCOPE (once the fork is resolved). The pure decision lives in `operator_lib.bb`
  (`resolve-pending-answer`); its caller and the await lifecycle (`clear-awaiting-answer!`,
  `awaiting-answer-sweep!`) live in `operator_runtime.bb`. Whatever option is chosen, BOTH must move
  together: pairing the answer and clearing the await are the same decision, and today they are one
  boolean. Out of scope: concurrent pending questions (the one-at-a-time MVP invariant stands).

  E2E QA PROCEDURE: with a live swarm, drive `operator_ask.bb` to ask a question in one SUP thread,
  then have the human (or a simulated inbound) reply in a DIFFERENT SUP thread. Assert the woken
  Operator's `telegram-reply-context.json` carries the pending question alongside the answer, assert
  `awaiting-answer.json` is gone, and let the await timeout elapse — assert NO "[still needed]"
  escalation is posted to any thread.

acceptance:
  feature: specs/features/BL-354-answer-pairing-across-threads.feature
  steps:
    - "An answer is paired to its question and closes the await, whatever thread it arrives in"
    - "A message arriving with no question pending is not treated as an answer"

human_approval: pending

mutation_cost: low
