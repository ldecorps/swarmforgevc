source: |
  Human, 2026-07-23 ~14:55Z: tapped Approve on BL-579/BL-580/BL-581 in the
  Approvals topic (1785). "i approved but messages are not repainting
  confirming approved." Screenshot shows all three asks still carrying their
  full Approve/Amend/Reject/Expedite/More button rows minutes later.

description: |
  ## RETRACTED: the "second poller" diagnosis was WRONG

  An earlier revision of this ticket (and
  `.swarmforge/operator/HANDOFF-telegram-409-second-poller.md`) claimed a
  second Telegram bot instance was stealing updates, on the strength of a 409
  returned while our front desk was stopped. That is retracted. See
  `.swarmforge/operator/FINDINGS-telegram-409-no-second-poller.md`, whose test
  was better controlled and whose search was exhaustive (Windows processes and
  TCP connections, other WSL distros, containers/netns, systemd system+user,
  cron, Windows Scheduled Tasks, all four GH workflows - every one negative).

  **Why the 409 appeared with nothing else running.** `POLL_TIMEOUT_SECONDS =
  25` (`telegram-front-desk-bot.ts:185`), and Telegram keeps a `getUpdates`
  request alive server-side for its FULL timeout - killing the client process
  does not release it. A probe issued with `timeout=60` then holds its own
  60-second poll, so a repeat of the same probe conflicts with itself. Both
  produce the identical "terminated by other getUpdates request" string, and
  neither requires a second instance.

  **Correct probe procedure**, for anyone tempted to repeat this: stop the
  front desk, wait > 40s, then issue exactly ONE short probe (`timeout=3`).
  Not a 60s poll, and not twice. Done that way it returns `ok:true`.

  Lesson worth keeping: a 409 from this endpoint is NOT proof of a rival
  poller. It is equally consistent with our own just-killed (or just-issued)
  long poll still being held server-side.

  ## Current best explanation: a stale build, since self-healed

  Per the operator findings section below (~16:20Z): the taps that failed
  (~14:05-14:12) were served by the bot started 12:23:53Z running a STALE
  `out/` build; at 14:46:52Z the supervisor logged `stale-build-detected
  recompiling before respawn`, and a live tap on BL-585 at ~16:1xZ recorded
  and repainted correctly on the fresh build.

  ## Open counter-observation - do not close this ticket without addressing it

  The human reported tapping Approve on BL-588 and, when checked at ~17:08Z,
  it was still `human_approval: pending` with no uncommitted write - i.e. a
  tap that did not record, roughly two hours AFTER the 14:46:52Z recompile
  that the stale-build explanation says fixed this. (BL-588 now reads
  `approved` only because the operator recorded the human's ruling by hand in
  commit 95ea8be30 - that is NOT evidence of a working tap.)

  Either the human's BL-588 tap did not actually reach Telegram, or the
  stale-build explanation is incomplete. Resolve this before declaring the
  root cause settled; the hardening work below is worth doing either way.

  ## Symptom, as originally reported

  Tapping Approve produces NO observable effect: the ask keeps its buttons,
  no verdict text appears, and the ticket's `human_approval:` stays `pending`.
  The human cannot tell whether the tap was received, rejected, or lost - the
  same class of silent-failure defect as BL-566 (steering) and BL-562 (depth
  warning).

  ## What was ruled OUT during triage (do not re-investigate)

  Each of these was checked live at 2026-07-23T14:05Z and is NOT the cause:

  - **Bot not polling.** `.swarmforge/operator/front-desk-poll-heartbeat.json`
    was 16s fresh. The bot is alive and polling.
  - **Token/webhook problem.** `getMe` ok; `getWebhookInfo` returns an empty
    url (a set webhook would make getUpdates fail with 409).
  - **Competing pollers.** Two stray bots exist under `/tmp/tmp.*` from an old
    test run, but they carry FIXTURE tokens (`fes-real-tok…`,
    `env-primary-…`), not the real one. Only pid 2972976 holds the real token.
    (The token is exported in the shell profile, so every VS Code/Cursor node
    process inherits it - those are not bots. Reap the /tmp husks anyway.)
  - **Chat/principal misconfiguration.** `TELEGRAM_CHAT_ID=-1004415865297`
    matches `getChat`; `TELEGRAM_PRINCIPAL_USER_ID=8831669386` is the same
    principal whose ordinary messages DO work - SUP-11 round-tripped twice
    the same afternoon.
  - **Ask not tracked.** `.swarmforge/operator/telegram-approval-ask-messages.json`
    has all three: BL-579 -> msg 6719, BL-580 -> 6723, BL-581 -> 6724, topic
    1785.
  - **Ticket file not findable.** `forEachLiveTicketFile` covers `active` AND
    `paused` (`extension/src/util/liveTicketFiles.ts`), and all three tickets
    are in `paused/`.
  - **Update stuck in Telegram's queue.** `getUpdates?offset=-1` returned an
    empty result and `pending_update_count` is 0 - the updates were consumed
    and the offset advanced past them.

  Every one of those was checked BEFORE the 409 was found, and each stands:
  the local bot is correctly configured throughout. The updates were not
  "consumed by the bot and dropped" as first concluded - they were consumed by
  the OTHER instance. Retained so nobody re-treads them.

  ## Also established, and NOT defects

  - **The repaint half works.** BL-581's ask closed to
    "-- Approved 2026-07-23 14:10 UTC" with its buttons stripped, at exactly
    the minute the verdict was committed to the yaml by hand. The reconcile
    sweep closes an ask correctly once a verdict exists on disk. An earlier
    revision of this ticket claimed two independent failures; that was wrong.
  - **The "Telegram omits `callback_query.message` on old messages"
    hypothesis is disproven.** BL-582's own ask (msg 6736) was tapped ~2
    minutes after posting and still did not record. Do not spend time there.
  - **The callback_data is well-formed.** `approve:<backlogId>` matches
    `CALLBACK_DATA_PATTERN`, and `telegramClient.ts:148` serialises
    `callbackData` -> `callback_data` correctly.
  - **BL-561 is not the regression.** It added persistence and a debounced
    tick around `recordApprovalDecisionAndClose`; it did not touch the
    callback decision path.

  A cheap human-observable discriminator, not yet collected: when the human
  taps, does the button's spinner clear immediately or hang for ~30s?
  `dispatchRecognizedCallbackDecision` calls `answerCallbackQuery` for every
  RECOGNIZED callback, and a drop returns before it. An instant clear means
  the callback was recognized and the failure is downstream of the decision;
  a hang means it was dropped by the guards. Collect this first - it halves
  the search space at zero cost.

  Note also that `recordApprovalReply` writes the yaml WITHOUT committing
  (BL-490). This checkout demonstrably loses uncommitted work to `git
  restore` run by other roles - it happened twice on 2026-07-23. So even a
  successful write is not durable. Whether the approval write should commit
  itself (the way `operator_file_question.bb` does, loudly failing if the
  commit fails) belongs in this ticket's design.

  ## Operator findings, 2026-07-23 ~16:20Z — root cause narrowed, fix scope set

  Three converging proofs:
  1. FIXTURE: the compiled decision->record chain on the CURRENT build works
     end-to-end (decideCallbackQueryAction -> approve;
     recordApprovalDecisionAndClose -> changed:true; yaml flipped) — driven
     directly against out/ with a pending fixture ticket.
  2. LIVE: the human tapped Approve on BL-585 at ~16:1xZ on the current bot
     (pid 3624675, build a206516bf) — recorded AND repainted correctly.
  3. TIMELINE: the taps that failed (~14:05-14:12) were served by the bot
     started 12:23:53Z (pid 2972976) — and at 14:46:52Z the supervisor
     itself logged `stale-build-detected recompiling before respawn`. The
     failing taps ran on a STALE out/ build; the supervisor's crash-respawn
     recompiled, and no tap has failed since. (409/second-poller theory
     separately retracted in FINDINGS-telegram-409-no-second-poller.md.)

  Ergo: no defect in the CURRENT callback code. What this ticket now owns is
  the three hardening gaps that let a stale-build failure be silent and
  non-durable — all verified present in current code:

  a. SILENT changed:false — recordApprovalDecisionAndClose returns false
     (file not found, or human_approval not literally pending) with zero
     observable effect: no toast, no log, spinner already cleared by
     dispatchApproveOrFollowup. Every no-op record MUST become observable
     (toast naming why + stderr line). This also covers the ticket's
     original item 1 (decideCallbackQueryAction silent drops).
  b. NON-DURABLE WRITE — recordApprovalReply writes the yaml uncommitted on
     the master checkout, which lost uncommitted work to role git churn
     twice on 2026-07-23. Expedite already solved this in-code: its
     commitExpediteWrites adapter commits before dispatch (see the
     BL-490-VIOLATION comment). Approve/reject/amend should write through
     the same commit-on-decision adapter.
  c. STALE BUILD CAN SERVE INDEFINITELY — the supervisor detects staleness
     only on CRASH respawn. A healthy bot on an outdated build runs
     forever (12:23->14:46 here). Either the supervisor build-freshness
     check runs on healthy ticks too (restart when stale beyond a grace),
     or the bot self-reports its BUILD_SHA on a heartbeat surface the
     watchdog/briefing can compare. Cross-ref BL-328 lineage.

  Bot stdout in the failure window is captured NOWHERE (supervisor log has
  supervisor lines only) — (a)'s stderr line must land in a file that
  survives, name it in the spec.

acceptance: |
  Specifier writes the scenarios. Minimum:

  1. A principal's Approve tap on a tracked ask records `human_approval:
     approved` in the ticket yaml wherever it lives (`active/` or `paused/`).
  2. The same tap repaints the ask: buttons stripped, verdict shown.
  3. Record and repaint are INDEPENDENTLY observable - a repaint failure
     after a successful record is reported, never silently swallowed, and
     leaves the recorded verdict intact.
  4. Every callback drop path (`not-my-chat`, `not-principal`,
     `unrecognized-data`) emits a distinguishable diagnostic; the human-facing
     ones surface as a callback toast rather than silence.
  5. A tap on a ticket whose verdict is ALREADY recorded stays idempotent
     (the BL-484 stale-tap guard) and says so rather than doing nothing.

  QA: reproduce by hand against the live bot - post an ask, tap Approve, and
  confirm both the yaml write and the repaint. A fixture-only pass is not
  sufficient here: every unit-level guard already passes today while the live
  path does nothing (BL-454's lesson).

out_of_scope: |
  - The paused -> active promotion mover (BL-490); this ticket ends at
    recording the verdict and repainting the ask.
  - Reaping the stray /tmp test bots - real hygiene, but unrelated to this
    defect and not its cause.
  - The typed-reply approval path ("approve BL-579" as text) unless
    investigation shows it shares the broken code path.
