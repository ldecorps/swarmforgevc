description: |
  Slice 3 of the provider-neutral contract epic. Backend failures during launch
  or interaction currently surface as raw, provider-specific errors, so
  orchestration and operator views cannot reason about failures uniformly across
  brands.

  Wanted behavior:
  - Define a stable, closed Forge-level error taxonomy (a small enumerable set of
    categories, e.g. launch-failed, auth/credentials, unavailable/rate-limited,
    protocol/parse, timeout, unknown).
  - Map provider-specific failures onto those categories at the adapter/descriptor
    boundary, keeping the original backend detail attached as context (never
    discarded).
  - The same failure from different providers maps to the same category, so
    orchestration and operator surfaces branch on category, not brand.

  Constraints:
  - Taxonomy is a closed set with an explicit "unknown" fallback; unmapped
    backend errors become "unknown" with detail attached, never a crash.
  - Consistent categorization across the fork orchestration and the extension's
    surfacing of errors.

