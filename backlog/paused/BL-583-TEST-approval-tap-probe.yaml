  Operator, 2026-07-23, at the human's request ("let's do a test, surface a
  dummy approval") while triaging BL-582.

description: |
  ## Not a real ticket

  This exists ONLY to make the concierge tick post an approval ask into the
  Approvals topic (1785), because any item in active/ or paused/ carrying
  `human_approval: pending` is surfaced by `pendingApprovalFor`
  (conciergeTick.ts:274) on the next 30s tick.

  The human then taps Approve on THIS ask while the operator watches, so the
  BL-582 failure is observed live on a message of known age and known
  provenance rather than reconstructed after the fact.

  ## What is being measured

  1. Does the button spinner clear immediately or hang? `answerCallbackQuery`
     runs only for a callback that `decideCallbackQueryAction` RECOGNIZED, so
     an instant clear puts the failure downstream of the decision and a hang
     puts it in the guards.
  2. Does `human_approval:` in this file flip to `approved`?
  3. Does anything at all appear in the bot's stderr at tap time?
  4. Does the ask repaint on the following tick?

  ## Cleanup

  Delete this file once the probe is done. Per the operator's own standing
  note, do NOT delete it BEFORE the tap: the approval writer resolves the
  ticket by scanning live backlog folders for a matching `id:`, so removing
  the backing file first turns the tap into a guaranteed no-op and would
  measure nothing.

acceptance: |
