id: BL-616
title: "What triggers ModelFactory `assign`? — human ruling on autonomous cold-apply (restarts the swarm)"
milestone: M5
type: feature
status: needs_design
epic: swarm-intelligence-layer
severity: medium
priority: 30
direction: swarm-surfaced
depends_on: [BL-563]
assigned_to: specifier
mutation_cost: low
human_approval: pending
approval_context: >
  BL-563 wires a Factory assignment into the launch path but deliberately
  leaves the trigger as-is: a human running the CLI. This ticket is the parked
  fork on what should INVOKE `assign`, split out because the options have
  materially different blast radii and the choice must not be made in-swarm.
  Option (a): human CLI only — status quo, zero new risk, model routing stays
  a manual operator act. Option (b): operator sweep fires `assign` +
  cold-apply on a quota-exhaustion signal (quota-state.json already exists for
  exactly this) — fully automatic, but a cold-apply RESTARTS THE SWARM
  (kill_all_swarm.sh + relaunch), so an autonomous trigger can tear down live
  agents mid-ticket; guardrails (only-at-idle, coordinator ack, dry-run gate)
  would need speccing. Option (c): the coordinator invokes assign at a safe
  point between dispatches — semi-automatic, bounded blast radius, but adds a
  standing duty to the coordinator. Reply with the chosen option (and any
  guardrail requirements for b/c); the specifier then writes the executable
  spec for that option as this ticket's scope. Firm: no autonomous trigger
  ships before this ruling — BL-563 explicitly excludes it.
source: |
  Split out of BL-563 by the specifier 2026-07-24 while firming its slices.
  BL-563's original "Slice 3" text and the operator-session audit
  (2026-07-23) identified the fork; the standing directive that this is a
  HUMAN ruling — never resolved in-swarm — dates from the BL-545 epic
  steering (2026-07-23).
description: |
  Gap 2 of BL-563's audit: nothing invokes `model_factory_cli.bb assign`; the
  only entry point is a human typing it. Once BL-563 lands, an assignment
  actually changes what launches, which makes the trigger question live: who
  or what decides a re-assignment should happen, and when is it safe to
  cold-apply (which kills and relaunches the whole swarm)?

  This ticket carries the ruling request (see approval_context for the
  options). It has no buildable scope until the human rules; after the
  ruling, the specifier writes the executable spec for the chosen option in
  this ticket (or closes it as "status quo confirmed" if option (a) wins).

acceptance: |
  Not executable yet by design — this is a needs_design ruling ticket. After
  the human ruling: if option (a), close with the ruling recorded here; if
  (b) or (c), the specifier replaces this field with a path to a feature file
  specced for the chosen option (with its guardrails) before any promotion.
