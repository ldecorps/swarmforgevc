id: BL-123
title: BUG/GAP — the accepted "coverageAnalysis must be perTest/all" rule cannot be satisfied today; no Stryker-supported test runner is installed for node --test
milestone: M2
status: todo
priority: 02
assigned_to: coder
notes: |
  Drained from the backlog root by the specifier 2026-07-05; arrived fully
  specced (coordinator forensics), content preserved. Specifier additions:
  - The constitution rule (engineering.prompt Stryker clause) has been amended
    on main with an INTERIM clause acknowledging this gap, so hardeners are no
    longer misled into flipping perTest against the command runner while this
    ticket is open. Scenario coverage-aware-02 is therefore partially satisfied
    already; the ticket's job is to close the gap for real (runner path) or
    make the interim state the accepted permanent one.
  - Constitution ownership: only the specifier writes constitution/prompt
