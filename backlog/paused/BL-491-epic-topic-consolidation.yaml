notes: |
  UMBRELLA / tracking item, not directly promotable. The actionable work is its children
  (BL-492..495), sequenced by their depends_on chain. Do NOT close this epic until all four land
  and the live swarm posts ticket events into epic/Backlog topics with no new per-ticket topic minted.

  THE ASK (human directive, drained from the intake doc). Reduce how many Telegram forum topics the
  swarm creates. Today one topic is created per backlog ticket; the human wants:
    - One topic per EPIC. A ticket that belongs to an epic (its `epic:` field is a non-empty id) no
      longer gets its own topic — its swarm events post as MESSAGES into that epic's topic, prefixed
      with the ticket id.
    - Epic-less tickets (the majority, `epic: ""`) post as messages into ONE new standing "Backlog"
      catch-all topic, again prefixed with the ticket id.
    - Keep the 8 per-role STEERING topics and every other standing topic (Concierge, Approvals,
      Recert, Agent Questions, Control, Pipeline Board, Contract negotiation) exactly as-is.
  Net: instead of `#epics + #tickets` topics we have `#epics + 1 Backlog` topic for product work,
  plus the existing standing/role topics.

  HUMAN DECISIONS SETTLED AT SPEC TIME (specifier asked, human answered 2026-07-17):
    D1 — PER-TICKET STATE RENDER = EDIT ONE MESSAGE IN PLACE. A ticket that no longer owns a topic
       can't own a topic ICON (today's lifecycle state carrier, topicIcon.ts ICON_EMOJI). Instead
       each ticket gets ONE message in its epic/Backlog topic whose status prefix is EDITED in place
       on each lifecycle transition (e.g. "BL-### 🎵 in progress" → "BL-### ✅ done"), not a new
       message appended per transition. Model on the existing editInPlaceMessageSync.ts
       (syncEditInPlaceMessage; posted/edited/skipped-unchanged outcomes) — reuse it, do not
       reinvent. → BL-493.
    D2 — MIGRATION = ONE-TIME CLOSE. The hundreds of existing per-ticket topics already in the live
       Telegram group and in backlog-topic-map.json are CLOSED once (closeForumTopic, read-only /
       collapsed, history preserved) by a one-time reconcile tool — not deleted, not left open. The
       reconcile MUST honor a 429's own retry_after exactly as backfill-topic-icons.ts does
       (engineering.prompt: a change-gated/backfill mass edit over a rate-limited surface is a storm
       risk). → BL-494.
    D3 — AWAITING-APPROVAL SIGNAL = APPROVALS TOPIC ONLY. The icon-only approval path
       (ensurePerTicketTopicForIcon, topicRouter.ts:390) exists ONLY to hang a 👀 icon on a
       per-ticket topic; the ask TEXT already posts to the standing Approvals topic (BL-424). With no
       per-ticket topics, DROP that path entirely — no extra awaiting-approval indicator in the
       epic/Backlog topic. → part of BL-493.

  SLICE PLAN (each child carries `epic: topic-consolidation`):
    - BL-492 — Standing "Backlog" catch-all topic ensured once at boot (reserved subject-id + reuse-
      or-create), the target for epic-less tickets. Foundation; fires live at boot.
    - BL-493 — THE WIRING SLICE (runtime-wiring rule): route a ticket event into its epic's topic
      (epic non-empty) or the Backlog topic (epic-less) as an edit-in-place status message; STOP
      creating per-ticket topics (decideTopicAction/routeTaggedOrUntaggedEvent); DROP the icon-only
      approval path (D3). This is where the pure resolver + status-text builder are CALLED on a real
      event and their per-ticket message-id state is persisted — the epic is not "done" behavior-wise
      until this lands (engineering.prompt: pure modules with no live caller are dark features).
    - BL-494 — One-time close of legacy per-ticket topics (D2), 429-safe.
    - BL-495 — Make the topic recreation/restore repair path (topicRecreation.ts, recreate-bl-topic.ts)
      epic/Backlog-aware instead of resurrecting the old per-ticket model.

  OVERLAP WATCH (coordinator sequencing). All four children touch the hot shared standing-topic
  surface — topicRouter.ts, conciergeTick.ts, telegram-front-desk-bot.ts, the topic-map stores —
  which the BL-434/450/452/424/449 cluster also touches (operator memory: standing-topic-feature-
  overlap-cluster). Sequence these serially against any in-flight work on those files; the depends_on
  chain (492 → 493 → {494, 495}) already serializes the epic internally.

  DONE WHEN: BL-492..495 all land; a live ticket lifecycle event edits one status message in its
  epic topic (or the Backlog topic if epic-less), prefixed with the ticket id; NO new per-ticket
  topic is minted for any event including ApprovalRequested; the legacy per-ticket topics are closed;
  and the recreation repair path targets epic/Backlog topics.

human_approval: approved
