  slices (BL-492 Backlog standing topic → BL-493 the routing+edit-in-place wiring that removes
  per-ticket topics and the icon-only path → BL-494 one-time close of legacy topics → BL-495 recreation
  path epic-aware) and their sequencing. FIRM: the net effect (#epics + 1 Backlog topic), keeping the 8
  STEERING topics and all other standing topics untouched, edit-in-place status, one-time close, and
  Approvals-topic-only awaiting signal. OPEN for your call at approval: whether the legacy-close
  migration (BL-494) should run automatically once BL-493 ships or stay a hand-run operator tool — I
  have specced it as a hand-run one-time CLI (safer: you pick the moment, it can't storm a live group
  unattended). Each child slice's own feature file carries its own human_approval: pending for the
  detailed contract.

