source: "Human (ldecorps) 2026-07-17, via Operator intake backlog/INTAKE-operator-question-1784277729691.md: the concierge mints a brand-new Telegram forum topic PER backlog ticket ('BL-### - Title'), proliferating into hundreds of topics. The human wants topic count bounded to roughly the number of KINDS of topics, not the number of items: one topic per EPIC, one standing catch-all 'Backlog' topic for epic-less tickets, the 8 per-role STEERING topics and all other standing topics left as-is."

