description: |
  ## Contract for every slice

  Each slice below is one drift CLUSTER from the survey (triage by shared
  files, never by commit — overlapping-file slices must be sequenced, not
  parallelised). For each artifact the slice owner adjudicates into one of
  three buckets — the bucket decision escalates to architect/human when
  code-vs-spec intent is unclear, and is NEVER silently resolved by the
  documenter:

  - (a) code right, spec stale -> retire/rewrite the scenario (retire,
    don't reword, per the superseded-scenario rule); documenter syncs docs.
  - (b) spec right, code drifted -> file a defect ticket; do NOT "fix" the
    spec to match a regression.
  - (c) new undocumented behavior -> RETRO-SPEC: feature + doc written
    AGAINST the shipped code, tagged `# retroactive` so QA validates the
    scenarios describe reality rather than bouncing the implementation.

  Slice ordering respects file overlap and one hard external constraint:
  slice 5 (launcher) must not run concurrently with BL-563 slice 1 (both
  rewire swarmforge.sh's per-role settings writer). BL-563 already carries
  its own audit evidence and slicing — this epic sequences around it and
  must not duplicate any of its scope.

  ## Slices (specifier to firm into child tickets)

  ### Slice 1 — Resident Spy / console Mini App surface (retro-spec, largest)
  residentSpyUiHtml (20 OOB commits), residentPaneSpy (12), residentPaneLive
  (9), notify-resident-spy-tunnel (7), consoleMenuUiHtml (5),
  pausedPagerUiHtml (5), residentSpyTunnelNotify (4), pipelineGridLive/
  UiHtml (4+4). Almost entirely SPEC-LESS — the whole surface grew out of
  band. Bucket (c) retro-spec: features for the live-screen split view,
  fullscreen tap-to-restore, ticket strip, paused pager, console menu,
  pipeline grid, tunnel notify path; a how-to doc for the Mini App console.

  ### Slice 2 — Pipeline board (stale-spec reconciliation)
  conciergeTick (12), pipelineBoard (9), pipelineBoardSync (6),
  pipelineBoardPinSync (4). 13+ BL-45x/50x features exist and are stale:
  parked-cap-10 + shortened link HTML (d63e80320), NBSP id alignment,
  pin-spam suppression, collapsed epic grouping — none reflected. Mostly
  bucket (a); the one confirmed test conflict is already fixed on main.

  HUMAN RULING (2026-07-23) — two requirements this slice must pin:
  1. VERIFY the shipped every-in-flight-ticket contract still holds
     post-drift: the board shows every ticket currently traversing the
     pipeline, each on its holding role's column (BL-473 every-active-
     ticket + BL-464 authoritative stage source are the existing spec —
     re-run them against HEAD, bucket (a)/(b) per finding).
  2. EXTEND "in flight" to include the bookkeeping tail (new scenario,
     bucket (c)): a ticket whose yaml has already moved to done/ but
     whose completion parcels are still traversing QA -> coordinator
     stays on the board, rendered under its CURRENT holder (or last-known
     agent when the parcel sits unclaimed in an inbox), and drops off
     only when the tail drains. Grounding incident: 2026-07-23, four
     tickets concurrently in flight (BL-530/560/566 in QA verification +
     BL-537 in coder) while the board's active/-derived view could not
     show the done/-but-tail-in-flight ones — coordinator held completion
     parcels 000767/000769 for tickets already invisible on the board.
     Note for the specifier: /pipeline's per-ticket stage enrichment
     (BL-452 lineage) and the depth-cap semantics (pack says
     active_backlog_max_depth 1, base conf -1; multiple stages naturally
     hold multiple tickets regardless) are context, not scope — the board
     renders reality, it does not enforce the cap.

  ### Slice 3 — Telegram front desk / bridge (verification pass)
  bridgeServer (12), telegram-front-desk-bot (9), telegramFrontDeskBotCore
  (8), telegramClient (5). Features exist (BL-369/379/434/450/453/509...);
  per-feature verify against HEAD, buckets (a)/(b) per finding.

  ### Slice 4 — Handoff daemon + mono-router (retro-spec the rotation contract)
  handoffd (19), handoff_lib (12), chase_sweep_lib (9), swarm_ensure (11),
  mono_router_lib (6, SPEC-LESS), dispatch_lib (6, SPEC-LESS),
  done_with_current_* (SPEC-LESS), ready_for_next_*. The mono-router
  rotation semantics — resident/dormant roles, chase-poke plan, per-sweep
  wake budget (2026-07-23 starvation fix), rotation-home — have no feature
  coverage beyond BL-448's pack launch. Bucket (c) for the rotation
  contract; bucket (a) sweep for the chase/claim features.

  ### Slice 5 — Launcher / ops stack (manual mapping first)
  swarmforge.sh (20 OOB commits; stem too generic for the matrix's grep —
  needs a hand-built file->behavior map), launch_babysitter (5),
  failover_to_gpt (4). SEQUENCING: hold until BL-563 slice 1 lands or is
  explicitly parked, per the shared-file hazard above.

  ### Slice 6 — Claim liveness / healer / tracker (adopt orphan tests)
  metrics/claim* cluster: OOB-authored TESTS exist with no feature file.
  Relates to BL-528 claim-progress. Bucket (c): write the feature the tests
  already imply; reconcile with BL-528's shipped scenarios.

  ### Slice 7 — drift-watch (stop the bleed; pairs with BL-560)
  BL-560 (GitHub auto-intake scan) is approved and unpaused alongside this
  epic — it covers inbound GitHub work. This slice adds the repo-side
  sweep: flag commits touching extension/src or swarmforge/scripts that
  touch neither specs/features/ nor docs/ and carry no ticket reference;
  surface as an intake stub, never a hard block. Must detect BOTH drift
  directions established by the survey: src-without-spec AND
  spec-without-caller (the BL-563 "shipped-but-dark" mode — absence of a
  seeded state dir is positive proof a module never ran).

acceptance: |
  Epic-level (children carry their own executable scenarios):
  1. Every file in the survey's OOB table is dispositioned (a)/(b)/(c) in a
     per-slice evidence file under backlog/evidence/spec-drift-2026-07-23/.
  2. Zero SPEC-LESS rows remain for clusters 1, 4, 6 (feature or explicit
     "internal, no spec warranted" disposition recorded per file).
  3. Bucket (b) findings each have a filed defect ticket id in the evidence.
  4. Retroactive features are tagged and pass gherkin_lint_gate.
  5. Re-running drift_matrix.bb with baseline 2026-07-15 after completion
     reports 0 unmapped spec-less files for the dispositioned clusters.

out_of_scope: |
  - BL-563's own scope (Steward/Factory runtime wiring) — sequenced around,
    never duplicated here.
  - The mutation pass (runs when resident idle; findings feed slices as
    bucket (b) defects, not new scope).
  - Rewriting historical briefings/archive docs; only living how-to/
    reference/explanation pages and specs/features are in scope.
  - Any behavior change to shipped code: this epic only moves specs/docs
    toward code (a/c) or files defect tickets (b).
