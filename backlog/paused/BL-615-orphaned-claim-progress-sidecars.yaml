source: |
  Coordinator bug report 2026-07-24, tertiary observation (preserved at
  backlog/evidence/BL-614-coordinator-rotate-home-bug-report.md):
  .swarmforge/handoffs/coordinator/inbox/in_process/ held 4 stray
  *.handoff.claim-progress.json sidecars (2026-07-23/24) with no matching
  .handoff file. The sidecar-removal-on-move logic (BL-232, extended by
  BL-528's delete-claim-progress! in chase_sweep_lib.bb) apparently did not
  clear these, so some in_process exit path leaks the sidecar.
description: |
  ## The defect

  A .claim-progress.json sidecar (BL-528 claim-progress tracking) is meant
  to be deleted when its in_process handoff moves on (completed, abandoned,
  bounced, quarantined). Four orphaned sidecars with no matching .handoff
  file were found in the coordinator's inbox/in_process, so at least one
  exit path skips the delete. Orphans are cruft that make a mailbox harder
  to read at a glance and muddy "is this mailbox empty?" investigations.

  ## Wanted behavior

  - Diagnose which in_process exit path(s) leak the sidecar and delete the
    sidecar there too (unit-test each covered path in the swarm-script
    suite).
  - Backstop: an existing periodic sweep (claim-progress sweep in
    chase_sweep_lib.bb is the natural home) reaps any
    *.claim-progress.json in inbox/in_process whose matching .handoff file
    no longer exists, logging each reap.
  - One-time cleanup of the current 4 strays in the coordinator's
    in_process/ (the reap backstop achieves this on first run).

  ## Acceptance materialization (BL-233 / BL-441)

  Scenarios are parked in
  specs/features/BL-615-orphaned-claim-progress-sidecar-reap.feature.draft
  because the runner hard-fails on handler-less scenarios. The coder MUST,
  in the same parcel, rename the draft to .feature and wire its step
  handlers. Do not close this ticket with the draft unmaterialized.
acceptance: specs/features/BL-615-orphaned-claim-progress-sidecar-reap.feature.draft
notes: |
  e2e QA procedure: seed a scratch role inbox/in_process with (a) a real
  handoff + sidecar and (b) a sidecar with no matching handoff. Complete (a)
  via done_with_current.sh and verify no sidecar remains for it; run the
  sweep once and verify (b) is deleted with a reap log line. Then confirm
  the 4 historical strays in the coordinator's inbox/in_process are gone on
  the live swarm after one sweep tick.
