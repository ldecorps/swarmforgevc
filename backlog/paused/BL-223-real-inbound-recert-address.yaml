id: BL-223
title: "Provision a real inbound recert domain and flip the phone address off the .invalid placeholder"
milestone: M3
status: todo
priority: 06
direction: feature
assigned_to: coder
depends_on: [BL-217, BL-150]
source: "operator 2026-07-09: a live phone recert email to recert@swarmforge.invalid bounced (NXDOMAIN). Cause: pwa/app.js hardcodes a reserved-TLD placeholder; no real inbound domain is provisioned. Operator confirmed they own a domain to use."

description: |
  OPERATOR (2026-07-09): sending a recertification email from the phone bounced
  with "Address not found / DNS type 'mx' lookup of swarmforge.invalid responded
  with code NXDOMAIN". The phone recert flow has never been deliverable.

  Root cause (verified against live code):
    - pwa/app.js line 15 hardcodes `var RECERT_EMAIL_TO =
      'recert@swarmforge.invalid';` and builds the mailto: link from it
      (pwa/app.js ~line 536). `.invalid` is a reserved TLD (RFC 2606) that can
      NEVER resolve, so every tapped recert email bounces.
    - It is a deliberate placeholder standing in for the unbuilt live inbound
      receiver (BL-217). BL-150 (recert UI) was only tested against the
      inbound-webhook seam with doubles; no real address was ever wired.
    - Outbound email works only because it defaults to Resend's shared
      onboarding@resend.dev sender (swarmPanel.ts ~line 255). There is NO shared
      address for RECEIVING — inbound requires a domain we control with MX
      records, which does not exist yet.
    - A test asserts the placeholder value:
      extension/test/pwaRecertification.test.js references swarmforge.invalid, so
      it must be updated in lockstep with the address change.

  Wanted outcome:
  - The phone recert mailto is addressed to a REAL, deliverable inbound address
    on a domain the operator controls (placeholder in this spec:
    recert@inbound.<YOUR-DOMAIN> — operator supplies the concrete domain at
    provisioning time), never the reserved .invalid placeholder.
  - A recertification email sent from the phone to that address is received and
    reaches the BL-217 serverless receiver, which queues a proposal for specifier
    review (the end-to-end path BL-150's seam + BL-217 already define).

  Provisioning (operator + ops; documented as a runbook in this ticket / docs):
  1. Choose an inbound subdomain of the operator's domain (e.g.
     inbound.<YOUR-DOMAIN>).
  2. Add an MX record on that subdomain pointing at Resend Inbound, and verify
     the domain in the Resend account.
  3. Configure a Resend Inbound route so mail to recert@inbound.<YOUR-DOMAIN> is
     POSTed to BL-217's serverless function HTTPS endpoint (Vercel Functions,
     Node runtime — see BL-217).
  - These are DNS/registrar + Resend-dashboard actions only the operator can
    perform; the ticket documents the exact steps, it does not automate them.

  Code change (coder):
  - Replace the hardcoded pwa/app.js RECERT_EMAIL_TO `.invalid` placeholder with
    the real address. Prefer sourcing it from generated/injected config the PWA
    already consumes (alongside backlog.json / recert-batch.json) over a second
    hardcode, so it cannot silently regress to .invalid; a plain constant with
    the real value is acceptable if config injection is disproportionate.
  - Update the mirrored host-side recert content path (extension/src/docs/
    recertification.ts / emailContent.ts) and
    extension/test/pwaRecertification.test.js to the new address in lockstep.

  Constraints:
  - The inbound address is PUBLIC (safe to commit); it is not a secret. The
    Resend signing secret and repo-write credential remain host/function-env only
    per BL-217 and the constitution secrets rule — never in the repo or the PWA.
  - Address resolution is a pure function over provided config/inputs in tests;
    no live email, no network, no real timers (engineering article).
  - Do not weaken BL-217's signature verification: a real address does not change
    that unsigned inbound requests must never create a proposal.

  QA e2e procedure (live swarm, after provisioning):
  - From the phone, tap a recert update; confirm the mail client composes to
    recert@inbound.<YOUR-DOMAIN> (not .invalid) and the email sends without
    bouncing.
  - Confirm the signed inbound email reaches the BL-217 receiver and queues
    exactly one proposal for specifier review; confirm an unsigned POST creates
    none.

