id: BL-096
title: delivery metrics (computation + trend framework + bridge/CLI) — velocity, per-milestone burndown, cycle time, forecasts, trends
milestone: M5
status: todo
priority: 01
direction: non-aligned
source: operator request 2026-07-04 ("introduce new metrics like velocity, so we can have burndown charts and things like that")
notes: |
  Sliced by specifier 2026-07-09 (coordinator direction, operator wants BL-100
  ASAP): this ticket is now the COMPUTATION/TREND-FRAMEWORK layer only — no
  BL-094 dependency, so it can land first and unblock BL-100 (which depends_on
  BL-096's trend framework) without waiting on BL-094's large UI build. Chart
  rendering of these metrics in the BL-094 web UI moved to BL-211
  (depends_on BL-094 + this ticket).

  Priority 01 (coordinator, 2026-07-09): operator's phone-monitoring chain and
