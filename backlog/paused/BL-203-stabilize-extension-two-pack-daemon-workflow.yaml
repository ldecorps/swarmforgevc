description: |
  Problem:
  The VS Code extension launch path has been unreliable for hundreds of
  commits. Before larger feature work resumes, prove the minimal happy path
  end-to-end with daemon ON:

    1. Extension starts; handoffd comes up.
    2. Coordinator promotes this ticket from paused → active.
    3. Daemon routes the parcel coordinator → coder → cleaner → coordinator.
    4. `./swarm-kill` tears everything down gracefully (idempotent).

  Scope:
  Diagnose and fix the extension launch/workflow failures that have blocked
  reliable runs for hundreds of commits. Prove the minimal happy path with
  daemon ON, then harden it:

    1. Extension starts; handoffd comes up.
    2. Coordinator promotes this ticket from paused → active.
    3. Daemon routes the parcel coordinator → coder → cleaner → coordinator.
    4. `./swarm-kill` tears everything down gracefully (idempotent).

  Use the stabilize-two-pack profile (Opus/high on coord+coder, Sonnet on
  cleaner) — not the cheap Haiku two-pack exercise config.

  Deliverables:
  - Fixes to extension launch, daemon wiring, or handoff path as root-caused
  - A repeatable smoke check (script or doc) referencing the stabilize launch
    config so the workflow stays green after this ticket

  Out of scope:
  - Seven-pack or specifier stages
  - Unrelated feature work

