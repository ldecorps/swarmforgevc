description: |
  ## Problem

  The boot stable prefix (constitution + PIPELINE + role + prompt articles,
  inlined at agent launch) is 53408 chars on main, over the deliberate
  51200-char gate. The gate exists because this prefix is paid in tokens on
  EVERY agent boot/respawn — directly the burn concern BL-617 is braking.
  prompt_engine_test_runner.bb is therefore RED on main for every parcel
  whose verification runs the bb script test suite.

  ## Fix mechanism (established, not novel)

  The BL-433 split mechanism: move incident-backed elaboration prose from the
  boot-inlined articles into swarmforge/constitution/articles/reference/
  (read on demand, never inlined), keeping each slim article's normative
  rules and a one-line pointer to the absorbing reference file. The runner
  already asserts reference bodies stay OUT of the prefix and slim articles
  stay IN — those assertions guide the move. Do NOT raise the cap. Target
  comfortable headroom under 51200, not 51199.

  ## Interaction warning — BL-617 (due tonight 18:00Z)

  While this test is red, ANY parcel gating on the bb suite — including
  BL-617's — sees a pre-existing failure. Until BL-618 lands, reviewers on
  other parcels must recognise exactly this one named failure ("stable
  prefix under 50KB after article splits") as pre-existing known-red and
  must not wave through any OTHER red. Coordinator: promoting BL-618 right
  after BL-617 clears QA un-reds the suite fastest.

acceptance: specs/features/BL-618-stable-prefix-cap-regression.feature.draft

notes: |
  E2E QA procedure: run bb swarmforge/scripts/test/prompt_engine_test_runner.bb
  on the fix commit — expect "ALL PASS" and a printed stable-prefix chars
  value under 51200 with headroom; spot-check that a sampled moved passage
  is findable under constitution/articles/reference/ and that its slim
  article still points there; boot one role via its launch script and
  confirm the agent still receives the slim articles in its system prefix.

  The constitution/prompt files are specifier-owned surface: the specifier
  reviews the parcel's choice of moved passages at the QA-evidence stage if
  disputed, but the mechanical move itself rides the normal pipeline under
  the acceptance contract (no rule text lost, pointers retained).

out_of_scope: |
  - Raising or removing the 51200 cap.
  - Rewriting any rule's meaning — this parcel moves prose, it
    does not edit policy.
  - Trimming role prompts or pack overlays (only the boot-inlined
    constitution/article surface the gate measures).
