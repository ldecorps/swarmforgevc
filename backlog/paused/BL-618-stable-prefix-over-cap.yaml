source: |
  Architect note (priority 50, 2026-07-24 ~12:50Z, during a stage pass on
  main): "main FAIL: stable prefix 53408 chars > 51200 cap - needs its own
  ticket."

  The gate is swarmforge/scripts/test/prompt_engine_test_runner.bb:
  "stable prefix under 50KB after article splits (< 51200 chars)" over
