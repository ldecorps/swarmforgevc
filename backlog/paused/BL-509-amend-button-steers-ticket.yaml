#      approval card is closed, the steer is recorded on backlog/topics/<id>.json, and events.jsonl carries
#      a DISTINCT amend-steer directive (id + text) — not consumed as an approval answer.
#   4. Confirm the full acceptance + unit suite passes (revised BL-409/410 scenarios + tests green; no
#      stale "amend does not change approval state" assertion left behind).
#   (Slices 2/3 add: the specifier mailbox receives the steer note; the specifier revises + re-presents.)

human_approval: pending
approval_context: >
  Your ask 2026-07-17: "the amend button should enable me to steer the ticket." I investigated and found
  Amend today does almost nothing useful — it silently files your note to an operator queue, leaves the
  ticket 'pending', and the note is consumed as an approval answer that never reaches the specifier. So
  this is an EPIC (three slices), not a one-line tweak. What needs your sign-off is the shape of the loop
  and the slicing: SLICE 1 (this ticket's live feature) makes Amend PROMPT you for the change, mark the
  ticket with a new 'amending' status, close the approval card, and QUEUE your steer for the specifier;
  SLICE 2 wires the daemon to actually deliver that steer to the specifier's mailbox; SLICE 3 has the
  specifier revise the ticket per your steer and re-present it to you for approval. All three reflect your
  three answers (route-to-specifier, prompt-on-tap, distinct amending state). FIRM: the closed loop and
  the 'amending' state. Please confirm the slicing is right, or tell me if you'd want slice 1 to also do
  something visible on its own before the wiring lands. NOTE: this touches the swarm's OWN tooling (the
  Telegram bot, the operator daemon, the specifier role prompt), so it is heavier than the board tweaks —
  worth a deliberate look before promotion.

mutation_cost: medium
