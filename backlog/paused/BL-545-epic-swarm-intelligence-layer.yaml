source: |
  Human intake 2026-07-21 via Cursor chat — two foundational write-ups (PromptEngine,
  Model Steward) plus the existing ModelFactory intake (BL-525). The human framed
  three clean separation-of-concerns pillars:
    PromptEngine  = How should we talk to this model?
    Model Steward = What do we know about this model?
    ModelFactory  = Given the current task, which model should we choose?

notes: |
  UMBRELLA / tracking item (type: epic), NOT directly promotable — the coordinator
  promotes CHILD slices, never this. Children carry `epic: swarm-intelligence-layer`
  and are listed in `decomposes_into`.

  VISION: SwarmForge currently embeds prompt construction across agent launch scripts
  and constitutions, and model knowledge is scattered across packs, recruiter artifacts,
  and operator folklore. The Swarm Intelligence Layer makes prompt composition and model
  knowledge first-class architectural capabilities so the swarm can scale to many
  providers without duplicating policy in every launch path.

  PILLARS (each is its own promotable child):
    - BL-546 PromptEngine — single authority for every prompt the swarm generates.
      Assembles reusable fragments, applies model-specific adapters, injects project
      and task context, and exposes inspection/caching/versioning. No swarm agent
      constructs prompts directly.
    - BL-547 Model Steward — permanent infrastructure role owning the complete lifecycle
      of model integration: onboarding, benchmarking, certification, capability
      matrices, and continuous improvement of PromptEngine adapters. Produces the
      evidence ModelFactory consumes.
    - BL-525 ModelFactory — recruiter-backed role→model assignment with cheap/quality
      steering and cold-then-hot swap apply paths. Consumes Model Steward artifacts
      and recruiter ranks; does not invent models or prompts.

  RELATIONSHIPS:
    PromptEngine produces prompts.
    Model Steward improves PromptEngine (adapters, metadata, certification).
    ModelFactory uses Model Steward knowledge to select the most appropriate model.
    Recruiter (BL-233, done) remains recommend-only scout; Model Steward certifies
    and ModelFactory assigns.

  SLICE DISCIPLINE:
    Each child ships in slices (Slice 1 = minimal vertical, later slices add adapters,
    hot-swap, certification automation, etc.). Cross-child dependencies are explicit in
    each child's `depends_on` — e.g. ModelFactory Slice 1 may ship before Model
    Steward certification automation, but must not hard-code prompt text that bypasses
    PromptEngine once BL-546 Slice 1 lands.

  SUPERSEDES: BL-542 remains as the model-routing sub-tracker for BL-525 only; BL-545
  is the umbrella epic for the full intelligence layer. New children use
  `epic: swarm-intelligence-layer`.

acceptance:
