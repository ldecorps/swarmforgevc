id: BL-425
title: "Per-agent Telegram steering topics: a principal message in a role's own forum topic is injected as a verified nudge into that role's live pane (all 8 roles), guarded to the principal and topic-scoped"
milestone: M8
type: feature
status: todo
priority: 3
direction: human-requested
depends_on: []
source: "Operator/human raw intake in the specifier session, 2026-07-15: 'add a trlegram [Telegram] topic for each agent, so I can steer them from telegram'. Drained with the human 2026-07-15 (AskUserQuestion): (1) STEER MECHANISM = inject the message straight into that agent's live tmux pane as a nudge (the existing verifiedInject path), NOT a mailbox note — a live steer, not a queued work item; (2) DIRECTION = the agent's ANSWER to my question should come back to the topic, but NOT its ordinary business-as-usual activity (human's exact words: 'only to answer my question, not their bau activity'); (3) WHICH ROLES = all 8 (the 7-pack specifier/coder/cleaner/architect/hardender/documenter/QA plus the coordinator)."

notes: |
  EPIC — TWO SLICES. This generalizes the standing "Operator" topic (BL-346,
  telegramFrontDeskBotCore.ts's ensure-Operator-topic + OPERATOR_TOPIC_NAME) from
  ONE shared steering channel into ONE-PER-AGENT steering topics, sitting alongside
  the existing per-ticket BL topics and the Operator topic — a NEW class of topic,
  not a repurposing of either.

  SLICE 1 (this ticket's LIVE feature file) — PROVISION + INBOUND STEER. Ship this
  first; it is the atomic value ("steer them from Telegram") and is fully buildable
  over existing pieces:
    - Provision: ensure a forum topic per role, named for the role, on first sight;
      persist a role -> topic-id map (a NET-NEW machine-local map mirroring
      concierge/backlogTopicMapStore.ts's shape — role->topicId, the inverse-lookup
      sibling of topicRouter.ts's backlogForTopic). Runtime state under
      `.swarmforge/` (gitignored host-persisted marker, local-engineering rule 5),
      reached through a redirectable env seam so no test touches a live swarm's dir.
    - Inbound steer: a principal message whose message_thread_id maps to role R's
      steering topic is injected into role R's LIVE pane as a VERIFIED nudge via
      swarm/verifiedInject.ts `sendInstructionVerified` (the same confirmed-submit
      path the extension's tiles and the chaser nudge use — never a bare unverified
      Enter, BL-152), targeting role R's session/pane through swarm/tmuxClient.ts
      (`swarmforge-<role>` session + paneTarget). The inject runs in the EXTENSION
      HOST on the SWARM tmux socket (`.swarmforge/tmux-socket`) — the same seam
      extension.ts/tmuxClient.ts already inject through — NOT the restricted
      front-desk operator's own socket (BL-334).
    - This slice IS the epic's runtime-wiring slice (engineering "a multi-slice
      emit->route->consume pipeline needs an explicit runtime-wiring ticket" rule):
      it lands with a LIVE caller in the front-desk bot poll loop
      (tools/telegram-front-desk-bot.ts) and a real WRITER of the role->topic map.
      No dark modules.

  SLICE 2 (parked in specs/features/BL-425-...feature.draft; NOT in the live glob) —
  SCOPED ANSWER-BACK. Slice 1 is inbound-only. Slice 2 adds the return channel the
  human asked for: the agent's ANSWER to a steering message is posted back into that
  role's steering topic, and ONLY the answer — never the agent's ordinary activity.
  Sanctioned design (leave the mechanism to the builder, but this is the reuse
  target): the operator ask/await + reply-relay path (BL-306; operator_reply.bb) —
  the steer is injected WRAPPED so the agent replies through the reply path, which
  posts to the topic; BAU never calls that path, so BAU never reaches the topic.
  This keeps the "answer, not bau" boundary structural, not a fragile pane-delta
  heuristic. Promote slice 2's two scenarios into the live feature file WHEN it is
  built, with their step handlers in the same parcel (BL-233); until then they stay
  in the .draft so the acceptance runner cannot hard-fail on unhandled scenarios.

  GUARDS (slice 1, both mandatory — reuse existing machinery, do not reinvent):
    1. AUTHORISED PRINCIPAL ONLY — reuse the same principal-only inbound filter the
       front-desk bot already applies (BL-239/240); an unauthorised sender's message
       in a steering topic injects nothing.
    2. TOPIC-SCOPED — a message is a steer ONLY when its topic is one of the eight
       role steering topics. The same text in a BL-ticket topic, the Operator topic,
       or any other topic is NOT a steer and those topics keep their existing
       behavior (this must NOT hijack the per-ticket routing or the Operator
       channel). Routing is EXACT: role R's topic -> role R's pane, never another
       role's.

  TESTABILITY (mirror bridge/operatorDecideStatus.ts — the pattern BL-423 also
  follows):
    - The inbound DECISION is ONE PURE host-side function: given (inbound message,
      principal, topic-id, role->topic map) -> decide ignore | steer(role, text) |
      refuse. Unit-tested with fixtures — no Telegram, no tmux, no real socket.
    - verifiedInject (`sendInstructionVerified`) and the tmux pane target are
      ADAPTER-INJECTED: inject the inject-seam and assert the pure decision resolved
      the correct role/text and that the adapter was called for role R's pane and NO
      other — never drive a real tmux server, never assert over the real process
      table or a real socket dir (engineering shared-global rules).
    - Provisioning + the role->topic map read/write use the redirectable env seam
      for the runtime dir; a wiring test that reads the map must PLACE it in its
      fixture and prove the read is load-bearing by break-then-fix (engineering
      "a wiring test that adds a NEW on-disk input must prove the read is
      load-bearing" rule): with the map present the steer routes to role R; blank/
      remove it and the steer cannot resolve a role (no misroute to a default).
    - The CLI/tool entry (if any is added) keeps `main()` a thin wrapper over
      exported pure helpers, called IN-PROCESS by a test, not only spawned
      (thin-wrapper + in-process-main rules).

  IR-DRY — INTENTIONAL PARALLEL PHRASINGS (do NOT collapse). The live feature's
  IR-DRY pass reports 5 MEDIUM-confidence near-duplicate/possible-synonym findings
  and ZERO high-confidence exact duplicates; every one is a deliberate parallel or
  contrast, not accidental drift:
    - the topic-exists precondition appears once parameterized (`"<role>"`) and once
      concrete (`"coder"`) — same handler, intentionally shared;
    - the steer-in-topic step appears parameterized ("that topic") and concrete
      ("the coder topic") because the routing-exactness scenario needs TWO named
      topics at once;
    - the non-steering-topic Given ("a message in an ordinary <topic-kind> topic")
      is the deliberate NEGATIVE contrast to the positive "a steering message in
      that topic" — the guard's whole point;
    - the two "no nudge is injected into any pane" Thens differ by the trailing
      "and that topic keeps its existing behavior" clause, which is load-bearing
      ONLY for the non-steering-topic guard (proves BL/Operator topics are not
      hijacked).

  OUT OF SCOPE: slice 2's answer-back (parked, follow-up); mirroring an agent's
  full pane/BAU activity into its topic (the human explicitly excluded it);
  changing the per-ticket BL topic routing or the Operator topic; any control verb
  (that is BL-423); steering via a mailbox note (the human chose live pane inject).

  DEPENDENCY POSTURE: no hard depends_on — provisioning (createForumTopic), the
  principal filter, verifiedInject, and role->session targeting are all already on
  main. The front desk must be RUNNING for the live e2e (no park marker present at
  spec time, 2026-07-15); that is an operational precondition for QA, not a code
  dependency.

acceptance:
  feature: specs/features/BL-425-per-agent-telegram-steering-topics.feature
  steps:
    - "Every swarm role has its own steering topic named for that role"
    - "An authorised message in a role's steering topic is injected as a verified nudge into that role's live pane"
    - "A steer reaches only the addressed role's pane, not another role's"
    - "An unauthorised sender's message in a steering topic injects nothing into any pane"
    - "An authorised message in a non-steering topic (BL-ticket or Operator) is not a steer and that topic keeps its existing behavior"

qa_e2e: |
  1. Unit (host-side, no Telegram/tmux/real socket): drive the pure inbound-decide
     function over fixtures — an authorised message whose topic-id maps to role R ->
     steer(R, text); the same text with an unauthorised sender -> refuse (no steer);
     the same text in a topic-id that is a BL topic or the Operator topic -> ignore
     (no steer). Assert the inject ADAPTER was invoked for role R's pane target and
     NOT for any other role's, over an injected inject-seam — never a real tmux
     server, never a real ps/socket scan. Provisioning: ensure-topics over an
     injected createForumTopic-seam creates one topic per role named for the role
     and records each topic id in the role->topic map (redirectable env dir). Prove
     the map read is load-bearing by break-then-fix: with the map present a steer
     routes to role R; blank/remove it and no role resolves (no default misroute).
  2. Live (real swarm + real Telegram forum, authorised human, front desk running):
     confirm eight role-named steering topics appear (specifier, coder, cleaner,
     architect, hardender, documenter, QA, coordinator). Post a nudge in the coder
     topic and watch it land verbatim in the coder's live pane (in the extension
     tile / `tmux capture-pane`); post another in the QA topic and watch it land in
     QA's pane and NOT the coder's. Post from an unauthorised account in a steering
     topic and confirm no pane receives anything. Post the same text in a BL-ticket
     topic and in the Operator topic and confirm neither becomes a pane steer and
     both topics keep their existing behavior.

human_approval: >
  approved 2026-07-15. Final read confirmed by the human via AskUserQuestion in the
  coordinator session: design approved as specced (8 per-role topics, live pane
  inject via the existing verified-nudge path, principal- and topic-scoped), and
  slice 2's answer-back stays deferred as a follow-up — ship slice 1 (inbound-only)
  first, do not fold the round-trip in now.
mutation_cost: medium
