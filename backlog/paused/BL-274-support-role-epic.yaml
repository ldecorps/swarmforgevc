notes: |
  UMBRELLA/tracking item, not a directly-promotable slice — the actionable work is
  its children. Support = a human-facing FRONT DESK that runs OUTSIDE the swarm
  workflow (like the Operator/Coordinator): it holds conversations with the manager
  and hands actionable outcomes to the swarm; it never builds, specs, promotes, or
  closes backlog (BL-###) tickets.

  DECISIONS LOCKED WITH THE HUMAN (2026-07-11) — carry into every child:
    1. Role name: `Support` (session `swarmforge-support`, display "Support").
    2. Ticket model: SEPARATE `SUP-###` conversation threads, distinct from build
       `BL-###`; a discussion SPAWNS/LINKS BL-### items via the Coordinator when
       actionable (one discussion may seed several).
    3. Email direction: inbound + outbound from v1 (inbound-receive is net-new).
       Telegram + RC already interactive.
    4. Runtime: Operator-style — a `support_runtime.bb` (mirror
       `operator_runtime.bb`) owns reminder timers, inbound-channel watchers,
       ticket state, heartbeat, `support/status.json`, and wakes a DISPOSABLE
       Support LLM only per event.
    5. Authority: when actionable, Support files an INTAKE to the Coordinator (same
       path the Operator uses) referencing `SUP-###`; the Coordinator
       specs/promotes/builds; Support tracks the resulting BL-### status back onto
       the SUP thread. Support never fabricates a design, promotes, or approves.
    6. Callers: single principal (the manager) for v1, matched across their known
       email / Telegram / RC identities. No multi-user identity resolution.
    7. Close behavior: Support never closes a ticket of its own will while the caller
       is engaged. The 3rd unanswered daily reminder is a FINAL 24h notice; close as
       abandoned only if still silent after it. The caller asking to close / confirming
       resolution also closes it. A spawned BL-### shipping does NOT auto-close the SUP
       thread — report it and leave closure to the caller.

  Email is the SYSTEM OF RECORD: after every interaction on any channel, Support sends
  the caller an email (subject `[SUP-###] <title>`) that (1) summarizes the conversation
  so far, (2) states the next step, (3) lists the options — so an offline caller reads
  the latest `[SUP-###]` email for current status. Threads run in parallel and fully
  independently (never bleed one ticket's context into another); if two are obviously
  related, tell the caller on both.

  A refined draft role prompt is in the intake; the specifier lands
  `swarmforge/roles/support.prompt` WITH slice 1's integration (a new role prompt is a
  spec/prompt file the specifier owns), sequenced through the pipeline like any change.

  SEQUENCE (dependency order; children specced JUST-IN-TIME by the specifier as the
  coordinator is ready to promote each — this avoids speccing net-new infra (slice 4
  inbound email) prematurely and respects BL-233, no feature file ahead of built code.
  Only BL-275 is specced now; BL-276..279 scope is FIXED below):
    1. BL-275 (SPECCED, promote first) — SUP-### thread store + `support_runtime.bb`
       skeleton (timers/heartbeat/status/event-queue) + disposable Support LLM wake,
       proven over RC + OUTBOUND email echo. Standalone MVP. depends_on: [].
    2. BL-276 — daily reminder clock + 3-strike final-warning-then-close logic
       (counted from caller's last participation; reset on participation; 3rd = 24h
       final notice; close abandoned only if still silent). depends_on: [BL-275].
    3. BL-277 — Telegram channel wired in (open/follow-up on Telegram, echoed to
       email). Reuses `extension/src/notify/telegramClient.ts`. depends_on: [BL-275].
    4. BL-278 — INBOUND email receive path (follow up by replying to `[SUP-###]`).
       NET-NEW infra (Resend inbound webhook or IMAP poll), quarantined so it can't
       block the rest; reuse `recertInboundWebhook.ts` + `svixSignature.ts` webhook
       precedent. depends_on: [BL-275].
    5. BL-279 — Coordinator-intake bridge + BL-### status tracked back onto the SUP
       thread + obvious-relation detection across tickets. depends_on: [BL-275, BL-276].

  EXISTING INFRA TO REUSE (verified 2026-07-11):
    - Outbound email: `resendClient.ts` / `extension/src/util/authenticatedPost.ts`,
      as `briefing_email_lib.bb` already uses.
    - Telegram: `extension/src/notify/telegramClient.ts` (BL-239/240/265).
    - RC: agent remote-control sessions (`--remote-control`,
      `list_remote_control_sessions.sh`).
    - Runtime precedent: `swarmforge/scripts/operator_runtime.bb`
      (timers/heartbeat/event-queue + disposable LLM) — mirror it; note the Operator
      is EXTERNAL to the swarm, and Support is likewise a front desk, not a pipeline
      role, so it does NOT go in `swarmforge.conf`'s pipeline window list.
    - Inbound-webhook precedent: `recertInboundWebhook.ts` + `svixSignature.ts`
      (BL-217) for slice 4's net-new inbound email.

  Note: intake lives at `.swarmforge/operator/INTAKE-support-role.md` (operator
  domain, not the backlog root); left in place as the source-of-record — not deleted
  by the specifier.

