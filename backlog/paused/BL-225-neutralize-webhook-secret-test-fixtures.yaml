id: BL-225
title: "Neutralize whsec_ webhook-secret test fixtures GitGuardian flags across history"
direction: security
priority: 10
mutation_cost: low
source: "operator-forwarded GitGuardian alert 2026-07-09: '1 internal secret incident — Stripe Webhook Secret' in ldecorps/swarmforgevc at commit c516035 + 26 other occurrences. Specifier diagnosis 2026-07-10."

description: |
  GitGuardian flagged a "Stripe Webhook Secret" (a whsec_-prefixed value) across
  26 commits. Every occurrence is a TEST fixture / evidence-doc literal for
  BL-217's svix-style inbound-email signature verification, never production
  config: the receiver (extension/src/notify/recertInboundWebhook.ts) takes the
  secret via deps.secret (dependency injection) and never hardcodes it. The
  whsec_ prefix is shared by Svix and Stripe, which is why GitGuardian labeled a
  Svix-format value "Stripe". BL-217's receiver is Svix/Resend Inbound style.

  The value is NOT the well-known public Svix docs example (hashes differ), so
  the code alone cannot prove whether it was invented for the test or copied from
  a real endpoint — the operator is checking the provider dashboard.

  Wanted behavior (code-side, this ticket):
    - Fixtures build their signing secret at RUNTIME from an obviously-fake seed,
      exactly like the existing wrongSecret line in svixSignature.test.js
      ('whsec_' + Buffer.from(fakeSeed).toString('base64')). No committed file
      contains a whsec_ prefix directly followed by a long base64 literal.
    - The svix signature accept/reject and replay/timestamp tests still pass
      unchanged (the runtime secret still base64-decodes to real HMAC bytes).
    - The BL-217 bounce evidence doc
      (backlog/evidence/BL-217-inbound-email-webhook-bounce-20260709.md) builds
      the secret at runtime or shows a redacted placeholder, not a whsec_ literal.
    - A committed regression guard greps the tree for /whsec_[A-Za-z0-9+/]{20,}/
      and fails on any match, so a future fixture cannot reintroduce one.

  Scope (verified live 2026-07-10): extension/test/svixSignature.test.js,
  extension/test/recertInboundWebhook.test.js, and the BL-217 evidence doc are
  the only three tracked files carrying the literal (git grep confirmed). Plus a
  small guard check. Production source is already clean.

  OPERATOR PREREQUISITE (not pipeline work): if the operator confirms the value
  was ever a real Svix/Resend/Stripe endpoint secret, they ROTATE it at the
  provider dashboard (Resend/Svix "roll signing secret", or Stripe "roll secret")
  and update the receiver's env var at the hosting platform — the repo never
  stores it. Then mark the GitGuardian incident resolved. If no live endpoint
  exists (none provisioned yet per BL-223), it is a false positive and only this
  neutralization is required. Git-history rewrite is OUT of scope unless the
  operator explicitly requests it — rotating the secret makes the old value
  worthless, so purging past commits is unnecessary.

acceptance: specs/features/BL-225-neutralize-webhook-secret-test-fixtures.feature

qa_e2e_procedure: |
  End-to-end procedure QA runs:
  1. Run `git grep -nE 'whsec_[A-Za-z0-9+/]{20,}'` over the tree; assert zero
     matches (fixtures now construct the secret at runtime).
  2. Run the svix signature + recert inbound webhook test files; assert the
     accept, reject, and replay/timestamp tests all pass as before.
  3. Confirm the regression-guard check is wired to run in the normal verification
     path and fails when a whsec_ literal is deliberately reintroduced, then
     passes once removed.
  4. Confirm the BL-217 evidence doc no longer embeds a whsec_ literal.

