description: |
  ## Problem

  Provider "can I use this role/provider right now" state is scattered:
  rate-limit cooldowns live in one file format read by
  extension/src/swarm/cooldownScheduler.ts and chase_sweep_lib.bb's
  rate-limit gate (BL-082/BL-209); a separate respawn-cooldown.json tracks
  agent-crash backoff; BL-551 (active) is building a per-invocation cost
  ledger with no consumer that turns spend into an availability decision.
  Nothing answers one question: "is this role/provider usable right now,
  and why not if not."

  ## Wanted behavior (Slice 1 only)

  A single pure, testable QuotaManager module exposing one query:

      available?(role-or-provider, now-ms) -> {available bool, reason kw?, until-ms?}

  It REUSES existing inputs, it does not invent new persisted quota state:
    1. Reads the existing rate-limit cooldown file
       (extension/src/swarm/cooldownScheduler.ts's CooldownFileState /
       chase_sweep_lib.bb's mirrored reader) — if now-ms is before the
       recorded untilMs, unavailable with reason rate_limit_cooldown.
    2. Reads BL-551's llm-cost ledger and sums today's spend for the
       provider; if a daily dollar budget ceiling is configured for that
       provider (new, small config surface — a map in swarmforge.conf or a
       sibling config file, specifier to pin exact location during coder
       handoff) and spend meets/exceeds it, unavailable with reason
       budget_ceiling_reached. Unknown-cost ledger rows are excluded from the
       sum per BL-551's own honest-null discipline — never counted as $0.
    3. No configured ceiling for a provider means budget never blocks it.
    4. Cooldown takes priority over budget when both would otherwise apply
       (Scenario 07) — cooldown is the more urgent signal (a live 429), so
       report that reason first.
    5. No recorded state at all (fresh role/provider) defaults to available.

  Non-goals for Slice 1 (future slices under BL-552, not yet decomposed):
  RPM/TPM windows, monthly-subscription quotas, telemetry-learned quota
  discovery (429 header parsing beyond what BL-209 already does), forecast
  exhaustion, a dashboard, automatic failover, and any Scheduler/ModelFactory
  wiring that actually CALLS this query in production — this slice ships the
  query with tests only; it stays dark (per the shared engineering article's
  epic-runtime-wiring-slice rule) until BL-525 ModelFactory or another real
  caller is scoped to consume it. Do not add a caller in this ticket.

