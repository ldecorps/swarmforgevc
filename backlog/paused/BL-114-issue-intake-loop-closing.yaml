id: BL-114
title: "close the loop on GitHub issue intake (specifier comments + closes issues)"
milestone: M4
status: todo
priority: 15
direction: non-aligned
assigned_to: coder
source: "root intake BL-056-issue-intake-loop-closing (renumbered: id BL-056 already used by done/M4 anchor-handoff-state-dir ticket)"

description: |
  Depends on .github/workflows/swarm-intake.yml (already present: issue ->
  backlog root item, id GH-<n>, source: field carries the issue URL).

  When the specifier drains a GH-<n> root item into a spec in
  backlog/paused/, it should also close the loop on GitHub via `gh`
  (available in the worktree, auth from the host environment per the
  Secrets rule):
  - comment on the source issue with the spec summary and the paused item
    path
  - apply label `swarm-specced`
  When the item completes (moved to done/), whichever role sends the
  completion notification comments the merge commit on the issue and
  closes it.
  If `gh` auth is unavailable, skip silently and note it in the run log;
  issue loop-closing must never block the pipeline.

  Deliverable shape: runnable helper script(s) under swarmforge/scripts/
  (e.g. issue_specced.sh <GH-n> <paused-path>, issue_done.sh <GH-n>
  <merge-commit>) plus the role-prompt lines telling the specifier and the
  closing role when to invoke them. Keep the scripts testable without a
  live GitHub (inject the gh call).

acceptance: |
  Feature: GitHub issues that seeded backlog items hear back automatically

  # BL-114 issue-loop-01
  Scenario: draining a GH item comments and labels the issue
    Given a drained root item with id GH-<n> and a source issue URL
    When the specced helper runs for it
    Then the issue receives a comment with the spec summary and the
      paused item path
    And the issue is labeled swarm-specced

  # BL-114 issue-loop-02
  Scenario: completion closes the issue with the merge commit
    Given a GH-<n> item that has been merged and moved to done/
    When the completion helper runs for it
    Then the issue receives a comment naming the merge commit
    And the issue is closed

  # BL-114 issue-loop-03
  Scenario: missing gh auth never blocks the pipeline
    Given gh auth is unavailable
    When either helper runs
    Then it exits zero without touching GitHub
    And the skip is noted in the run log

  # Non-behavioral gates:
  #  - Tokens come from the host environment only (Secrets rule); never
  #    written into the target working directory or any commit.
  #  - Helpers testable with an injected/fake gh; no live GitHub in tests.
  #  - specifier.prompt (and the closing role's prompt) gain the
  #    invocation points.
