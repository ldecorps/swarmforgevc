source: "root intake BL-054-aps-stage2-executable-acceptance (renumbered: id BL-054 already used by done/M4 needs-human-border ticket). Depends on BL-111."

description: |
  Build the project-specific APS components in specs/pipeline/ per the
  pinned Acceptance-Pipeline-Specification. Depends on BL-111 (feature
  files + pinned gherkin-parser must exist first).

  - Acceptance entrypoint generator + acceptance runtime + runner adapter
    wired to the project test runner.
  - Step handlers drive the TESTABLE host-side core only (tmux socket
    discovery, .swarmforge state parsing, handoff protocol, backlog
    parsing, grid layout logic) through CLI/module surfaces. The VS Code
    API and the webview stay behind the unsuitable-module boundary; no
    booting VS Code in acceptance runs.
  - Pipeline: feature file -> gherkin-parser -> JSON IR -> entrypoint
    generator -> generated entry points -> runner. Acceptance generation
    and acceptance runs are sequential; never concurrent with whole-suite
    unit runs (shared engineering Verification rule).
  - Role prompt updates: coder's acceptance-test prohibition is lifted to
    the upstream model (implements approved slices with TDD, unit tests,
    and GENERATED acceptance tests); QA converts the specifier's e2e QA
    procedures into executable scripts and runs them as the final gate.

acceptance: |
  Feature: feature files run as generated acceptance tests against the host core

  # BL-112 acceptance-pipeline-01
  Scenario: a feature file becomes a runnable acceptance test
    Given a parsed feature file in specs/features/
    When acceptance generation runs
    Then generated entry points exist for its scenarios
    And running them exercises the host-side core without booting VS Code

  # BL-112 acceptance-pipeline-02
  Scenario: a failing behavior fails its acceptance run
    Given a scenario whose Then-condition the core does not satisfy
    When its generated acceptance test runs
    Then the run fails and names the failing scenario

  # BL-112 acceptance-pipeline-03
  Scenario: generation and runs are sequential
    When the acceptance pipeline executes end to end
    Then generation completes before any acceptance run starts
    And no whole-suite unit run executes concurrently with either

  # Non-behavioral gates:
  #  - Components live in specs/pipeline/ (generator, runtime, step
  #    handlers, runner adapter, convenience scripts).
  #  - Step handlers touch no VS Code API and no webview context.
  #  - coder.prompt and QA.prompt updated as described.
