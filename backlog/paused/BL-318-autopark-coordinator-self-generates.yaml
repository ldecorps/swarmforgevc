id: BL-318
title: "Auto-hibernate fires when backlog is drained — coordinator must not self-generate during quiescence"
description: |
  BL-307's auto-hibernation (should-hibernate? → hibernate-swarm! in operator_lib.bb) is
  structurally unreachable on this repo. The hibernation trigger requires a drained
  backlog AND all roles quiescent. But the coordinator treats a drained backlog as
  a cue to write itself new tickets (BL-311, BL-314-317 all surfaced this way), making
  the two conditions mutually exclusive. The swarm therefore never parks, burning quota
  on unrequested work while the intended cost-control sits dead.
  
  This ticket makes hibernation reachable by preventing the coordinator from promoting
  self-generated tickets when the backlog is drained and all roles are quiescent.
  It also fixes a provenance bug where the coordinator's self-generated tickets
  falsely claimed human origin (BL-314 source field), making self-generated scope
  indistinguishable from human directives on review.

  Three fixes together:
  1. Provenance-honest source field: a ticket's source must record who actually raised
     it. "self" (coordinator) is a legitimate value; falsely claiming "human" is not.
  2. Quiet-period gate: the coordinator may not promote a self-generated ticket while
     the backlog is drained. Drained + quiescent → hibernate wins over self-promotion.
  3. Human-only promote lane (stretch): self-generated tickets could land in paused/ and
     require explicit human/Operator promote, making the swarm propose-only, never
     self-queue. This slice implements (1) and (2); (3) is a future enhancement.

  Scope: operator_lib.bb (hibernation trigger + source validation), the coordinator's
  promotion logic in coordinator.prompt, and the backlog YAML schema validator for
  source field honesty. Does NOT change the hibernation mechanism itself.

  mutation_cost: low
  direction: aligned
  type: defect
  severity: high
