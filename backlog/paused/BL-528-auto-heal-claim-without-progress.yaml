notes: |
  WHAT / WHY: A role can hold an active TASK, re-run ready_for_next / reclaim the same
  ticket, and sit idle at a prompt while dashboards stay green. Loop halt today covers
  pure :no-task-spin only (handoffd), not claimed-but-no-progress. Live example: coder
  reclaiming BL-512 without executing; related green-but-halted forensics in
  backlog/evidence/BL-109-BL-121-BL-122-handoff-halt-20260706.md. Chaser nudge:coder
  also fired on 2026-07-19.

  ROOT CAUSE: claim/inbox liveness treats "task assigned" as healthy.

  OUTCOME: detect idle reclaim of the same task (no commits / no tool use / repeated
  reclaim); escalate nudge → reassign/bounce claim → halt+Telegram/email (same alert
  path as endless-loop halt).

  Specifier: write APS feature under specs/features/BL-528-*.feature before coder work.
  Cite BL-512 audit Rank 1.

acceptance: |
  # Specifier replaces this with specs/features/BL-528-*.feature
  Feature: claim-without-progress is auto-healed
    Scenario: repeated idle reclaim of the same task triggers heal then escalate
      Given a standing role that has claimed a task and made no durable progress
      When the same task is reclaimed idle beyond the configured threshold
      Then the swarm nudges, then reassigns or releases the claim
      And if still stuck it halts with Telegram and email operator alerts
