source: |
  Coordinator bug report 2026-07-24 (originally
  swarmforge/runtime/reports/coordinator-rotate-home-bug.md, preserved at
  backlog/evidence/BL-614-coordinator-rotate-home-bug-report.md). Confirmed
  live 2026-07-24 ~10:41 BST: coordinator ran ready_for_next.sh per its idle
  instructions; rotate-home? returned true (mailbox "empty", role != home),
  ready_for_next.sh printed ROTATE_HOME and auto-exec'd rotate_to_role.sh
  coder, which ran `tmux respawn-pane -k` on the swarmforge-coder session —
  killing the coder's live Claude process mid-task on BL-608. It recovered
  only because BL-608 was already claimed in in_process/ (RESUME-ON-START),
  but live conversation context was lost and a respawn was burned.

  Specifier verified the gate on main before speccing:
  swarmforge/scripts/mono_router_lib.bb:226 (rotate-home?) checks only
  rotation-router? AND mailbox-empty? AND role != home-role — no check that
  the role is rotation-eligible; swarmforge/scripts/ready_for_next_task.bb:35
  (report-no-task-or-rotate!) passes role=coordinator straight through.
  The mono-router pack overlay explicitly documents the coordinator as
  "Reserved infrastructure, never part of the rotation, always its own
  separate session."
description: |
  ## The defect

  Under a mono-router pack (`config rotation router`), `rotate-home?` in
  swarmforge/scripts/mono_router_lib.bb has no notion of rotation
  eligibility. Any role whose mailbox is empty and whose name differs from
  the home role satisfies the gate — including the coordinator, which is not
  part of the rotation at all. ready_for_next.sh then execs
  rotate_to_role.sh <home>, which always targets the resident session
  (swarmforge-coder) and respawns that pane with `tmux respawn-pane -k`,
  regardless of whether the resident is mid-task. "Coordinator mailbox
  empty" says nothing about whether coder is idle, so this kills live work.

  This recurs every time the coordinator goes idle and follows its own
  standing instruction to run ready_for_next.sh while its mailbox happens to
  be empty (the common case).

  ## Wanted behavior

  - `rotate-home?` (or report-no-task-or-rotate! one layer up) never returns
    true / never emits ROTATE_HOME when the calling role is `coordinator`,
    regardless of mailbox state, rotation mode, or home role. The
    coordinator with no task gets plain NO_TASK.
  - Rotation-eligible non-home pipeline roles keep rotating exactly as
    today (BL-550's existing scenarios and tests remain green).
  - Unit coverage in the same parcel: mono_router_lib rotate-home? is false
    for {:role "coordinator"} regardless of mailbox-empty?/home-role
    (swarmforge/scripts/test/mono_router_lib_test_runner.bb), plus the
    script-level path in
    swarmforge/scripts/test/test_ready_for_next_rotate_home.sh asserting
    NO_TASK (not ROTATE_HOME) for SWARMFORGE_ROLE=coordinator with an empty
    mailbox.

  ## Acceptance materialization (BL-233 / BL-441)

  Acceptance scenarios are parked in
  specs/features/BL-614-rotate-home-coordinator-exclusion.feature.draft
  because the runner hard-fails on handler-less scenarios. The coder MUST,
  in the same parcel: rename the draft to .feature and wire its step
  handlers (the BL-550 harness in
  specs/pipeline/steps/bl550MonoRouterRotateHomeSteps.js covers the same
  surface and should be reusable). Do not close this ticket with the draft
  unmaterialized.

  ## Out of scope

  - The .gitkeep depth-warning miscount from the same bug report is already
    covered by BL-562.
  - Orphaned .claim-progress.json sidecar cleanup is BL-615.
acceptance: specs/features/BL-614-rotate-home-coordinator-exclusion.feature.draft
notes: |
  e2e QA procedure: on the live mono-router swarm, with the coordinator's
  inbox empty (new/ and in_process/ hold no .handoff), run
  swarmforge/scripts/ready_for_next.sh with SWARMFORGE_ROLE=coordinator from
  the master checkout. Verify: output is NO_TASK with no ROTATE_HOME /
  HOME_ROLE lines; the swarmforge-coder tmux session's pane PID is unchanged
  afterwards (no respawn); then run
  bb swarmforge/scripts/test/mono_router_lib_test_runner.bb and
  swarmforge/scripts/test/test_ready_for_next_rotate_home.sh — all green.
