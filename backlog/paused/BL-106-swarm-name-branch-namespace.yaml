id: BL-106
title: unify worktree branch naming to <swarm_name>/<role> so one repo hosts multiple swarms without collisions
milestone: M6
status: todo
priority: 04
source: operator observation 2026-07-04/05 ("worktree branches have the project prefix — so one extension can work the same repo for multiple projects")
depends_on: BL-090 (swarm_name exists; merged)

description: |
  The operator's intent — branch prefixes let multiple swarms/projects
  coexist on one repo — is currently only half-true: the live branches
  split across TWO schemes (`swarm/<role>` slash-namespace vs
  `swarmforge-<role>` dash-prefix, plus stale variants). Nothing parses
  the prefix today, so it works by luck; with BL-090's swarm identity
  merged and secondaries coming, make the namespace real and derived,
  not conventional.

  Wanted behavior:
    - Branch naming rule: every role worktree branch is
      `<swarm_name>/<role>` (git-idiomatic slash namespace; groups and
      sorts per swarm; role names already reject underscores). The
      launcher DERIVES branch names from the conf's swarm_name — no
      hardcoded prefixes anywhere in scripts or extension code.
    - Launch validation: creating/attaching a worktree whose branch does
      not match its swarm_name namespace fails fast with the expected
      name in the message; two swarms with different swarm_names can
      hold worktrees against the same repo with zero ref collisions.
    - Migration: one-time rename of the current mixed-scheme branches to
      the unified names (worktrees retargeted, no history change, no
      content change), plus pruning of stale duplicate role branches
      (e.g. the leftover swarm/cleaner vs swarmforge-cleaner pair) after
      confirming each is fully merged. Executed at an idle moment like
      any worktree refresh; documented in the run.
    - Anything that references branch names (metrics/backlog parsing,
      respawn/launch scripts, docs + architecture diagram if it names
      branches) reads the derived form.

  Scope: swarm launcher/scripts (derivation + validation + migration
  script), any extension-side references to role branch names, docs.
  Rule recorded in the local engineering article (specifier commits that
  with this parcel's merge).

acceptance: |
  Feature: role branches are namespaced by swarm identity

  # BL-106 branch-ns-01
  Scenario: launcher derives branch names from swarm_name
    Given a conf with swarm_name alpha
    When the swarm launches its worktrees
    Then every role worktree is on branch alpha/<role>

  # BL-106 branch-ns-02
  Scenario: two swarms share a repo without collisions
    Given worktree sets for swarm_names alpha and beta on one repo
    When both are inspected
    Then no branch ref is shared between them
    And each swarm's helpers address only its own namespace

  # BL-106 branch-ns-03
  Scenario: mismatched branch fails fast
    Given a worktree on a branch outside its swarm_name namespace
    When the launcher validates at startup
    Then launch fails with a message naming the expected branch

  # BL-106 branch-ns-04
  Scenario: migration preserves everything
    Given the current mixed-scheme branches
    When the migration runs
    Then each role worktree is on its unified branch with identical HEAD
    And stale duplicate role branches are removed only if fully merged

  # Non-behavioral gates:
  #  - Derivation/validation logic script-tested; migration rehearsed on
  #    a scratch clone before the live run.
  #  - No history rewrite; branch renames only.
