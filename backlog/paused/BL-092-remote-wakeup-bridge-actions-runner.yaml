id: BL-092
title: remote wake-up bridge — self-hosted GitHub Actions runner nudges the WSL2 swarm on relevant pushes
milestone: M6
status: todo
priority: 05
direction: non-aligned
source: operator requirement refinement 2026-07-04 ("could we leverage some git action?")
depends_on: BL-091

description: |
  Third slice: replace the remote swarm's manual/periodic `git pull` with an
  event-driven wake-up, using GitHub as the notification bus. Design chosen
  by the operator (2026-07-04): a self-hosted GitHub Actions runner
  registered from inside the WSL2 environment on the Windows box. Runners
  hold an outbound long-poll connection to GitHub, so no inbound ports,
  tunnels, or firewall changes are needed on either machine.

  Behavior wanted:
    - A workflow triggers on pushes to main that touch backlog/active/ (and
      any path the parcel flow needs the remote swarm to react to). It runs
      ONLY on the self-hosted runner labeled for the second swarm.
    - The workflow job is a thin nudge: sync the remote swarm's checkout
      (fetch/pull) and deliver a wake-up to the local specifier pane (the
      same "You have new handoff mail / run ready_for_next.sh"-class nudge
      handoffd sends locally), via the swarm's own tmux socket. No business
      logic in the workflow — routing decisions stay with the roles.
    - Idempotent and lossy-tolerant like tmux wake-ups: duplicate or missed
      nudges must be harmless because the durable state is git + the
      backlog files; a fallback periodic pull (slow timer) keeps the remote
      swarm live through GitHub/Actions outages.
    - Wake-ups are filtered: pushes that only concern the OTHER swarm's
      assignments do not nudge (cheap filter, e.g. on the changed paths /
      assignment field), to avoid waking the remote specifier for work it
      must ignore.
    - No secrets in the target repo per constitution: runner registration
      tokens live on the remote machine only.

  Scope: .github/workflows/ + a small nudge script under swarmforge/scripts
  (testable pure part: push-event -> nudge/no-nudge decision) + bring-up
  doc addition (registering the runner in WSL2). No extension changes.

acceptance: specs/features/BL-092-remote-wakeup-bridge-actions-runner.feature
