id: BL-142
title: "Agent brand abstraction layer: one Forge contract across providers"
milestone: M6
status: todo
priority: 05
direction: non-aligned
assigned_to: specifier
source: "operator request (2026-07-06): with multi-agent support, Forge must interact uniformly regardless of agent brand"

description: |
  Problem:
  Multi-agent support is expanding across providers/brands. If provider-specific
  behavior leaks into orchestration, every new brand multiplies integration
  complexity and weakens reliability.

  Wanted behavior:
  Introduce a top-layer abstraction contract between Forge orchestration and
  agent backends so the orchestration flow is provider-neutral.

  Core contract goals:
  - Uniform lifecycle: launch, attach, health, stop, respawn.
  - Uniform I/O primitives: send input, capture output, detect idle/needs-human.
  - Uniform capability model: features declared as capabilities, not implicit by
    provider name.
  - Uniform error taxonomy: normalize backend failures into stable Forge-level
    categories.
  - Uniform observability: comparable metrics/log fields across providers.

  Scope:
  - Define interface boundaries and adapter responsibilities.
  - Map existing providers onto adapters behind the contract.
  - Keep orchestration logic ignorant of provider-specific command syntax.
  - No visual redesign required in this ticket; architecture and integration
    contract first.

acceptance: specs/features/BL-142-agent-brand-abstraction-layer.feature
mutation_cost: high
