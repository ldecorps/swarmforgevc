description: |
  The handoff mechanism has stalled the swarm repeatedly since day one. This is
  not one bug but a chain of partial fixes that each closed a single failure
  mode while end-to-end delivery stayed untrustworthy — the swarm halts with
  every dashboard showing green. This epic sequences the remaining gaps into
  orthogonally-ordered child slices (see notes) so no two of them edit the
  shared notify/transport paths concurrently. See each child ticket for its own
  scoped description, seams, and acceptance.

