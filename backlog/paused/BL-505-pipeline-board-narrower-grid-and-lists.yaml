id: BL-505
title: "Pipeline board too wide for a phone: show ticket numbers only (drop BL-/GH- prefix), shorten the grid slug to 2 kebab words, and trim the below-grid list lines to the kebab slug only"
milestone: M8
type: defect
severity: medium
epic: ""
priority: 10
depends_on: []
source: "Root intake backlog/INTAKE-pipeline-board-grid-too-wide.md (coordinator-relayed human request 2026-07-17, looking at a live board render). Specifier asked the human 2026-07-17 and resolved the open UX calls (scope, slug length) before speccing."

notes: |
  The Telegram Pipeline Board's <pre> grid plus its PARKED/AWAITING/ROOT INTAKE/RECENTLY CLOSED
  list lines are too wide to fit the human's phone without horizontal scroll. The human asked:
  "Only keep the digit of the ticket and/or shorten even more the kebab case slug." Two levers,
  both confirmed with the human (specifier questions 2026-07-17):
    - Width scope: narrow BOTH the grid's own columns AND the below-grid list lines (the list
      lines carry a wide title tail up to 60 chars and are the widest offenders).
    - Grid slug: shorten from 3 kebab words to 2.

  THE CHANGE (behaviour pinned in the feature; the exact header glyph is the coder's/architect's
  cosmetic call, per BL-452's column-glyph precedent):
    1. TICKET NUMBER ONLY - the grid TICKET column renders the ticket number with a recognised
       BL-/GH- prefix stripped (BL-493 -> 493). An id with no recognised ticket prefix (a
       root-intake filename stem, e.g. "INTAKE-...") is shown UNCHANGED. Shorten the column
       HEADER too (it is currently the 6-char word "TICKET", which floors the column width at 6
       via idColumnWidth's max(TICKET_HEADER.length, ...)) so the column is no wider than the
       numbers themselves.
    2. GRID SLUG -> 2 WORDS - deriveKebabSlug's maxWords drops from 3 to 2 for the grid slug.
    3. BELOW-GRID LIST LINES -> KEBAB ONLY - deriveListEntryText drops the wide deriveTicketSlug
       title tail and shows only the short kebab slug; a real ticket id in a list line is
       rendered number-only the same way the grid's is. (deriveTicketSlug /
       PIPELINE_BOARD_SLUG_MAX_LENGTH become unused by the lists; the cleaner may remove them if
       nothing else references them - grep first.)
    4. LINKS SECTION UNCHANGED - out of scope here: its width is already budgeted by BL-502 and
       its ordering is BL-506's separate concern. Do NOT touch renderPipelineBoardLinks /
       budgetPipelineBoardLinks / the link line format.

  ID-COLLISION SAFETY (documented assumption): showing digits only is unambiguous TODAY because
  every id across backlog/{active,paused,done} is BL- (445 BL-, zero GH- - grep-verified
  2026-07-17). The number-strip is therefore safe now. If a foreign prefix (GH-) is ever
  introduced, two different-prefix ids could share a number and collide on the board; revisit
  then (retain the prefix only when a same-number foreign-prefix id is present on the same
  board). Called out so a future reader knows this is a deliberate scoping decision, not an
  oversight.

  SUPERSEDES BL-462/BL-465 (this reverses their widening) - MUST be revised IN THIS SAME PARCEL,
  never as a separate main commit (a feature edit landed on main without its matching step-handler
  change breaks the acceptance runner for every role mid-flight; BL-233: scenarios and their
  handlers land together). Known contradicting sites (grep BL-455/BL-462/BL-465 features + steps
  for any remaining slug/title-width assertion - the tool knows every site, you do not):
    - specs/features/BL-465-pipeline-board-render-round2.feature + specs/pipeline/steps/
      bl465PipelineBoardRenderRound2Steps.js: the grid-slug assertion expects the 3-word
      "pipeline-board-shows"; the list-entry assertions require it "shows more of the title than
      the previous 40-char limit" and "includes the FULL title" - all three now contradict the
      2-word / kebab-only contract. Revise the scenarios AND their handler.
    - specs/features/BL-462-pipeline-board-wider-slug-updated-at-repost.feature: the
      "longer slug, same line" / wider-bound scenario - reconcile with the narrower slug.
    - extension/test/pipelineBoard.test.js: any slug/list-entry width expectation.
    - extension/test/conciergeTick.test.js (~L2020): asserts the 3-word "fix-the-pipeline"
      grid slug (from title "fix the pipeline board") - becomes "fix-the" at 2 words.
    Per the specifier "superseded scenario: retire, don't reword" posture, prefer RETIRING a stale
    scenario over contorting it; the specifier owns the feature-file wording, the coder owns the
    step handlers and unit tests - both land here.

  CHANGE-GATE: renderPipelineBoardBody's text is pipelineBoardSync.ts's content signature, so this
  render change triggers exactly ONE benign repost when it lands (expected, not a defect - the
  BL-462/464/465/468/473 change-gate/repost contract is otherwise unchanged).

  SCOPE (verify the live path at build - grep the real callers, do not assume):
    - extension/src/concierge/pipelineBoard.ts (deriveKebabSlug maxWords, deriveListEntryText,
      idColumnWidth / TICKET_HEADER / renderHeader / renderDataRow, renderListSection - add one
      shared display-id helper used by both the grid row and the list line).
    - The superseded features/steps/tests listed above.

  ORTHOGONALITY: shares extension/src/concierge/pipelineBoard.ts with BL-506 (LINKS ordering) -
  the two touch DIFFERENT functions (this one: slug/id/list render; BL-506: buildLinks sort) but
  the same file, so they are NOT orthogonal: sequence them, do not run concurrently (this one
  first, priority 10 vs BL-506's 11). Otherwise orthogonal to the rest of the paused queue.

acceptance:
  # Observable contract: grid TICKET column shows the ticket number without its BL-/GH- prefix
  # (non-ticket ids unchanged) with a header short enough that the column is no wider than the
  # numbers; grid slug is at most 2 kebab words; below-grid list lines show the short kebab slug
  # only (no wide title tail) with number-only ids. LINKS section unchanged. Exact header glyph
  # is a build-time detail; the scenarios hold whatever glyph is chosen.
  feature: specs/features/BL-505-pipeline-board-narrower-grid-and-lists.feature

# QA end-to-end procedure (verify the scenarios hold in the live swarm):
#   1. Build the extension (npm run compile in extension/, or npm test which compiles first).
#   2. In-process, compute+render the board over a synthetic backlog with 3-digit BL ids, a GH id,
#      a root-intake entry, a parked ticket, and a long title; assert: TICKET cells show digits
#      only (BL-493 -> "493", GH-42 -> "42"), the root-intake list id is unchanged, the grid slug
#      is <= 2 kebab words, the TICKET column width equals the number width (not 6), and each
#      below-grid list line is the kebab slug only (no title tail).
#   3. Render the board over the CURRENT live backlog and eyeball that the grid + PARKED +
#      RECENTLY CLOSED block now fits without horizontal scroll on a phone-width monospace view.
#   4. Confirm the full acceptance suite (including the revised BL-455/462/465 scenarios) passes -
#      the supersession did not leave a stale assertion or an unhandled scenario.

