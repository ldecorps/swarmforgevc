source: "human (ldecorps) via Cursor chat 2026-07-16 — after WSL reboot killed the 5-day swarm at ~/swarmforgevc: extend start-swarm.sh + ./swarm ensure so one command restores everything; then 'file a ticket for the swarm so that it has a pass through it'."

description: |
  Raw human intake — specifier drains first into paused/ with a proper APS
  feature + notes. Do not treat the Cursor-side patch on this host as done.

  Context (live host: /home/carillon/swarmforgevc — NOT the /mnt/c checkout):
  - WSL rebooted 2026-07-16 ~19:33; tmux + handoffd + operator + front desk
    all died. Worktrees and .swarmforge/launch/*.sh survived.
  - Operator entry point on this host is ./start-swarm.sh (headless wrapper
    around ./swarm), not bare ./swarm from /mnt/c.
  - Cursor patch already on this tree (ungated):
      * swarmforge/scripts/swarm_ensure.bb — ensure also covers operator +
        front desk (when TELEGRAM_* set or a prior front-desk pid exists)
      * swarmforge/scripts/swarmforge.sh — start_ancillary_services during
        cold launch (best-effort; skip flags honored)
      * start-swarm.sh — after sessions are ready, runs ./swarm ensure so
        ancillaries are repaired/started
      * test_swarm_ensure.sh scenarios 05a/05b/05c/06 — Cursor-run ALL PASS
        (NOT a swarm gate pass)
  - Front desk still requires TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID /
    TELEGRAM_PRINCIPAL_USER_ID in the launching shell env.

  What this ticket must force through the swarm:
  1. Specifier: APS feature pinning the full-stack contract for BOTH
     ./start-swarm.sh (cold/restart) and ./swarm ensure (idempotent repair),
     extending BL-145 — not a parallel ensure story. Include skip flags and
     "front desk omitted when Telegram unset / enabled when prior pid".
  2. Coder/cleaner/architect/hardener/QA: land (or re-land) so normal swarm
     hard gates pass for the touched scripts. Cursor-green is insufficient.
  3. Documenter: operator-facing docs name ./start-swarm.sh as the one
     restart command on WSL/headless hosts, and ./swarm ensure as the
     repair command; document Telegram env + skip flags. Prefer
     docs/GettingStarted.md and/or README; deep detail may link
     Specification.MD. No invented commands.

  Related: BL-145 (original ensure), BL-336 G1/G2 (front desk not in boot
  path), BL-372 (start-swarm.sh detach). A prior Cursor-only intake
  BL-394 may exist on a Windows-mounted checkout the swarm does not read —
  this ticket is the live-backlog intake.

acceptance: |
  Feature: start-swarm and ensure bring the full stack up and are documented

  Scenario: start-swarm restores agents and ancillaries
    When ./start-swarm.sh runs on a host with Telegram env configured
    Then agent sessions, handoffd, operator runtime, and front desk are up
      (or clearly reported failed without aborting agent launch)

  Scenario: ensure repairs the full stack idempotently
    Given BL-145 ensure behaviour
    When ./swarm ensure runs
    Then it also covers operator and front desk (when configured)
    And reports HEALTHY / FIXED / FAILED per component
    And the swarm hard gates for the touched scripts all pass

  Scenario: documenter writes the operator-facing path
    When the documenter pass for this ticket completes
    Then Getting Started and/or README name ./start-swarm.sh and
      ./swarm ensure as the restart and repair paths
    And they document Telegram env requirements and skip flags
    And every named command/script exists in the repo

mutation_cost: medium
