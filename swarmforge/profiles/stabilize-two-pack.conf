# Profile: stabilize-two-pack (see stabilize-two-pack.yaml)
# Two-pack with strong models for extension workflow stabilization.
# Daemon ON — exercises handoffd routing (unlike packs/two-pack.conf exercise).
#
# Launch (VS Code): "Run Extension (two-pack stabilize · daemon on)" in launch.json
#
# Isolate BL-203 before launch (depth=1, many paused items):
#   mkdir -p backlog/_held && mv backlog/paused/*.yaml backlog/_held/ \
#     && mv backlog/_held/BL-203-*.yaml backlog/paused/

config active_backlog_max_depth 1

window coordinator claude master --model claude-opus-4-6 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Coordinator
window coder claude coder --model claude-opus-4-6 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Coder
window cleaner claude cleaner batch --model claude-sonnet-5 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Cleaner
