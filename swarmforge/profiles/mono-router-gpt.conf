# Profile: mono-router-gpt (see mono-router-gpt.yaml)
# Mono-router (BL-518) on OpenAI Codex — pipeline gpt-5.5, coordinator gpt-5.4-mini.
#
# Launch (headless):
#   source ~/.zshenv
#   SWARMFORGE_TERMINAL=none \
#     SWARMFORGE_CONFIG=swarmforge/profiles/mono-router-gpt.conf \
#     ./swarm <root>
#
# Related pack (same topology, older name): --pack codex-mono-router
# This profile is the recorded operator-facing name: "Mono-router GPT".
#
# Auto mode: swarmforge.sh's codex launch always adds
# --dangerously-bypass-approvals-and-sandbox.
# After each git_handoff the resident MUST `rotate_to_role.sh <to-role>`
# (cleaner has no standing pane under mono-router).

config active_backlog_max_depth 1
config rotation router
config remote_control off
config coordinator_agent codex
config coordinator_model gpt-5.4-mini

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

window coder     codex coder       --model gpt-5.5
window specifier codex master      --model gpt-5.5
window cleaner   codex cleaner batch --model gpt-5.5
window architect codex architect   --model gpt-5.5
window hardender codex hardender batch --model gpt-5.5
window documenter codex documenter --model gpt-5.5
window QA        codex QA          --model gpt-5.5
