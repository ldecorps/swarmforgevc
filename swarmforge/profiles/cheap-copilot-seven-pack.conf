# Profile: cheap-copilot-seven-pack (see cheap-copilot-seven-pack.yaml)
# Seven-pack on GitHub Copilot CLI — mini/flash models, minimal reasoning effort.
#
# Launch (headless tmux, sync handoff inject):
#   SWARMFORGE_TERMINAL=none SWARMFORGE_SKIP_DAEMON=1 \
#   SWARMFORGE_CONFIG=swarmforge/profiles/cheap-copilot-seven-pack.conf ./swarm .
#
# Launch (VS Code extension): "Run Extension (cheap Copilot 7-pack)" in launch.json

config active_backlog_max_depth 3

# BL-243: the coordinator is provisioned automatically by ./swarm - it is
# reserved infrastructure and is rejected outright if declared here as a
# window line (see swarmforge.sh's provision_coordinator/parse_config).
window specifier copilot master --model claude-haiku-4.5 --effort low
window coder copilot coder --model mai-code-1-flash-picker --effort minimal
window cleaner copilot cleaner batch --model gpt-5.4-mini --effort none
window architect copilot architect --model gpt-5.4-mini --effort none
window hardender copilot hardender batch --model mai-code-1-flash-picker --effort minimal
window documenter copilot documenter --model gpt-5.4-mini --effort none
window QA copilot QA --model gpt-5.4-mini --effort none
