# Resilience-min pack (BL-153 phase 1): coordinator + coder + QA only.
# Use for handoff/tmux-injection work with max depth 1.
#
# Launch example (headless, no daemon — phase 1):
#   SWARMFORGE_TERMINAL=none SWARMFORGE_SKIP_DAEMON=1 \
#     ./swarm /path/to/target --pack resilience-min
#
# Or copy/symlink as swarmforge.conf while working this slice.

config active_backlog_max_depth 1

# --remote-control enables Claude Remote Control (claude.ai/code, mobile app).
window coordinator claude master --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Coordinator
window coder claude coder --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Coder
window QA claude QA --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-QA
