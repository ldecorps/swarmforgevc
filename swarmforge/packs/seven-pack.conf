# Seven-pack (7+1): coordinator + specifier, coder, cleaner, architect,
# hardender, documenter, QA. Notify chain: swarmforge/PIPELINE.md
# specifier → coder → cleaner → architect → hardender → documenter → QA → everybody
#
# Launch (default full swarm, dual-path handoff: sync inject + handoffd backup):
#   SWARMFORGE_TERMINAL=none ./swarm <target> --pack seven-pack
# Or use swarmforge/swarmforge.conf (same roles; project backlog depth settings).
window coordinator claude master --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Coordinator
window specifier claude master --model claude-sonnet-5 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Specifier
window coder claude coder --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Coder
window cleaner claude cleaner batch --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Cleaner
window architect claude architect --model claude-sonnet-5 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Architect
window hardender claude hardender batch --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Hardender
window documenter claude documenter --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Documenter
window QA claude QA --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-QA
