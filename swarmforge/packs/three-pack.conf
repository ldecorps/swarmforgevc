# Three-pack: coordinator + specifier, coder, tester (4 agents).
# specifier → coder → tester → everybody
# BL-243: the coordinator is provisioned automatically by ./swarm - it is
# reserved infrastructure and is rejected outright if declared here as a
# window line (see swarmforge.sh's provision_coordinator/parse_config).
window specifier claude master --model claude-sonnet-5 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Specifier
window coder claude coder --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Coder
window tester claude tester --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Tester
