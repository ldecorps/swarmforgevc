# codex-mono-router — mono-router topology (BL-518) on OpenAI Codex.
#
# PREREQ: npm i -g @openai/codex; OPENAI_API_KEY; PATH includes npm-global bin
# LAUNCH: SWARMFORGE_TERMINAL=none ./swarm <root> --pack codex-mono-router

config active_backlog_max_depth 1
config rotation router
config remote_control off
config coordinator_agent codex

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

window coder     codex coder       --model gpt-4.1
window specifier codex master      --model gpt-4.1-mini
window cleaner   codex cleaner batch --model gpt-4.1-mini
window architect codex architect   --model gpt-4.1
window hardender codex hardender batch --model gpt-4.1
window documenter codex documenter --model gpt-4.1-mini
window QA        codex QA          --model gpt-4.1-mini
