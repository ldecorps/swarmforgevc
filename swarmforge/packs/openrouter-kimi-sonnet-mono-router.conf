# openrouter-kimi-sonnet-mono-router — mono-router via OpenRouter (Kimi K3 + Sonnet).
#
# Role → model (operator request 2026-07-21):
#   coder / architect / hardender → moonshotai/kimi-k3   (long-horizon coding)
#   specifier / cleaner / documenter / QA → anthropic/claude-sonnet-5
#   coordinator                   → anthropic/claude-sonnet-5 (bookkeeping)
#
# PREREQ:
#   export OPENROUTER_API_KEY=...   # ~/.zshenv or ~/.bashrc
#   Also check the key's monthly spend limit in the OpenRouter dashboard
#   (account credits alone are not enough if the key limit is exhausted).
#   source .swarmforge/openrouter.env   # SWARMFORGE_OPENROUTER_ROLES=*
#
# LAUNCH:
#   source ~/.zshenv
#   source .swarmforge/openrouter.env
#   SWARMFORGE_TERMINAL=none ./swarm <root> --pack openrouter-kimi-sonnet-mono-router
#
# Notes: Claude Code is pointed at OpenRouter (ANTHROPIC_BASE_URL) per
# SWARMFORGE_OPENROUTER_ROLES. Kimi K3 is billed through the same OpenRouter
# key — if a slug is rejected by the CLI, swap that role to anthropic/* or
# check OpenRouter model availability.

config active_backlog_max_depth 1
config rotation router
config remote_control off

config coordinator_model anthropic/claude-sonnet-5
config coordinator_effort medium

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

window coder     claude coder       --model moonshotai/kimi-k3 --dangerously-skip-permissions --effort high
window specifier claude master      --model anthropic/claude-sonnet-5 --dangerously-skip-permissions --effort high
window cleaner   claude cleaner batch --model anthropic/claude-sonnet-5 --dangerously-skip-permissions --effort medium
window architect claude architect   --model moonshotai/kimi-k3 --dangerously-skip-permissions --effort high
window hardender claude hardender batch --model moonshotai/kimi-k3 --dangerously-skip-permissions --effort high
window documenter claude documenter --model anthropic/claude-sonnet-5 --dangerously-skip-permissions --effort medium
window QA        claude QA          --model anthropic/claude-sonnet-5 --dangerously-skip-permissions --effort high
