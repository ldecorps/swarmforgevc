# ── concierge-banked ──────────────────────────────────────────────────────────
# HIBERNATING swarm profile: the LLM build pack is PARKED (fire banked); only the
# zero-token daemons stay alive — handoffd, operator_runtime, and the Telegram
# front-desk bot (bridge :8765 + bot). Telegram concierge keeps answering; no
# build agents burn tokens. Counterpart of `full-forge` (the full 8-role pack).
#
# This is a MODE, not a normal launch pack (it has no `window` agents, so it is
# NOT started with `./swarm --pack concierge-banked`). It is enacted by parking:
#   1. empty roles.tsv        → runtime stops expecting/respawning build agents
#   2. kill the 8 agent tmux sessions on the swarm socket
#   3. leave handoffd + operator_runtime + front-desk supervisor running
# Exit banked mode (relaunch the full pack) with:
#   ./swarm --pack full-forge <project-root>
#
# Config kept so the daemons keep their settings (email/briefing/recert routing).
config active_backlog_max_depth -1
config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2
config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app
# (no `window` lines — the build swarm is banked)
