# cerebras-mono-router — mono-router on Cerebras OpenAI-compatible API (daily free tier).
#
# Role → model (operator request 2026-07-18; live catalog probe):
#   coder / architect / hardender → gpt-oss-120b
#   specifier / cleaner / documenter / QA / coordinator → gemma-4-31b
#
# PREREQ:
#   export CEREBRAS_API_KEY=...          # ~/.zshenv (BL-130)
#   SWARMFORGE_USE_CEREBRAS=1            # maps key → OPENAI_API_KEY + OPENAI_API_BASE at pane -e
#   aider on PATH
#
# LAUNCH:
#   source ~/.zshenv
#   export SWARMFORGE_USE_CEREBRAS=1
#   SWARMFORGE_TERMINAL=none SWARMFORGE_SKIP_OPERATOR=1 SWARMFORGE_SKIP_FRONT_DESK=1 \
#     ./swarm <root> --pack cerebras-mono-router
#
# When Cerebras daily free is exhausted → fail over to GPT pack (BL-525):
#   export OPENAI_API_KEY=...
#   ./swarm <root> --pack codex-mono-router
#
# Notes: aider OpenAI-compat path; --openai-api-base is non-secret and may sit
# in the window line. The Cerebras key is NEVER written into launch scripts.

config active_backlog_max_depth 1
config rotation router
config remote_control off
config coordinator_agent aider

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

# Format: window <role> <agent> <worktree> [task|batch] [extra-cli...]
window coder     aider coder       --model openai/gpt-oss-120b --openai-api-base https://api.cerebras.ai/v1 --no-gitignore --no-show-model-warnings --no-check-update
window specifier aider master      --model openai/gemma-4-31b --openai-api-base https://api.cerebras.ai/v1 --no-gitignore --no-show-model-warnings --no-check-update
window cleaner   aider cleaner batch --model openai/gemma-4-31b --openai-api-base https://api.cerebras.ai/v1 --no-gitignore --no-show-model-warnings --no-check-update
window architect aider architect   --model openai/gpt-oss-120b --openai-api-base https://api.cerebras.ai/v1 --no-gitignore --no-show-model-warnings --no-check-update
window hardender aider hardender batch --model openai/gpt-oss-120b --openai-api-base https://api.cerebras.ai/v1 --no-gitignore --no-show-model-warnings --no-check-update
window documenter aider documenter --model openai/gemma-4-31b --openai-api-base https://api.cerebras.ai/v1 --no-gitignore --no-show-model-warnings --no-check-update
window QA        aider QA          --model openai/gemma-4-31b --openai-api-base https://api.cerebras.ai/v1 --no-gitignore --no-show-model-warnings --no-check-update
