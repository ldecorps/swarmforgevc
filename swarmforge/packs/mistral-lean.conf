# mistral-lean — 3-role proving crew on aider + Mistral.
#
# WHY: Claude quota is <10% and Copilot is 1500/1500 exhausted (overage billing).
# Mistral via aider is the only near-free backend left: a real autonomous
# edit+commit round-trip measured at $0.00044.
#
# WHY LEAN FIRST: aider is a DIFFERENT SHAPE of agent from claude/copilot
# (:wake-style :shell-run-script, :bootstrap-style :add-files-then-paste — it is a
# pair-programming editor, not a general tool-harness agent). The plumbing is
# built and secure, but no real ticket has ever been driven through it end to end;
# two-pack-mistral.conf's own header calls itself an "exercise". Prove the handoff
# protocol holds on 3 roles before trusting 7 — the role that actually matters is
# QA, because the (still-Claude) coordinator MERGES WHAT QA APPROVES, so a
# rubber-stamping QA puts bad code on main. Coder/specifier errors stay quarantined
# in worktrees and cost nothing to discard.
#
# COORDINATOR STAYS ON CLAUDE: provision_coordinator() hardcodes
# `register_role "$role" "claude" ...` — no conf can move it. Pinned to the
# cheapest sane tier below. See INTAKE-coordinator-provider-hardcoded-to-claude.md.
#
# PREREQ: aider on PATH (0.86.2 confirmed) + MISTRAL_API_KEY exported.
# The key is passed to panes as an ephemeral `tmux respawn-pane -e` flag and is
# NEVER written into .swarmforge/launch/<role>.sh (BL-130).
#
# LAUNCH:
#   SWARMFORGE_CONFIG="$PWD/swarmforge/packs/mistral-lean.conf" \
#   SWARMFORGE_TERMINAL=none zsh swarmforge/scripts/swarmforge.sh <project-root>

# Depth 1: one ticket at a time while we are proving the backend.
config active_backlog_max_depth 1

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev

config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

# Coordinator: the one role that cannot leave Claude. Cheapest defensible tier.
config coordinator_model claude-sonnet-5
config coordinator_effort high

# --- work roles on aider + Mistral ---
# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
# The aider launch body already appends --yes-always; do NOT pass Claude-only
# flags (--dangerously-skip-permissions / --effort / --remote-control) here.
# codestral-latest = code-specialised (coder); mistral-large-latest = reasoning
# (specifier, QA).
window specifier aider master --model mistral/mistral-large-latest --no-gitignore --no-show-model-warnings --no-check-update
window coder aider coder --model mistral/codestral-latest --no-gitignore --no-show-model-warnings --no-check-update
window QA aider QA --model mistral/mistral-large-latest --no-gitignore --no-show-model-warnings --no-check-update
