# ── lean-drain ────────────────────────────────────────────────────────────────
# Budget-constrained crew to build ONE slice of the dynamic-swarm epic:
# auto-hibernate-on-drain + closing pass (INTAKE-dynamic-per-ticket-agent-routing.md).
# 3 windows (specifier+coder+QA, Sonnet) + the auto-provisioned coordinator.
# max_depth 1 = one ticket at a time. Hard-stop + re-park to concierge-banked when it lands.
config active_backlog_max_depth 1
config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2
config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app
window specifier claude master --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Specifier
window coder claude coder --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Coder
window QA claude QA --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-QA
