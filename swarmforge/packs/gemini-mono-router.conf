# gemini-mono-router — mono-router topology (BL-518) on Google Gemini CLI.
#
# Role → model:
#   workers (coder / specifier / cleaner / architect / hardender /
#            documenter / QA) → gemini-2.5-pro
#   coordinator               → gemini-2.5-flash  (mechanical bookkeeping)
#
# PREREQ:
#   npm i -g @google/gemini-cli   # or equivalent; `gemini` on PATH
#   export GEMINI_API_KEY=...     # ~/.zshenv (BL-130)
#   # or: export SWARMFORGE_GEMINI_API_KEY=...  (mapped to GEMINI_API_KEY at pane -e)
#
# LAUNCH:
#   source ~/.zshenv
#   SWARMFORGE_TERMINAL=none ./swarm <root> --pack gemini-mono-router
#   # or: SWARMFORGE_PACK=gemini-mono-router ./start-swarm.sh
#
# Notes: Gemini CLI uses -y (YOLO) from write_role_launch_script; pack window
# lines only need --model. The API key is NEVER written into launch scripts.

config active_backlog_max_depth 1
config rotation router
config remote_control off
config coordinator_agent gemini
config coordinator_model gemini-2.5-flash
config coordinator_effort medium

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

# Format: window <role> <agent> <worktree> [task|batch] [extra-cli...]
window coder     gemini coder       --model gemini-2.5-pro
window specifier gemini master      --model gemini-2.5-pro
window cleaner   gemini cleaner batch --model gemini-2.5-pro
window architect gemini architect   --model gemini-2.5-pro
window hardender gemini hardender batch --model gemini-2.5-pro
window documenter gemini documenter --model gemini-2.5-pro
window QA        gemini QA          --model gemini-2.5-pro
