# copilot-forge — full 7-role build swarm running on GitHub Copilot CLI.
#
# WHY: the Claude account quota is the scarce resource. Copilot bills against a
# SEPARATE quota (your GitHub Copilot subscription), so every work role moved
# here costs zero Claude tokens.
#
# WHAT STAYS ON CLAUDE: the coordinator only. swarmforge.sh's
# provision_coordinator() hardcodes `register_role "$role" "claude" ...` — the
# coordinator is reserved infrastructure with no window line, so it cannot be
# pointed at another provider by config alone. It is pinned below to the
# cheapest sane tier (Sonnet/high, which is also BL-314's fallback default).
# Making the coordinator's PROVIDER configurable is a code change, not a conf
# change — see INTAKE-coordinator-provider-hardcoded-to-claude.md.
#
# PREREQ: a Linux-native copilot CLI on Node >= 24, authenticated. The
# Windows-npm shim under /mnt/c will NOT work (Windows paths vs WSL worktrees).
#   copilot must resolve to ~/.npm-global/bin/copilot under zsh.
#   Auth: COPILOT_GITHUB_TOKEN / GH_TOKEN / GITHUB_TOKEN, or `copilot` + /login.
#
# LAUNCH:
#   SWARMFORGE_CONFIG="$PWD/swarmforge/packs/copilot-forge.conf" \
#   SWARMFORGE_TERMINAL=none zsh swarmforge/scripts/swarmforge.sh <project-root>

# --- swarm-wide settings (identical to full-forge) ---
config active_backlog_max_depth -1

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev

config briefing_morning_time_utc 08:00

config recert_email_to recert@tolokarooo.resend.app

# --- coordinator (BL-314): the one role that cannot leave Claude. ---
# Cheapest defensible tier; routing/bookkeeping does not need Opus.
config coordinator_model claude-sonnet-5
config coordinator_effort high

# --- work roles, all on Copilot ---
# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
#
# NOTE on flags: swarmforge.sh's copilot launch body already supplies
#   --yolo --allow-all-paths --add-dir <root> -C <worktree> --name ... -i <prompt>
# so extra-cli here must NOT carry Claude-only flags. In particular
# --dangerously-skip-permissions, --effort and --remote-control are Claude-only
# and will be rejected by / meaningless to the copilot CLI.
#
# --model is deliberately OMITTED on the first cut: Copilot's default model is
# the one covered by the base subscription, and a wrong model id fails the
# launch. Pin models here only after `copilot` /model confirms the valid ids.
window specifier copilot master
window coder copilot coder
window cleaner copilot cleaner batch
window architect copilot architect
window hardender copilot hardender batch
window documenter copilot documenter
window QA copilot QA
