# perplexity-mono-router — mono-router on Perplexity Sonar (OpenAI-compat).
#
# Role → model (operator request 2026-07-19):
#   specifier / architect     → sonar-reasoning-pro   (design / deep reason)
#   coder / hardender / QA    → sonar-pro             (implementation quality)
#   cleaner / documenter      → sonar                 (cheap/fast batch)
#   coordinator               → sonar                 (bookkeeping)
#
# PREREQ:
#   export PERPLEXITY_API_KEY=...     # ~/.zshenv (BL-130)
#   source .swarmforge/perplexity.env # SWARMFORGE_USE_PERPLEXITY=1
#   aider on PATH
#
# LAUNCH:
#   source ~/.zshenv
#   source .swarmforge/perplexity.env
#   SWARMFORGE_TERMINAL=none ./swarm <root> --pack perplexity-mono-router
#
# Notes: aider OpenAI-compat path; --openai-api-base is non-secret and may sit
# in the window line. The Perplexity key is NEVER written into launch scripts.
# API base is https://api.perplexity.ai (no /v1 — that path 404s).

config active_backlog_max_depth 1
config rotation router
config remote_control off
config coordinator_agent aider
config coordinator_model openai/sonar
config coordinator_effort medium

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

# Format: window <role> <agent> <worktree> [task|batch] [extra-cli...]
window coder     aider coder       --model openai/sonar-pro --openai-api-base https://api.perplexity.ai --no-gitignore --no-show-model-warnings --no-check-update
window specifier aider master      --model openai/sonar-reasoning-pro --openai-api-base https://api.perplexity.ai --no-gitignore --no-show-model-warnings --no-check-update
window cleaner   aider cleaner batch --model openai/sonar --openai-api-base https://api.perplexity.ai --no-gitignore --no-show-model-warnings --no-check-update
window architect aider architect   --model openai/sonar-reasoning-pro --openai-api-base https://api.perplexity.ai --no-gitignore --no-show-model-warnings --no-check-update
window hardender aider hardender batch --model openai/sonar-pro --openai-api-base https://api.perplexity.ai --no-gitignore --no-show-model-warnings --no-check-update
window documenter aider documenter --model openai/sonar --openai-api-base https://api.perplexity.ai --no-gitignore --no-show-model-warnings --no-check-update
window QA        aider QA          --model openai/sonar-pro --openai-api-base https://api.perplexity.ai --no-gitignore --no-show-model-warnings --no-check-update
