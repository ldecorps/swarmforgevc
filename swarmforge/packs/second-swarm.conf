# BL-091: full pipeline for a second, secondary-mode swarm (BL-090) - the
# operator's own coordinator stays on the primary machine as the single
# triage/promotion authority; this swarm only works tickets its coordinator
# already assigned to swarm_name "second" (a ticket's `swarm:` field), never
# promotes or assigns, and pushes QA-approved merges to the shared main via
# git like any other swarm. No coordinator window - secondary mode rejects
# one at launch (BL-090 multi-swarm-06).
#
# See docs/runbooks/BL-091-wsl2-second-swarm-bringup.md for the full WSL2
# bring-up (prerequisites, clone location, launch/stop) - this conf works
# unmodified on any tmux-capable Linux userland, WSL2 included.
#
# Rename "second" (both the swarm_name below and --pack invocation target)
# if the operator's own conf already uses that name for something else -
# it only has to match what the primary coordinator assigns tickets to.
#
# Launch:
#   SWARMFORGE_TERMINAL=none ./swarm <target> --pack second-swarm

config swarm_name second
config swarm_mode secondary primary

window specifier claude master --model claude-sonnet-5 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Second-Specifier
window coder claude coder --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Second-Coder
window cleaner claude cleaner batch --model claude-sonnet-5 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Second-Cleaner
window architect claude architect --model claude-sonnet-5 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Second-Architect
window hardender claude hardender batch --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Second-Hardender
window documenter claude documenter --model claude-sonnet-5 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Second-Documenter
window QA claude QA --model claude-sonnet-5 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Second-QA
