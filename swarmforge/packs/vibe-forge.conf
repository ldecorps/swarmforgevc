# vibe-forge — full work-role swarm on Mistral Vibe (mistralai/mistral-vibe).
#
# WHY THIS EXISTS: Claude is at 99% of the weekly limit and GitHub Copilot is
# 1500/1500 AIC exhausted (overage billing). Mistral Vibe is the only backend
# left that is BOTH capable and near-free.
#
# WHY VIBE AND NOT AIDER: both run Mistral models, but aider is a file EDITOR —
# it cannot execute shell, so roles SIMULATE ready_for_next.sh instead of running
# it (specifier literally printed "Step 1: Simulate ready_for_next.sh Output", and
# QA tried to *edit* ready_for_next.sh because editing is the only verb it has).
# Vibe is a real coding AGENT with bash tools. Verified: it ran the script and
# performed the task the output asked for. Capability is about the AGENT, not the
# model. See packs/mistral-lean.conf for the record of the aider failure.
#
# PREREQ:
#   pipx install mistral-vibe          # provides `vibe` (2.19.1 verified)
#   export MISTRAL_API_KEY=...         # in ~/.zshenv
# The key is passed to panes as an ephemeral `tmux respawn-pane -e` flag and is
# NEVER written into .swarmforge/launch/<role>.sh (BL-130).
#
# COORDINATOR STAYS ON CLAUDE: provision_coordinator() hardcodes
# `register_role "$role" "claude" ...` — no conf can move it. It is pinned to the
# cheapest tier below, so a Vibe swarm still nibbles the Claude quota (the
# coordinator is the most frequently woken role — this is NOT zero).
# See INTAKE-coordinator-provider-hardcoded-to-claude.md.
#
# COST CEILING: --max-price is a HARD per-session cap in dollars — the session is
# interrupted if cost exceeds it. Neither Claude nor Copilot offers this. Keep it
# on every window line; it is the guardrail that makes an unattended swarm safe to
# leave running.
#
# LAUNCH:
#   SWARMFORGE_CONFIG="$PWD/swarmforge/packs/vibe-forge.conf" \
#   SWARMFORGE_TERMINAL=none zsh swarmforge/scripts/swarmforge.sh <project-root>

config active_backlog_max_depth 1

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev

config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

# The one role that cannot leave Claude. Cheapest defensible tier.
config coordinator_model claude-sonnet-5
config coordinator_effort high

# --- work roles on Mistral Vibe ---
# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
# The vibe launch body already supplies --yolo --trust --workdir <worktree>
# (and --add-dir <root> for non-master worktrees). Do NOT pass Claude-only flags
# (--dangerously-skip-permissions / --effort / --remote-control).
window specifier vibe master --max-price 2.00
window coder vibe coder --max-price 3.00
window QA vibe QA --max-price 2.00
