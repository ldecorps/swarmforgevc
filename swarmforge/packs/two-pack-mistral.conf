# Two-pack — Mistral-only via aider (BL-130 alternate runtime).
# All roles use aider + Mistral models. Coordinator uses orchestration-only bootstrap
# (see write_agent_instruction_file in swarmforge.sh). See two-pack.prompt for routing.
#
# Prerequisites:
#   pip install aider-chat
#   export MISTRAL_API_KEY=...   (or store via extension SecretStorage)
#
# Launch (tmux inject exercise — no daemon):
#   SWARMFORGE_TERMINAL=none SWARMFORGE_SKIP_DAEMON=1 \
#   SWARMFORGE_CONFIG=<path>/two-pack-mistral.conf ./swarm <target>
#
# Launch (mailbox-only exercise):
#   SWARMFORGE_TERMINAL=none SWARMFORGE_MAILBOX_ONLY=1 \
#   SWARMFORGE_CONFIG=<path>/two-pack-mistral.conf ./swarm <target>

config active_backlog_max_depth 1

# BL-243: the coordinator is provisioned automatically by ./swarm - it is
# reserved infrastructure and is rejected outright if declared here as a
# window line (see swarmforge.sh's provision_coordinator/parse_config).
window coder aider master --model mistral/codestral-latest --no-gitignore --no-show-model-warnings
window cleaner aider cleaner batch --model mistral/mistral-large-latest --no-gitignore --no-show-model-warnings
