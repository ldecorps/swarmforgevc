# mono-router pack (BL-518): ONE resident pipeline agent that plays every
# role in turn - like mono-rotate - BUT respawns its pane AS the next role at
# each handoff, so every stage runs on a model TAILORED to that stage instead
# of one model for the whole chain. The token saving is twofold: (1) one
# resident process instead of one per role (the mono-rotate win), and (2) the
# mechanical stages drop to Haiku and only the two genuine-reasoning stages
# (specifier, architect) pay for Opus. Full gates preserved - the saving is
# never a lighter gate, only fewer processes on cheaper models. Slower
# wall-clock (strictly serial) is the accepted cost.
#
# The coordinator stays separately auto-provisioned (reserved infrastructure,
# BL-243) - it is NOT part of the rotation.
#
# Launch:
#   ./swarm <target> --pack mono-router
#   SWARMFORGE_TERMINAL=none ./swarm <target> --pack mono-router   # headless
#
# See swarmforge/packs/mono-router.prompt for the resident agent's rotation
# protocol (how it becomes the next role - and thus swaps model - at each
# handoff via rotate_to_role.sh).

# Serialize the pipeline: one parcel through the whole chain at a time.
config active_backlog_max_depth 1

# `router` (BL-518): like `sequential` (only the FIRST window line launches a
# real process), except every pipeline role's launch script + settings JSON is
# pre-generated at startup so the resident pane can respawn AS any role -
# picking up that role's --model/--effort - via rotate_to_role.bb. This is
# what makes per-stage model tailoring real: model/effort live in each role's
# .swarmforge/launch/<role>.claude-settings.json, and a running claude process
# cannot change its own, so rotation MUST be a respawn.
config rotation router

# Coordinator (auto-provisioned, never a window line): orchestration is
# frequent but mechanical (intake, routing, chase, post-QA bookkeeping). Keep
# it on Sonnet - its git bookkeeping errors are the most expensive kind to get
# wrong - but trim effort to medium. This is the always-on process, so it is
# the one place NOT to over-spend on reasoning it rarely needs.
config coordinator_model claude-sonnet-5
config coordinator_effort medium

# ── The model-routing table ─────────────────────────────────────────────────
# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
#
# Only the FIRST line (coder) launches a real, standing, remote-controlled
# process - it is the resident agent's "home" identity and the one role
# handoffd can always poke. coder is home (not specifier) BECAUSE the common
# case is already-specced work in backlog/active/, which enters the pipeline
# at CODER: the coordinator/dispatch-gap routes it to coder's inbox and pokes
# coder's session, which must be the live resident or the parcel never wakes
# anyone (the single-session resident cannot be poked for a dormant role).
# specifier stays a dormant rotation target - reached when a downstream stage
# BOUNCES a spec defect to it (the resident self-rotates there), never by a
# cold intake poke. KNOWN LIMITATION: brand-new UNSPECCED intake (which would
# enter at specifier) will not cold-wake this swarm; spec such work elsewhere
# (full-forge) or hand it straight to coder. Every non-first line is parsed for
# its worktree + roles.tsv row + pre-generated launch script, but has no
# process of its own until the resident agent respawns AS it.
#
# --remote-control is on EVERY line, all the same name (SwarmForge-MonoRouter):
# because rotation is a respawn, the RC session must be re-registered by each
# role's launch script or it would drop after the first rotation. Same name =
# the same claude.ai/mobile session reappears each stage (never concurrent).
#
# Tier rationale (mirrors extension/src/swarm/effortDial.ts's demand tiers):
#   design-heavy -> Opus 4.8 / xhigh   : specifier, architect
#   neutral      -> Sonnet 5 / high    : coder, hardender, QA (verification)
#   mechanical   -> Haiku 4.5 / medium : cleaner, documenter
window coder     claude coder       --model claude-sonnet-5           --dangerously-skip-permissions --effort high   --remote-control SwarmForge-MonoRouter
window specifier claude master     --model claude-opus-4-8            --dangerously-skip-permissions --effort xhigh  --remote-control SwarmForge-MonoRouter
window cleaner   claude cleaner batch --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-MonoRouter
window architect claude architect   --model claude-opus-4-8            --dangerously-skip-permissions --effort xhigh  --remote-control SwarmForge-MonoRouter
window hardender claude hardender batch --model claude-sonnet-5        --dangerously-skip-permissions --effort high   --remote-control SwarmForge-MonoRouter
window documenter claude documenter --model claude-haiku-4-5-20251001  --dangerously-skip-permissions --effort medium --remote-control SwarmForge-MonoRouter
window QA        claude QA          --model claude-sonnet-5           --dangerously-skip-permissions --effort high   --remote-control SwarmForge-MonoRouter
