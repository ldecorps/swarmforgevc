# vibe-mono-router — mono-router topology (BL-518) on Mistral Vibe.
#
# Role → cap (--max-price is a hard per-session dollar limit in Vibe):
#   resident pipeline roles → 3.00 (coder) / 2.00 (others)
#   coordinator             → 2.00 (mechanical bookkeeping)
#
# PREREQ:
#   pipx install mistral-vibe          # provides `vibe` on PATH
#   export MISTRAL_API_KEY=...         # ~/.zshenv (BL-130)
#
# LAUNCH:
#   source ~/.zshenv
#   SWARMFORGE_TERMINAL=none ./swarm <root> --pack vibe-mono-router
#   # or: ./start-swarm-mistral.sh
#
# Notes: MISTRAL_API_KEY is passed via tmux respawn-pane -e (BL-130), never
# written into launch scripts. See packs/vibe-mono-router.prompt for rotation.

config active_backlog_max_depth 1
config rotation router
config remote_control off
config coordinator_agent vibe
config coordinator_model 2.00
config coordinator_effort medium

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

# Format: window <role> <agent> <worktree> [task|batch] [extra-cli...]
window coder     vibe coder       --max-price 3.00
window specifier vibe master      --max-price 2.00
window cleaner   vibe cleaner batch --max-price 2.00
window architect vibe architect   --max-price 2.00
window hardender vibe hardender batch --max-price 2.00
window documenter vibe documenter --max-price 2.00
window QA        vibe QA          --max-price 2.00
