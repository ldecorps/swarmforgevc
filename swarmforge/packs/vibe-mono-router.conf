# vibe-mono-router — mono-router topology (BL-518) on direct Mistral Vibe.
#
# ONE resident pipeline agent rotates through every stage (coder home →
# cleaner → architect → hardender → documenter → QA → home), respawning the
# same pane AS each role via rotate_to_role.sh. Coordinator is separate
# (also vibe). No Claude. No OpenRouter.
#
# PREREQ:
#   pipx install mistral-vibe   # `vibe` on PATH (~/.local/bin)
#   export MISTRAL_API_KEY=...  # ~/.zshenv
#
# LAUNCH:
#   source ~/.zshenv
#   export PATH="$HOME/.local/bin:$PATH"
#   SWARMFORGE_TERMINAL=none ./swarm <root> --pack vibe-mono-router
#
# See vibe-mono-router.prompt for the resident rotation protocol.

config active_backlog_max_depth 1
config rotation router
config remote_control off
config coordinator_agent vibe

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

# First window = resident home (coder). Remaining lines are dormant rotation
# targets: worktree + roles.tsv + pre-generated launch script only.
# --max-price is a hard per-session USD ceiling (Vibe).
window coder     vibe coder       --max-price 3.00
window specifier vibe master      --max-price 2.00
window cleaner   vibe cleaner batch --max-price 2.00
window architect vibe architect   --max-price 2.00
window hardender vibe hardender batch --max-price 2.50
window documenter vibe documenter --max-price 2.00
window QA        vibe QA          --max-price 2.00
