# Uncle Bob's 2-pack pipeline (coder → cleaner) + coordinator for triage.
#
# Launch (mailbox-only exercise — handoffd, no tmux inject):
#   SWARMFORGE_TERMINAL=none SWARMFORGE_MAILBOX_ONLY=1 ./swarm <target> --pack two-pack
#
# Launch (tmux inject exercise — no daemon):
#   SWARMFORGE_TERMINAL=none SWARMFORGE_SKIP_DAEMON=1 ./swarm <target> --pack two-pack

config active_backlog_max_depth 1

# --remote-control enables Claude Remote Control (claude.ai/code, mobile app).
window coordinator claude master --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Coordinator
window coder claude master --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Coder
window cleaner claude cleaner batch --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Cleaner
