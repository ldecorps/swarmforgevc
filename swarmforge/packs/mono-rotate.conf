# Uncle Bob's mono-rotate pack (BL-448): ONE resident pipeline agent plays
# every pipeline role in turn instead of one long-lived process per role -
# specifier (intake boundary) -> coder -> cleaner -> architect -> hardender ->
# documenter -> QA, self-handing the parcel off and rotating identity at each
# stage. Full gates preserved (acceptance, coverage, mutation/no-survivors,
# CRAP<=6, QA final) - the memory saving comes ONLY from one resident process,
# never from a lighter gate. The coordinator stays separately auto-provisioned
# (reserved infrastructure, BL-243) - it is NOT part of the rotation.
#
# See swarmforge/packs/mono-rotate.prompt for the resident agent's own
# self-rotation protocol (how it learns which role to become next and
# resumes that role's loop).
#
# Launch:
#   ./swarm <target> --pack mono-rotate
#
# Driver: a memory-constrained host (e.g. FES's 15GB box, which OOM-crashed
# under a full swarm) that can afford only ONE resident agent process.
# FES's second-swarm bring-up (BL-439) adopts this pack as its default.
#
# `config rotation sequential` is what makes this a rotation pack rather than
# an ordinary 6-window pack: every window line below still gets its own
# worktree + roles.tsv entry (so its mailbox resolves correctly the moment the
# resident agent exports SWARMFORGE_ROLE and cds into it), but only the FIRST
# window line (coder) gets a real tmux session/claude process - see
# is_sequential_dormant in swarmforge.sh.

config active_backlog_max_depth 1
config rotation sequential

# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
# Only the FIRST line's --model/--effort/--remote-control actually launch a
# process (the resident agent) - every other line's flags are read by
# parse_config (each role still needs a valid, worktree-provisioned window
# line) but are otherwise dormant until a rotation mechanism re-launches that
# role's own process, per mono-rotate.prompt.
window coder claude coder --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-MonoRotate
window cleaner claude cleaner batch --model claude-sonnet-5 --dangerously-skip-permissions --effort high
window architect claude architect --model claude-sonnet-5 --dangerously-skip-permissions --effort high
window hardender claude hardender batch --model claude-sonnet-5 --dangerously-skip-permissions --effort high
window documenter claude documenter --model claude-sonnet-5 --dangerously-skip-permissions --effort medium
window QA claude QA --model claude-sonnet-5 --dangerously-skip-permissions --effort high
