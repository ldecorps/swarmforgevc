# ── fes-two-pack ──────────────────────────────────────────────────────────────
# The free-email-scanner guinea-pig swarm (fleet beef-up track, 2026-07-15):
# a minimal 2-pack (specifier + coder, Sonnet 5) + the auto-provisioned
# coordinator, against /mnt/c/Users/Carillon/source/repos/free-email-scanner.
#
# WHY THIS SHAPE (decisions with the human, 2026-07-15):
#   - 2-pack: the 15GB host also runs the primary swarmforgevc swarm and
#     OOM-crashed 2026-07-15; one full pack is the box's budget.
#   - specifier + coder: FES has its own file-based backlog (006/008 active)
#     and a freshly-agreed onboarding contract - intake→spec→build is the
#     pipeline that matters first. Sonnet 5 = deliberate cost posture.
#   - swarm_name fes: the fleet-wide primary key. Telegram creds + bridge
#     port live in ~/.swarmforge/fleet/fes/ (host-secrets.json holds the
#     @fes_swarm_bot token; chatId -1003886489685, negotiation topic 2).
#     NEVER reuse the primary's TELEGRAM_BOT_TOKEN / port 8765 here.
#
# LAUNCH (from this Windows-side checkout, per the human's location call):
#   SWARMFORGE_TERMINAL=none ./swarm /mnt/c/Users/Carillon/source/repos/free-email-scanner --pack fes-two-pack
# Front desk (when wired): BRIDGE_PORT=8766 - the primary owns 8765.
#
# Contract gate: FES's .swarmforge/contract.yaml is agreement: agreed
# (commit a2de169 + cleanups) - the gate allows build work.

config swarm_name fes
config active_backlog_max_depth 1
config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

# BL-243: the coordinator is provisioned automatically by ./swarm - it is
# reserved infrastructure and is rejected outright if declared here as a
# window line (see swarmforge.sh's provision_coordinator/parse_config).
window specifier claude master --model claude-sonnet-5 --dangerously-skip-permissions --effort medium --remote-control FES-Specifier
window coder claude coder --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control FES-Coder
