# openrouter-cheap-mono-router — cheapest multi-model mono-router via OpenRouter.
#
# Role → model (operator request 2026-07-18):
#   specifier / architect → google/gemini-2.5-pro
#   coder                 → deepseek/deepseek-chat (DeepSeek V3)
#   cleaner / QA (/ documenter) → qwen/qwen3-32b
#   hardender             → google/gemini-2.5-flash
#   coordinator           → google/gemini-2.5-flash
#
# PREREQ:
#   export OPENROUTER_API_KEY=...   # ~/.zshenv or ~/.bashrc
#   Also check the key's monthly spend limit in the OpenRouter dashboard
#   (account credits alone are not enough if the key limit is exhausted).
#   source .swarmforge/openrouter.env   # SWARMFORGE_OPENROUTER_ROLES=*
#
# LAUNCH:
#   source ~/.zshenv
#   source .swarmforge/openrouter.env
#   SWARMFORGE_TERMINAL=none ./swarm <root> --pack openrouter-cheap-mono-router
#
# Notes: Claude Code is pointed at OpenRouter (ANTHROPIC_BASE_URL) per
# SWARMFORGE_OPENROUTER_ROLES. Non-Anthropic OpenRouter slugs are the point of
# this pack — if a slug is rejected by the CLI, swap that role to an
# anthropic/* Skin model or an aider openrouter/* line.

config active_backlog_max_depth 1
config rotation router
config remote_control off

config coordinator_model google/gemini-2.5-flash
config coordinator_effort medium

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

window coder     claude coder       --model deepseek/deepseek-chat --dangerously-skip-permissions --effort high
window specifier claude master      --model google/gemini-2.5-pro --dangerously-skip-permissions --effort high
window cleaner   claude cleaner batch --model qwen/qwen3-32b --dangerously-skip-permissions --effort medium
window architect claude architect   --model google/gemini-2.5-pro --dangerously-skip-permissions --effort high
window hardender claude hardender batch --model google/gemini-2.5-flash --dangerously-skip-permissions --effort medium
window documenter claude documenter --model qwen/qwen3-32b --dangerously-skip-permissions --effort medium
window QA        claude QA          --model qwen/qwen3-32b --dangerously-skip-permissions --effort medium
