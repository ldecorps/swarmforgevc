# qwen-mono-router — mono-router on Alibaba Qwen Coding Plan (OpenAI-compat).
#
# Role → model (Coding Plan catalog probe 2026-07-20):
#   workers (coder / specifier / cleaner / architect / hardender /
#            documenter / QA) → qwen3-coder-plus
#   coordinator               → qwen3.5-plus  (mechanical bookkeeping)
#
# PREREQ:
#   export QWEN_API_KEY=...              # ~/.zshenv (BL-130); Coding Plan sk-sp-…
#   # or: export BAILIAN_CODING_PLAN_API_KEY=...  (mapped by start-swarm-qwen.sh)
#   SWARMFORGE_USE_QWEN=1                # maps key → OPENAI_* at pane -e
#   aider on PATH
#
# LAUNCH:
#   source ~/.zshenv
#   ./start-swarm-qwen.sh
#   # or:
#   export SWARMFORGE_USE_QWEN=1
#   SWARMFORGE_TERMINAL=none ./swarm <root> --pack qwen-mono-router
#
# Notes: aider OpenAI-compat path; --openai-api-base is non-secret and may sit
# in the window line. The Qwen Coding Plan key is NEVER written into launch
# scripts. Intl Coding Plan host: https://coding-intl.dashscope.aliyuncs.com/v1

config active_backlog_max_depth 1
config rotation router
config remote_control off
config coordinator_agent aider
config coordinator_model openai/qwen3.5-plus
config coordinator_effort medium

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

# Format: window <role> <agent> <worktree> [task|batch] [extra-cli...]
window coder     aider coder       --model openai/qwen3-coder-plus --openai-api-base https://coding-intl.dashscope.aliyuncs.com/v1 --no-gitignore --no-show-model-warnings --no-check-update
window specifier aider master      --model openai/qwen3-coder-plus --openai-api-base https://coding-intl.dashscope.aliyuncs.com/v1 --no-gitignore --no-show-model-warnings --no-check-update
window cleaner   aider cleaner batch --model openai/qwen3-coder-plus --openai-api-base https://coding-intl.dashscope.aliyuncs.com/v1 --no-gitignore --no-show-model-warnings --no-check-update
window architect aider architect   --model openai/qwen3-coder-plus --openai-api-base https://coding-intl.dashscope.aliyuncs.com/v1 --no-gitignore --no-show-model-warnings --no-check-update
window hardender aider hardender batch --model openai/qwen3-coder-plus --openai-api-base https://coding-intl.dashscope.aliyuncs.com/v1 --no-gitignore --no-show-model-warnings --no-check-update
window documenter aider documenter --model openai/qwen3-coder-plus --openai-api-base https://coding-intl.dashscope.aliyuncs.com/v1 --no-gitignore --no-show-model-warnings --no-check-update
window QA        aider QA          --model openai/qwen3-coder-plus --openai-api-base https://coding-intl.dashscope.aliyuncs.com/v1 --no-gitignore --no-show-model-warnings --no-check-update
