# qwen-mono-router — mono-router on Alibaba Token Plan (OpenAI-compat, SEA).
#
# Role → model (Token Plan SEA catalog — operator list 2026-07-20):
#   workers → qwen3.7-plus  (coder bumped from max after BL-513 misread)
#   coordinator → qwen3.6-flash  (cheaper mechanical bookkeeping)
# Also available on this plan (not used by default): qwen3.8-max-preview,
# qwen3.7-plus, deepseek-v4-pro, glm-5.2.
#
# PREREQ (Token Plan Individual — docs.qwencloud.com/token-plan/personal/):
#   export BAILIAN_TOKEN_PLAN_API_KEY=sk-sp-…   # preferred; or QWEN_API_KEY
#   SWARMFORGE_USE_QWEN=1                      # maps key → OPENAI_* at pane -e
#   aider on PATH
# Base URL (OpenAI-compat):
#   https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
# Anthropic-compat (unused by this pack):
#   https://token-plan.ap-southeast-1.maas.aliyuncs.com/apps/anthropic
#
# LAUNCH:
#   source ~/.zshenv
#   ./start-swarm-qwen.sh
#
# Notes: key NEVER written into launch scripts. Personal ToS limits use to
# interactive coding tools; headless swarm may risk key revocation — prefer
# Team Edition for automation, or verify eligibility in console first.

config active_backlog_max_depth 1
config rotation router
config remote_control off
config coordinator_agent aider
config coordinator_model openai/qwen3.6-flash
config coordinator_effort medium

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

# Format: window <role> <agent> <worktree> [task|batch] [extra-cli...]
window coder     aider coder       --model openai/qwen3.7-plus --openai-api-base https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1 --no-gitignore --no-show-model-warnings --no-check-update
window specifier aider master      --model openai/qwen3.7-max --openai-api-base https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1 --no-gitignore --no-show-model-warnings --no-check-update
window cleaner   aider cleaner batch --model openai/qwen3.7-max --openai-api-base https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1 --no-gitignore --no-show-model-warnings --no-check-update
window architect aider architect   --model openai/qwen3.7-max --openai-api-base https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1 --no-gitignore --no-show-model-warnings --no-check-update
window hardender aider hardender batch --model openai/qwen3.7-max --openai-api-base https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1 --no-gitignore --no-show-model-warnings --no-check-update
window documenter aider documenter --model openai/qwen3.7-max --openai-api-base https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1 --no-gitignore --no-show-model-warnings --no-check-update
window QA        aider QA          --model openai/qwen3.7-max --openai-api-base https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1 --no-gitignore --no-show-model-warnings --no-check-update
