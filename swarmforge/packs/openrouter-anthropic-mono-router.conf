# openrouter-anthropic-mono-router — mono-router via OpenRouter (Anthropic only).
#
# Role → model (cost-aware tiering, 2026-07-22):
#   specifier / coder / architect / QA / hardender → anthropic/claude-sonnet-5
#   coordinator / cleaner / documenter → anthropic/claude-haiku-4.5 (mechanical, cheap)
#
# Note: Sonnet 5 is same price as 4.6 on OpenRouter. Haiku 4.5 for mechanical roles.
#
# PREREQ:
#   export OPENROUTER_API_KEY=...   # ~/.zshenv or ~/.bashrc
#   Also check the key's monthly spend limit in the OpenRouter dashboard
#   (account credits alone are not enough if the key limit is exhausted).
#   source .swarmforge/openrouter.env   # SWARMFORGE_OPENROUTER_ROLES=*
#
# LAUNCH:
#   source ~/.zshenv
#   source .swarmforge/openrouter.env
#   SWARMFORGE_TERMINAL=none ./swarm <root> --pack openrouter-anthropic-mono-router
#   # or: ./start-swarm-anthropic.sh
#
# Notes: Every role uses Claude Code pointed at OpenRouter (ANTHROPIC_BASE_URL)
# per SWARMFORGE_OPENROUTER_ROLES. No non-Anthropic slugs — avoids Kimi 429/404
# churn and keeps one provider family through the same key.

config active_backlog_max_depth 1
config rotation router
config remote_control off

config coordinator_model anthropic/claude-haiku-4.5
config coordinator_effort medium

config mutation_cooldown_days 3
config mutation_busy_load_multiplier 2

config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev
config briefing_morning_time_utc 08:00
config recert_email_to recert@tolokarooo.resend.app

window coder     claude coder       --model anthropic/claude-sonnet-5 --dangerously-skip-permissions --effort high
window specifier claude master      --model anthropic/claude-sonnet-5 --dangerously-skip-permissions --effort high
window cleaner   claude cleaner batch --model anthropic/claude-haiku-4.5 --dangerously-skip-permissions --effort medium
window architect claude architect   --model anthropic/claude-sonnet-5 --dangerously-skip-permissions --effort high
window hardender claude hardender batch --model anthropic/claude-sonnet-5 --dangerously-skip-permissions --effort medium
window documenter claude documenter --model anthropic/claude-haiku-4.5 --dangerously-skip-permissions --effort medium
window QA        claude QA          --model anthropic/claude-sonnet-5 --dangerously-skip-permissions --effort high
