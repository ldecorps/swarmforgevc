# Swarm-wide settings. `config <key> <value>` lines are read by the coordinator.
# active_backlog_max_depth: max number of items allowed in backlog/active/ at once.
# The coordinator holds new work in backlog/paused/ and promotes the next item to
# active only while the active count is below this cap. Keeps the pipeline at a
# pace the human can follow.
# A value of -1 means NO LIMIT: the coordinator promotes every eligible paused
# item regardless of active count. Concurrent Work Orthogonality still applies
# (skip/hold overlapping-scope items) — removing the depth cap does not remove
# the orthogonality rule.
config active_backlog_max_depth 2

# BL-149: mutation-testing eligibility gate (mutation_cooldown_gate.bb), read
# fresh by the hardener before each mutation pass - never a remembered value.
# mutation_cooldown_days: a production file last committed-touched within this
# many days is still actively churning and is skipped unconditionally,
# regardless of time of day or host load.
config mutation_cooldown_days 3
# mutation_busy_load_multiplier: once a file is past cooldown, the existing
# office-hours bypass applies - the host is "busy" when its load average
# exceeds this multiplier times the core count (was a hardcoded "~2x cores"
# in hardender.prompt's prose; now configurable here instead).
config mutation_busy_load_multiplier 2

# BL-144: daemon-death alarm email. handoffd_supervisor.bb runs headless (no
# VS Code needed) and cannot read the extension's swarmforge.notify.email.*
# VS Code settings, so the alarm path gets its own config here instead - the
# API key still comes from the RESEND_API_KEY env var, same as the extension.
# Uncomment and set notify_email_to to enable the alarm email (the failure
# log + hard-stop happen either way, configured or not).
# BL-215: RESEND_API_KEY is read from the DAEMON's own process environment,
# not VS Code SecretStorage - a headless launch (CLI, no VS Code, or a
# supervisor self-relaunch) MUST export RESEND_API_KEY in that same launch
# environment (shell profile / systemd unit / launcher), or the alarm and
# BL-214 briefing emails cannot send. A configured-but-keyless daemon no
# longer no-ops silently: it logs a loud warning naming RESEND_API_KEY to
# .swarmforge/daemon/handoffd-supervisor.log (deduped, not spammed).
config notify_email_to ldecorps@gmail.com
config notify_email_from onboarding@resend.dev

# BL-258: the headless daemon's own morning trigger for briefing GENERATION
# (complements BL-214's send-time sweep above) - "HH:MM" 24h UTC. Read fresh
# each sweep by handoffd.bb's configured-morning-time, never hardcoded. A
# blank/absent/malformed value falls back to 08:00 UTC
# (briefing_generation_schedule_lib.bb's default-morning-time) rather than
# crashing the sweep.
config briefing_morning_time_utc 08:00

# BL-256: the deployed PWA dashboard's base URL (read by
# extension/src/metrics/pwaDeepLinks.ts), used to build deep links from
# briefing items (e.g. #ticket=BL-123, #approval=BL-123) into their PWA
# view. There is no universal default - the GitHub Pages URL is assigned
# per deployment (or a later custom domain) - so this line is commented
# out until the operator sets it; absent/blank degrades to plain ticket
# IDs with no link, never a broken URL. Example:
# config pwa_base_url https://<user>.github.io/<repo>/

# BL-223: the phone recert PWA's inbound recertification address (read by
# extension/src/docs/recertificationStore.ts, published into recert-batch.json
# for the static PWA to consume - never hardcoded in pwa/app.js a second
# time). Defaults to the operator's Resend-managed receiving domain
# (tolokarooo.resend.app - no DNS/MX setup needed) when this line is absent.
# A later branded custom domain (e.g. recert@inbound.musicalsifu.com) is a
# swap of this one line, not a code change.
config recert_email_to recert@tolokarooo.resend.app

# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
# The optional receive mode defaults to task. Use batch for roles that should
# consume all currently queued equal-priority handoffs as one batch.
# Any fields after the receive mode are passed to the agent CLI, e.g. --yolo.
# --remote-control [name] enables Claude Remote Control (claude.ai/code, mobile app).
# BL-243: the coordinator is provisioned automatically by ./swarm - it is
# reserved infrastructure and is rejected outright if declared here as a
# window line (see swarmforge.sh's provision_coordinator/parse_config).
window specifier claude master --model claude-opus-4-8 --dangerously-skip-permissions --effort xhigh --remote-control SwarmForge-Specifier
window coder claude coder --model claude-sonnet-5 --dangerously-skip-permissions --effort xhigh --remote-control SwarmForge-Coder
window cleaner claude cleaner batch --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Cleaner
window architect claude architect --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Architect
window hardender claude hardender batch --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-Hardender
window documenter claude documenter --model claude-sonnet-5 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Documenter
window QA claude QA --model claude-sonnet-5 --dangerously-skip-permissions --effort high --remote-control SwarmForge-QA
