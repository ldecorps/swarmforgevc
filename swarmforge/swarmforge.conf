# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
# The optional receive mode defaults to task. Use batch for roles that should
# consume all currently queued equal-priority handoffs as one batch.
# Any fields after the receive mode are passed to the agent CLI, e.g. --yolo.
# --remote-control [name] enables Claude Remote Control (claude.ai/code, mobile app).
window coordinator claude master --model claude-sonnet-4-6 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Coordinator
window specifier claude master --model claude-sonnet-4-6 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Specifier
window coder claude master --model claude-sonnet-4-6 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Coder
window cleaner claude cleaner batch --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Cleaner
