# Swarm-wide settings. `config <key> <value>` lines are read by the coordinator.
# active_backlog_max_depth: max number of items allowed in backlog/active/ at once.
# The coordinator holds new work in backlog/paused/ and promotes the next item to
# active only while the active count is below this cap. Keeps the pipeline at a
# pace the human can follow.
# A value of -1 means NO LIMIT: the coordinator promotes every eligible paused
# item regardless of active count. Concurrent Work Orthogonality still applies
# (skip/hold overlapping-scope items) — removing the depth cap does not remove
# the orthogonality rule.
config active_backlog_max_depth -1

# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
# The optional receive mode defaults to task. Use batch for roles that should
# consume all currently queued equal-priority handoffs as one batch.
# Any fields after the receive mode are passed to the agent CLI, e.g. --yolo.
# --remote-control [name] enables Claude Remote Control (claude.ai/code, mobile app).
window coordinator claude master --model claude-sonnet-5 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Coordinator
window specifier claude master --model claude-fable-5 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Specifier
window coder claude coder --model claude-sonnet-5 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Coder
window cleaner claude cleaner batch --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Cleaner
window architect claude architect --model claude-sonnet-5 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Architect
window hardender claude hardender batch --model claude-sonnet-5 --dangerously-skip-permissions --effort medium --remote-control SwarmForge-Hardender
window documenter claude documenter --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-Documenter
window QA claude QA --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --effort low --remote-control SwarmForge-QA
